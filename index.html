    const done = kinds.filter(k=>S.bestiary[k] && S.bestiary[k].killed).length;
    const groupDone = done===kinds.length;
    return `<div class="beast-group-title"><span>${group.name}${groupDone?' · 🏵 '+escapeHtml(group.title.name):''}</span><span class="mono">${done}/${kinds.length}</span></div>
      ${kinds.map(beastCardHTML).join('')}`;
  }).join('');
}
// Карточка достижения — сознательно не показывает, как получить: ни описания,
// ни прогресса. Пока не открыто — только "???" и замок, см. ACHIEVEMENTS_LIST.
function achievementCardHTML(a){
  const unlocked = S.achievements.includes(a.id);
  return `<div class="title-card ${unlocked?'unlocked':'locked'}">
    <div class="tc-badge">${unlocked?'🏆':'🔒'}</div>
    <div class="tc-body">
      <div class="tc-name">${unlocked ? escapeHtml(a.name) : '???'}</div>
      <div class="tc-sub">${unlocked ? 'Достижение открыто' : 'Скрытое достижение'}</div>
    </div>
  </div>`;
}
function rTitlesAchievementsTab(){
  return ACHIEVEMENTS_LIST.map(achievementCardHTML).join('');
}
function rTitlesScreen(){
  h(`<div class="screen">
    <div class="topbar"><button class="back" onclick="go(S.prevScreen||'profile')">‹</button>
      <h2 style="margin:0;font-size:20px">Титулы и бестиарий</h2>
    </div>
    <div class="tb-tabs">
      <button class="${S.titlesTab==='titles'?'on':''}" onclick="setTitlesTab('titles')">Титулы</button>
      <button class="${S.titlesTab==='bestiary'?'on':''}" onclick="setTitlesTab('bestiary')">Бестиарий</button>
      <button class="${S.titlesTab==='achievements'?'on':''}" onclick="setTitlesTab('achievements')">Достижения</button>
    </div>
    ${S.titlesTab==='bestiary' ? rTitlesBestiaryTab() : S.titlesTab==='achievements' ? rTitlesAchievementsTab() : rTitlesTitlesTab()}
    <div style="height:20px"></div>
  </div>`);
}

/* ---- 7. Настройки ---- */
const DAYS_OPTS = [3,4,5,6,7];
function toggleSetting(key, btn){
  S.settings[key] = !S.settings[key];
  const pill = btn && btn.querySelector('.toggle-pill');
  if(pill){ pill.classList.toggle('on', S.settings[key]); pill.textContent = S.settings[key] ? 'ВКЛ' : 'ВЫКЛ'; }
  saveState();
  if(key==='notifications') syncReminder();
}
function setAnsAndRender(key,val,btn){
  S.ans[key]=val;
  if(btn){ btn.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel')); btn.classList.add('sel'); }
  saveState();
}
function rSettings(){
  const a=S.ans, st=S.settings;
  h(`<div class="screen">
    <div class="topbar"><button class="back" onclick="go(S.prevScreen||'map')">‹</button>
      <h2 style="margin:0;font-size:20px">Настройки</h2>
    </div>

    <div class="sub" style="margin-top:6px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Уведомления</div>
    <div class="opts" style="margin-top:10px">
      <button class="toggle-row" onclick="toggleSetting('notifications',this)">
        <span>Уведомления о призыве</span>
        <span class="toggle-pill ${st.notifications?'on':''}">${st.notifications?'ВКЛ':'ВЫКЛ'}</span>
      </button>
      <button class="toggle-row" onclick="toggleSetting('sound',this)">
        <span>Звук</span>
        <span class="toggle-pill ${st.sound?'on':''}">${st.sound?'ВКЛ':'ВЫКЛ'}</span>
      </button>
      <button class="toggle-row" onclick="toggleSetting('vibration',this)">
        <span>Вибрация</span>
        <span class="toggle-pill ${st.vibration?'on':''}">${st.vibration?'ВКЛ':'ВЫКЛ'}</span>
      </button>
    </div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Бой</div>
    <div class="opts" style="margin-top:10px">
      <button class="toggle-row" onclick="toggleSetting('stormMode',this)">
        <span>Штурмовой режим</span>
        <span class="toggle-pill ${st.stormMode?'on':''}">${st.stormMode?'ВКЛ':'ВЫКЛ'}</span>
      </button>
    </div>
    <div class="sub" style="font-size:12.5px;margin-top:8px;line-height:1.4">Без отдыха между мобами — сразу следующий. Лечение то же самое, просто мгновенно, без ожидания таймера.</div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Время ежедневного призыва</div>
    <div style="margin-top:10px">${timeWheelHTML(a.time)}</div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Дней тренировок в неделю</div>
    <div class="chips" style="margin-top:10px">${DAYS_OPTS.map(d=>`
      <button class="chip ${a.days===d?'sel':''}" onclick="setAnsAndRender('days',${d},this)">${d}</button>`).join('')}</div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Приватность</div>
    <div class="syswin" style="margin-top:10px">
      <div class="sys-tag"><span class="bang">i</span> КАМЕРА</div>
      <div class="sub" style="font-size:13px">Видео с камеры никогда не покидает телефон. Распознавание позы (счёт отжиманий и приседаний) считается прямо на устройстве, в браузере — на сервер не передаётся ни один кадр.</div>
    </div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Данные</div>
    <div class="opts" style="margin-top:10px">
      <button class="opt" style="color:var(--danger);border-color:rgba(255,59,92,.35)" onclick="resetProgress()">Сбросить прогресс охотника</button>
    </div>

    <div style="flex:1"></div>
    ${navBar('')}
  </div>`);
  setupTimeWheels(a.time, v=>{ S.ans.time=v; saveState(); syncReminder(); });
}
function resetProgress(){
  sysConfirm('Сбросить весь прогресс охотника? Это действие необратимо.', ()=>{
    stopCombatTick();
    stopRaidCountdown();
    S.level=1; S.xp=0; S.streak=0; S.totalPush=0; S.pushToday=0; S.pushWeek=0;
    S.pushupsTotal=0; S.pushupsToday=0; S.pushupsWeek=0; S.squatsTotal=0; S.squatsToday=0; S.squatsWeek=0;
    S.currentTrack='strength'; S.doneGates=[]; S.doneGatesEndurance=[];
    S.rank='E'; S.justRanked=null; S.justStreakInc=false;
    S.raid=null; S.lastWinDate=null; S.todayDate=null; S.onboarded=false; S.step=0;
    S.titles=[]; S.bestiary={}; S.selectedTitle=null; S.achievements=[]; S.everDied=false;
    // сбрасываем и ответы квиза (имя/возраст/цель и т.д.) — иначе "сброс прогресса"
    // на деле оставлял старый профиль нетронутым
    S.ans = { name:'', exp:null, goal:null, age:25, max:null, days:null, time:null };
    try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
    go('splash');
  });
}

function boot(){
  const hasProfile = loadState();
  ensureDay();
  if(hasProfile) S.screen = 'map'; // профиль уже есть — сразу к карте, минуя онбординг
  tgInit();
  render();
  syncFromCloud();
  if(hasProfile) syncReminder(); // на случай если прошлая отправка не долетела
  trackOpen();
  startPresenceHeartbeat();
}
boot();

</script>
</body>
