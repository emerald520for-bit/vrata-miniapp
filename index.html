<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05070F">
<title>ВРАТА — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<!-- fonts.gstatic.com — реальный хост файлов шрифтов, а не только CSS; без этого preconnect
     соединение к нему открывается на кадр позже, шрифты чуть медленнее -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Telegram Mini App SDK — должен грузиться максимально рано. Вне Telegram
     (обычный браузер) объект window.Telegram просто не появится, весь код
     ниже это учитывает и работает как обычная веб-страница. -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --void:#05070F;
  --panel:rgba(13,18,38,.88);
  --panel-solid:#0D1226;
  --line:#1B2547;
  --sys:#4CC9FF;
  --sys-dim:rgba(76,201,255,.35);
  --mana:#8B5CF6;
  --mana-2:#6D28D9;
  --danger:#FF3B5C;
  --gold:#F5C242;
  --text:#EAF0FF;
  --muted:#8A94B8;
  --ok:#34D399;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  background:#02030A;
  color:var(--text);
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  display:flex;justify-content:center;
  overflow-x:hidden; /* страховка от горизонтального скролла на очень узких экранах */
}
#phone{
  width:100%;max-width:430px;min-height:100vh;min-height:100dvh;
  overflow-x:hidden; /* только X — вертикальный скролл документа не трогаем */
  /* --tg-vh выставляется из JS через Telegram.WebApp.viewportStableHeight —
     внутри Telegram 100vh/100dvh часто не совпадает с реальной видимой
     высотой (учитывает шапку клиента), из-за чего низ экрана обрезался
     или, наоборот, оставалась пустая полоса. Вне Telegram переменная не
     задана — работает обычный dvh-фоллбэк. */
  min-height:var(--tg-vh, 100dvh);
  background-color:var(--void);
  background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(139,92,246,.16), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(76,201,255,.08), transparent 60%);
  position:relative;display:flex;flex-direction:column;
}
/* #root — простой контейнер-обёртка вокруг текущего экрана. Без display:flex
   здесь цепочка flex:1 у #phone → .screen обрывается на этом уровне: #root
   как flex-item в #phone по умолчанию не растягивается по высоте (flex-basis:auto),
   поэтому .screen{flex:1} внутри него ни на что не влияет — экран просто равен
   высоте своего контента. На коротких экранах (Твой путь, профиль и т.п.) это
   давало пустой "хвост" фона под контентом и непредсказуемое место кнопки внизу;
   на длинных (карта врат) — не влияло на факт скролла, но ломало консистентность.
   display:flex тут делает #root прозрачным передаточным звеном цепочки. */
#root{display:flex;flex-direction:column;flex:1;width:100%;min-width:0}
/* Прогрессия по рангу — лёгкий сдвиг оттенка фонового свечения (E фиолетовый →
   D зелёный → C голубой → B фиолетово-золотой → A золотой → S красный). */
#phone[data-rank="D"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(52,211,153,.16), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(76,201,255,.08), transparent 60%); }
#phone[data-rank="C"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(76,201,255,.17), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(139,92,246,.08), transparent 60%); }
#phone[data-rank="B"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(139,92,246,.15), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(245,194,66,.09), transparent 60%); }
#phone[data-rank="A"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(245,194,66,.17), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(255,59,92,.07), transparent 60%); }
#phone[data-rank="S"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(255,59,92,.2), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(245,194,66,.09), transparent 60%); }
/* На широких экранах (планшет/десктоп) колонка 430px иначе теряется на голом
   чёрном фоне — добавляем рамку и лёгкую виньетку вокруг телефона. */
@media (min-width:600px){
  body{ background:radial-gradient(120% 100% at 50% 0%, #0A0E1E, #02030A); padding:32px 0; }
  #phone{ border:1px solid var(--line); border-radius:28px; box-shadow:0 40px 100px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02); }
}
/* Внутри Telegram своя рамка/шапка уже есть — декоративная "карточка телефона"
   поверх неё выглядит лишней. Класс tg-app вешается из JS при обнаружении
   Telegram.WebApp. Специфичность (класс+класс+id) перебивает правило выше
   независимо от порядка объявления. */
/* ВАЖНО: max-width НЕ трогаем — на Telegram Desktop окно мини-аппа может
   быть гораздо шире телефона (пользователь на большом мониторе), и без
   этого ограничения вся фикс-пиксельная вёрстка (карта врат, камера,
   HP-бары) растягивалась на всю ширину окна и ломалась. Убираем только
   декоративную рамку — сама колонка остаётся ~430px и просто центрируется. */
html.tg-app #phone{ border:none; box-shadow:none; border-radius:0; }
html.tg-app body{ padding:0; background:var(--void); }
/* Приложение не адаптировано под ландшафтную ориентацию — на невысоких экранах
   в landscape мягко просим повернуть телефон, а не показываем сломанную вёрстку.
   ВАЖНО: html.kb-open (вешается из JS, пока в фокусе текстовое поле) отключает
   эту заглушку. Когда на телефоне открывается клавиатура, Telegram сжимает
   вьюпорт до ~300-400px высоты — и media-query формально становится
   "landscape" (ширина > высоты): заглушка мгновенно прятала всё приложение,
   поле ввода исчезало из DOM-раскладки, фокус слетал и клавиатура сама
   захлопывалась. Это и был баг "клавиатура открывается и тут же прячется"
   на экране ввода имени (видео пользователя: короткое "затемнение" — это
   вспышка этой самой заглушки). */
.rotate-hint{display:none}
@media (orientation:landscape) and (max-height:500px){
  html:not(.kb-open) #phone{display:none}
  html:not(.kb-open) .rotate-hint{
    display:flex;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;
    text-align:center;padding:24px;background:var(--void);color:var(--text);
    font-family:'Manrope',sans-serif;font-size:15px;line-height:1.5;
  }
}
/* фоновые "частицы маны" */
#phone::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, rgba(139,92,246,.8), transparent),
    radial-gradient(1px 1px at 70% 15%, rgba(76,201,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 85% 55%, rgba(139,92,246,.6), transparent),
    radial-gradient(1px 1px at 35% 75%, rgba(76,201,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 55% 45%, rgba(139,92,246,.5), transparent);
}
.screen{flex:1;display:flex;flex-direction:column;padding:22px 20px calc(20px + env(safe-area-inset-bottom));position:relative;z-index:1}
.screen-fade{animation:fadeIn .35s ease}
/* Раньше здесь ещё был transform:translateY() — убрали: если пользователь
   тапает по текстовому полю, пока родительский .screen ещё анимируется через
   transform, некоторые Android-WebView (в т.ч. клиент Telegram) путаются с
   позиционированием клавиатуры и захлопывают её сразу после открытия. Чистый
   fade по opacity той же проблемы не вызывает. */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* Малые экраны (iPhone SE и т.п.) — колесо и отступы компактнее, чтобы кнопка
   "Далее" на шаге времени не уезжала слишком далеко за пределы видимой области. */
@media (max-height:700px){
  .screen{padding:16px 20px calc(14px + env(safe-area-inset-bottom))}
  .wheel-wrap{height:176px;margin:16px 0}
  .wheel-col{height:176px}
  .wheel-track{padding:66px 0}
  .topbar{margin-bottom:16px}
  h2{margin-bottom:4px}
  /* На совсем невысоких экранах ужимаем ещё и боевой экран — приоритет
     отдаём камере, а не карточке моба над ней. */
  .mob-art{width:84px;height:84px}
  .cam-wrap{max-height:300px}
}

h1,h2,.display{font-family:'Russo One',sans-serif;font-weight:400;letter-spacing:.5px}
h2{font-size:26px;line-height:1.2;margin-bottom:8px}
.sub{color:var(--muted);font-size:15px;line-height:1.45}
.mono{font-family:'JetBrains Mono',monospace}

/* ---- шапка квиза ---- */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:26px}
.back{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.progress{flex:1;height:6px;border-radius:3px;background:var(--line);overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--mana),var(--sys));border-radius:3px;transition:width .4s ease;box-shadow:0 0 10px var(--mana)}

/* ---- системное окно ---- */
.syswin{
  border:1px solid var(--sys-dim);background:var(--panel);border-radius:10px;
  padding:16px 18px;position:relative;
  box-shadow:0 0 24px rgba(76,201,255,.08), inset 0 0 30px rgba(76,201,255,.04);
}
.syswin::before,.syswin::after{content:"";position:absolute;width:14px;height:14px;border-color:var(--sys);border-style:solid}
.syswin::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:10px 0 0 0}
.syswin::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 10px 0}
.sys-tag{display:flex;align-items:center;gap:8px;color:var(--sys);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;margin-bottom:8px}
.sys-tag .bang{width:18px;height:18px;border:1.5px solid var(--sys);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(76,201,255,.5)}50%{box-shadow:0 0 0 6px rgba(76,201,255,0)}}

/* ---- кнопки ---- */
.btn{
  width:100%;padding:17px;border:none;border-radius:16px;cursor:pointer;
  font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:.5px;color:#fff;
  background:linear-gradient(180deg,var(--mana),var(--mana-2));
  box-shadow:0 6px 0 #3B1E7A, 0 0 26px rgba(139,92,246,.35);
  transition:transform .08s, box-shadow .08s, opacity .2s;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #3B1E7A}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.ghost{background:transparent;border:1px solid var(--line);box-shadow:none;color:var(--muted);font-family:'Manrope';font-weight:700;font-size:15px}
.bottom{margin-top:auto;padding-top:18px;display:flex;flex-direction:column;gap:10px}
/* Кнопка "Далее" в квизе — раньше просто margin-top:auto внутри flex-экрана,
   из-за чего на коротких шагах (имя) она стояла у самого низа вьюпорта, а на
   длинных (5 опций) — сразу под контентом, визуально "прыгая" между шагами.
   Приклеиваем к низу вьюпорта всегда, как уже сделано у .nav на карте. */
/* position:sticky зависел от скролл-контекста родителей и на деле не всегда
   прижимался к самому низу вьюпорта (см. скриншоты — то повыше, то пониже).
   position:fixed надёжнее: кнопка всегда в одном и том же месте физического
   экрана, независимо от длины контента и от скролла. left:50%+translateX
   центрирует её той же колонкой 430px, что и #phone (см. body{display:flex;
   justify-content:center}), — на широких экранах/десктопе не растягивается
   на всю ширину окна. */
.quiz-bottom{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:430px;
  padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:var(--void);border-top:1px solid var(--line);z-index:5;
}
/* Резерв места под фиксированную кнопку внизу — иначе последний контент шага
   (особенно длинные списки опций) заезжал бы под неё. */
.quiz-body-pad{padding-bottom:96px}

/* ---- варианты ответов ---- */
.opts{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.opt{
  display:flex;align-items:center;gap:12px;padding:17px 16px;border-radius:14px;
  border:1px solid var(--line);background:var(--panel);cursor:pointer;
  font-weight:700;font-size:16px;color:var(--text);text-align:left;
  transition:border-color .25s ease, box-shadow .25s ease, color .25s ease, transform .12s ease;
}
.opt:active{transform:scale(.97)}
.opt .ico{font-size:18px;width:24px;text-align:center;filter:grayscale(.4)}
.opt .side{margin-left:auto;color:var(--muted);font-size:13px;font-weight:600}
.opt.sel{border-color:var(--mana);color:#CBB7FF;box-shadow:0 0 0 1px var(--mana), 0 0 18px rgba(139,92,246,.35)}
.opt.sel .side{color:#CBB7FF}
input.field{
  width:100%;margin-top:20px;padding:17px 16px;border-radius:14px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);font-size:17px;font-weight:600;outline:none;font-family:'Manrope';
}
input.field:focus{border-color:var(--sys);box-shadow:0 0 14px rgba(76,201,255,.25)}

/* ---- возраст ---- */
.age-picker{display:flex;align-items:center;justify-content:center;gap:22px;margin:42px 0}

/* ---- wheel picker (в стиле iOS) ---- */
.wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center;gap:2px;height:220px;margin:24px 0}
.wheel-col{flex:1;max-width:110px;height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;position:relative;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 32%, #000 68%, transparent 100%);
  mask-image:linear-gradient(to bottom, transparent 0, #000 32%, #000 68%, transparent 100%);}
.wheel-col::-webkit-scrollbar{display:none}
.wheel-track{padding:88px 0}
.wheel-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:22px;color:var(--text);scroll-snap-align:center;will-change:opacity,transform}
.wheel-item.pulse{animation:wheelPulse .3s ease}
@keyframes wheelPulse{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.wheel-highlight{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--sys-dim);border-bottom:1px solid var(--sys-dim);background:rgba(76,201,255,.07);pointer-events:none;border-radius:10px;z-index:0}
.wheel-colon{font-family:'Russo One',sans-serif;font-size:22px;color:var(--muted);padding:0 2px;align-self:center}
.age-btn{width:56px;height:56px;border-radius:16px;border:1px solid var(--line);background:var(--panel);color:var(--sys);font-size:26px;cursor:pointer}
.age-val{font-family:'Russo One';font-size:64px;min-width:120px;text-align:center;color:var(--gold);text-shadow:0 0 24px rgba(245,194,66,.4)}

/* ---- чипы времени ---- */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.chip{padding:12px 18px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-family:'JetBrains Mono';font-size:15px;cursor:pointer;transition:border-color .25s ease, box-shadow .25s ease, color .25s ease, transform .12s ease}
.chip:active{transform:scale(.94)}
.chip.sel{border-color:var(--sys);color:var(--sys);box-shadow:0 0 14px rgba(76,201,255,.25)}

/* ---- онбординг: поза перед камерой ---- */
.pose-card{
  width:100%;border-radius:18px;border:1px solid var(--sys-dim);background:var(--panel);
  padding:18px 14px 6px;margin-top:14px;box-shadow:0 0 24px rgba(76,201,255,.12);
}

/* ---- экран ранга ---- */
.reveal{align-items:center;justify-content:center;text-align:center;gap:18px}
.rankbox{width:150px;height:150px;border-radius:24px;display:flex;align-items:center;justify-content:center;position:relative;margin:10px 0}
.rankbox .glyph{font-family:'Russo One';font-size:86px;color:var(--sys);text-shadow:0 0 34px var(--sys)}
.rankbox::before{content:"";position:absolute;inset:0;border:2px solid var(--sys);border-radius:24px;animation:pulse 2s infinite}
.stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.stat-row b{color:var(--sys)}

/* ---- карта врат ---- */
.map-wrap{margin:0 -20px;padding:10px 20px 30px;position:relative}
.map-inner{position:relative;min-height:900px}
.map-svg{position:absolute;inset:0;width:100%;height:100%}

.mini-path{position:relative;height:130px;margin:6px 0}
.mini-path-svg{position:absolute;inset:0;width:100%;height:100%}
.mini-gate{position:absolute;transform:translate(-50%,-50%)}
.mini-gate-frame{width:46px;height:46px;border-radius:13px;border:2px solid #8B5CF6;background:rgba(13,18,38,.9);display:flex;align-items:center;justify-content:center}
.mini-gate-frame svg{width:30px;height:30px}
.gate-node{position:absolute;width:104px;text-align:center;cursor:pointer;transform:translateX(-50%)}
.gate-frame{
  width:86px;height:86px;margin:0 auto;border-radius:20px;border:2px solid var(--mana);
  background:radial-gradient(ellipse at 50% 60%, rgba(139,92,246,.5), rgba(13,18,38,.95) 70%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 22px rgba(139,92,246,.45), inset 0 0 18px rgba(139,92,246,.35);
}
.gate-frame svg{width:56px;height:56px}
.gate-node.red .gate-frame{border-color:var(--danger);background:radial-gradient(ellipse at 50% 60%, rgba(255,59,92,.5), rgba(13,18,38,.95) 70%);box-shadow:0 0 24px rgba(255,59,92,.5), inset 0 0 18px rgba(255,59,92,.4)}
.gate-node.gold .gate-frame{border-color:var(--gold);background:radial-gradient(ellipse at 50% 60%, rgba(245,194,66,.5), rgba(13,18,38,.95) 70%);box-shadow:0 0 24px rgba(245,194,66,.5), inset 0 0 18px rgba(245,194,66,.4)}
.gate-node.gold .gate-rank{color:var(--gold)}
.gate-node.locked .gate-frame{border-color:var(--line);background:var(--panel);box-shadow:none;filter:grayscale(1);opacity:.55}
.gate-node.done .gate-frame{border-color:var(--ok);box-shadow:0 0 18px rgba(52,211,153,.4)}
.gate-name{margin-top:8px;font-size:12.5px;font-weight:800;line-height:1.25;text-shadow:0 2px 6px #000}
.gate-rank{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--sys);margin-top:2px}
.gate-node.red .gate-rank{color:var(--danger)}
.gate-node.locked .gate-name,.gate-node.locked .gate-rank{color:var(--muted)}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.icon-row{display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .12s ease, border-color .2s ease}
.icon-btn:active{transform:scale(.9)}
.toggle-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;text-align:left;transition:border-color .2s ease, transform .12s ease}
.toggle-row:active{transform:scale(.98)}
.toggle-pill{padding:5px 12px;border-radius:8px;background:var(--line);color:var(--muted);font-family:'JetBrains Mono';font-size:12px;font-weight:700;transition:background .25s ease, color .25s ease}
.toggle-pill.on{background:rgba(52,211,153,.18);color:var(--ok)}
.pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);font-family:'JetBrains Mono';font-size:12px}
.pill b{color:var(--gold)}

/* ---- нижняя навигация ---- */
.nav{display:flex;gap:10px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);margin:6px -20px -22px;position:sticky;bottom:0;background:var(--void);z-index:5}
.nav button{flex:1;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:800;font-size:13px;cursor:pointer}
.nav button.on{color:var(--sys);border-color:var(--sys-dim);box-shadow:0 0 12px rgba(76,201,255,.15)}

/* ---- рейд ---- */
.mob-stage{display:flex;flex-direction:column;align-items:center;margin:8px 0 4px}
.mob-queue{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:2px}
.qmob{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:.9}
.qmob svg{width:20px;height:20px}
.qmob.dead{opacity:.25;filter:grayscale(1)}
.qmob.cur{border-color:var(--gold);box-shadow:0 0 10px rgba(245,194,66,.5)}
.qmob.boss{width:32px;height:32px;border-color:var(--danger)}
.qmob.boss svg{width:24px;height:24px}
.qmob.boss.gold{border-color:var(--gold)}
.lockbadge{position:absolute;bottom:-4px;right:-4px;font-size:16px;background:var(--panel-solid);border:1px solid var(--line);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
/* Портрет моба — круглая рамка (как на референсе игрока), а не просто картинка
   в воздухе. overflow:hidden обрезает mobVisual() в круг, не трогая саму
   функцию — она используется и в других местах (очередь, победа) с другими
   радиусами. */
.mob-art{
  width:104px;height:104px;border-radius:50%;border:3px solid var(--mana);
  background:radial-gradient(ellipse at 50% 40%, rgba(139,92,246,.4), rgba(13,18,38,.95) 75%);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 22px rgba(139,92,246,.45), inset 0 0 16px rgba(0,0,0,.5);
}
.mob-art.hit{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.mob-name{
  font-family:'Russo One';font-size:15px;margin-top:8px;padding:5px 14px;
  border-radius:8px;background:var(--panel);border:1px solid var(--line);
  width:max-content;max-width:90%;
}
/* Полоса HP моба — текст поверх тёмной плашки (как "0/12 HP" на референсе),
   а не число под цветной полосой. Заливка теперь фоновая подсветка внутри
   той же плашки, а не отдельный бар. */
.hp-strip{
  width:100%;height:26px;margin-top:8px;border-radius:8px;background:#0B0E1C;
  border:1px solid var(--line);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.hp-strip i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#FF3B5C,#FF7A5C);opacity:.4;transition:width .5s ease}
.hp-strip span{position:relative;z-index:1;font-family:'JetBrains Mono';font-size:12px;letter-spacing:1px;color:var(--text)}
.hpbar{width:100%;height:10px;border-radius:6px;border:1px solid var(--line);background:#141A33;margin-top:6px;overflow:hidden}
.hpbar i{display:block;height:100%;background:linear-gradient(90deg,#FF3B5C,#FF7A5C);transition:width .5s ease;border-radius:6px}
.hp-num{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
/* HP игрока — зелёная полоса, отдельно от красной полосы моба (та же .hpbar,
   просто другой цвет заливки), чтобы два бара не путались между собой. */
.hpbar.player i{background:linear-gradient(90deg,#1FAE71,#34D399)}
.hp-num.player{color:var(--ok);text-align:left}
.set-info{text-align:center;margin:20px 0 8px}
.set-info .big{font-family:'Russo One';font-size:58px;color:var(--gold);text-shadow:0 0 26px rgba(245,194,66,.35);line-height:1}
.set-info .lbl{color:var(--muted);font-size:14px;margin-top:6px}

/* ---- камера-счётчик отжиманий ---- */
.cam-wrap{position:relative;width:100%;aspect-ratio:3/4;max-height:360px;border-radius:16px;overflow:hidden;border:1px solid var(--sys-dim);background:#000;margin-top:14px;box-shadow:0 0 24px rgba(76,201,255,.12)}
.cam-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.cam-wrap canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cam-status{position:absolute;left:0;right:0;bottom:0;padding:9px 12px;background:linear-gradient(0deg, rgba(2,3,10,.9), transparent);color:var(--sys);font-family:'JetBrains Mono';font-size:11.5px;text-align:center;letter-spacing:.4px}
.cam-fallback{position:absolute;inset:0;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;padding:22px;text-align:center;color:var(--muted);font-size:13.5px;background:var(--panel-solid)}
.cam-fallback .btn{width:auto;padding:12px 22px}
/* Отсчёт перед боем — поверх превью камеры, чтобы было видно и себя, и цифру:
   время поставить телефон и встать в позицию, прежде чем начнётся урон. */
.raid-countdown{
  position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
  background:rgba(2,3,10,.5);font-family:'Russo One',sans-serif;font-size:96px;color:var(--gold);
  text-shadow:0 0 34px rgba(245,194,66,.6);animation:countPulse .3s ease;
}
@keyframes countPulse{0%{transform:scale(1.35);opacity:0}100%{transform:scale(1);opacity:1}}
.raid-countdown-sub{position:absolute;bottom:14%;left:0;right:0;text-align:center;font-family:'Manrope',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);text-shadow:0 2px 8px rgba(0,0,0,.7)}
/* Счётчик отжиманий за весь текущий заход во врата — снизу слева поверх камеры,
   обновляется на каждое повторение (см. registerPush()/updateRepCounterDOM()). */
.rep-counter{
  position:absolute;left:12px;bottom:12px;z-index:3;width:52px;height:52px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%, rgba(245,194,66,.95), rgba(184,134,11,.95) 70%);
  border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:'Russo One';font-size:21px;color:#1A1204;box-shadow:0 0 18px rgba(245,194,66,.6);
}
/* Плашка "враг повержен" — поверх камеры на пару секунд сразу после убийства
   моба, пока не сменился экран (см. showKillBanner() в registerPush()). */
.kill-banner{
  position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;background:rgba(2,3,10,.4);animation:killPop .35s ease;
}
.kill-skull{font-size:32px;filter:drop-shadow(0 0 10px rgba(255,59,92,.7))}
.kill-text{
  font-family:'Russo One',sans-serif;font-size:32px;line-height:1.08;text-align:center;color:#FF3B5C;
  text-shadow:0 0 18px rgba(255,59,92,.85), 0 0 40px rgba(255,59,92,.5);letter-spacing:1px;
}
@keyframes killPop{0%{transform:scale(1.3);opacity:0}100%{transform:scale(1);opacity:1}}
.dots{display:flex;gap:8px;justify-content:center;margin-top:14px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line)}
.dot.done{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.cur{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.rest-timer{font-family:'Russo One';font-size:64px;text-align:center;color:var(--sys);text-shadow:0 0 26px rgba(76,201,255,.4);margin:8px 0}
.dmg-float{position:absolute;font-family:'Russo One';font-size:30px;color:var(--gold);text-shadow:0 0 14px rgba(245,194,66,.6);animation:floatUp 1s forwards;pointer-events:none}
.dmg-float.xp-float{font-size:16px;color:var(--sys);text-shadow:0 0 10px rgba(76,201,255,.6);animation-delay:.1s}
@keyframes floatUp{to{transform:translateY(-70px);opacity:0}}

/* ---- победа ---- */
.loot{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.loot .card{width:86px;padding:12px 6px;border-radius:14px;border:1px solid var(--sys-dim);background:var(--panel);text-align:center}
.loot .card .v{font-family:'Russo One';font-size:20px;color:var(--gold)}
.loot .card .k{font-size:11px;color:var(--muted);margin-top:4px}
.xpbar{width:100%;height:12px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:8px}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--sys),var(--mana));border-radius:6px;transition:width 1.2s ease}

/* ---- профиль ---- */
.profile-head{display:flex;align-items:center;gap:16px;margin:8px 0 18px}
.avatar{width:74px;height:74px;border-radius:20px;border:2px solid var(--sys);display:flex;align-items:center;justify-content:center;font-family:'Russo One';font-size:36px;color:var(--sys);box-shadow:0 0 20px rgba(76,201,255,.3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.gcard{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px}
.gcard .v{font-family:'Russo One';font-size:24px;color:var(--gold)}
.gcard .k{font-size:12px;color:var(--muted);margin-top:4px}
.gold{color:var(--gold)}.cy{color:var(--sys)}.vio{color:#CBB7FF}
</style>
</head>
<body>
<div id="phone"><div id="root"></div></div>
<div class="rotate-hint">Разверни телефон вертикально — «Врата» рассчитаны на портретную ориентацию.</div>
<script>
/* ============ СОСТОЯНИЕ ============ */
const S = {
  screen: 'splash',
  step: 0,
  ans: { name:'', exp:null, goal:null, age:25, max:null, days:null, time:null },
  rank: 'E',
  level: 1, xp: 20, streak: 0, totalPush: 0,
  pushToday: 0, pushWeek: 0,
  doneGates: [],
  raid: null,
  justRanked: null,
  justStreakInc: false,
  settings: { notifications:true, sound:true, vibration:true },
  prevScreen: 'map',
  _navDir: 0,
  onboarded: false,
  lastWinDate: null,
  todayDate: null,
};

/* ============ TELEGRAM MINI APP ============ */
// initData пустая строка вне Telegram (открыто как обычная веб-страница) —
// по ней и отличаем реальный запуск внутри клиента Telegram от браузера.
// Весь код ниже аккуратно проверяет TG на существование, поэтому страница
// продолжает нормально работать и как обычный сайт вне Telegram.
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
const inTelegram = !!(TG && TG.initData);
// Пока в фокусе текстовое поле, не трогаем --tg-vh вообще — судя по видео от
// пользователя, именно пересчёт высоты вьюпорта прямо во время анимации
// системной клавиатуры на Android-клиенте Telegram и обрывает её (клавиатура
// открывается и тут же схлопывается сама, с лёгким затемнением экрана —
// похоже на конфликт двух ресайзов подряд). focusin/focusout всплывают,
// поэтому один обработчик на document ловит любое текстовое поле, не только
// текущее (имя) — на будущее тоже.
let viewportSuppressed = false;
// kb-open на <html> дополнительно отключает landscape-заглушку "разверни
// телефон" — при открытой клавиатуре сжатый Telegram'ом вьюпорт формально
// становится "ландшафтным", и без этого класса заглушка прятала всё
// приложение вместе с полем ввода, обрывая фокус (см. комментарий в CSS).
document.addEventListener('focusin', e=>{ if(e.target && e.target.tagName==='INPUT'){ viewportSuppressed = true; document.documentElement.classList.add('kb-open'); } });
document.addEventListener('focusout', e=>{ if(e.target && e.target.tagName==='INPUT'){ viewportSuppressed = false; document.documentElement.classList.remove('kb-open'); } });
function applyTgViewport(e){
  if(!TG || viewportSuppressed) return;
  // Telegram шлёт viewportChanged несколько раз подряд во время анимации
  // (isStateStable:false), и только последний раз — когда высота уже
  // устоялась. Реагируем только на финальное событие, а не на каждое
  // промежуточное — так же советует делать официальная документация Bot API.
  if(e && e.isStateStable===false) return;
  const hpx = TG.viewportStableHeight || TG.viewportHeight;
  if(hpx) document.documentElement.style.setProperty('--tg-vh', hpx+'px');
}
/* Экран → куда ведёт нативная кнопка "назад" в шапке Telegram. Полностью
   повторяет логику собственных стрелок "‹" на каждом экране — в мини-аппе
   нет браузерного "назад", и системная кнопка должна вести туда же, иначе
   получится два разных способа выйти с разным результатом. */
function tgBack(){
  switch(S.screen){
    case 'quiz': if(S.step===0){ go('splash'); } else { S._navDir=-1; S.step--; render(); } return;
    case 'journey': go('reveal'); return;
    case 'raid': go('map'); return;
    case 'settings': go(S.prevScreen||'map'); return;
    default: return; // на splash/reveal/map/rest/victory/profile своей стрелки нет — прячем и нативную
  }
}
function updateTgBackButton(){
  if(!TG || !TG.BackButton) return;
  const show = ['quiz','journey','raid','settings'].includes(S.screen);
  try{ show ? TG.BackButton.show() : TG.BackButton.hide(); }catch(e){}
}
/* Блокировка свайпа-вниз нужна ТОЛЬКО во время подхода — иначе на экранах с
   текстовым вводом (например, имя в квизе) она, судя по всему, конфликтует
   с открытием клавиатуры в Android-клиенте Telegram: клавиатура на долю
   секунды всплывает и тут же захлопывается. Включаем блокировку точечно
   только на raid/rest (там же живёт камера), на всех остальных экранах
   свайп остаётся обычным. */
function updateSwipeLock(){
  if(!TG) return;
  const lock = S.screen==='raid' || S.screen==='rest';
  try{
    if(lock){ if(TG.disableVerticalSwipes) TG.disableVerticalSwipes(); }
    else { if(TG.enableVerticalSwipes) TG.enableVerticalSwipes(); }
  }catch(e){}
}
/* Тактильный отклик через нативный API Telegram вместо голого navigator.vibrate —
   у встроенного в клиент WebView он либо не поддержан, либо требует разрешений,
   которых у мини-аппа просто нет. Вне Telegram тихо откатываемся на vibrate. */
function hapticImpact(style){
  if(TG && TG.HapticFeedback){ try{ TG.HapticFeedback.impactOccurred(style||'medium'); return; }catch(e){} }
  if(navigator.vibrate){ try{ navigator.vibrate(style==='heavy'?[40,30,60]:35); }catch(e){} }
}

/* ============ ЗВУК УДАРА ============ */
// Общий AudioContext создаётся и "разблокируется" на первый же тап где угодно
// в приложении — браузеры/Telegram WebView запрещают звук без явного жеста
// пользователя. Ко входу в рейд (а до него всегда есть тапы по квизу/карте)
// звук уже готов работать без дополнительных действий игрока.
let audioCtx = null;
function ensureAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  return audioCtx;
}
document.addEventListener('pointerdown', ensureAudioCtx, { once:true });
/* Короткий синтезированный "удар" по мобу — без внешних аудиофайлов (тот же
   принцип, что и с локально нарисованной картинкой врат: ничего стороннего
   не подключаем). Падающий тон + быстрый экспоненциальный спад громкости —
   компактный "чпок", не режет слух при частых повторах. На добивающий удар
   (heavy) тон ниже, дольше и громче — читается как более весомый импакт. */
function playHitSound(heavy){
  if(!S.settings.sound) return;
  const ctx = ensureAudioCtx(); if(!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(heavy?220:340, now);
  osc.frequency.exponentialRampToValueAtTime(heavy?90:150, now+0.11);
  gain.gain.setValueAtTime(heavy?0.22:0.14, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+(heavy?0.22:0.13));
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now+(heavy?0.24:0.15));
}
function tgInit(){
  if(!TG) return;
  try{
    TG.ready();
    TG.expand();
    // Свайп блокируется точечно из updateSwipeLock() (см. render()) — только
    // на экранах подхода, не глобально при старте (см. комментарий там же).
    if(TG.setHeaderColor) TG.setHeaderColor('#05070F');
    if(TG.setBackgroundColor) TG.setBackgroundColor('#05070F');
    document.documentElement.classList.add('tg-app');
    applyTgViewport();
    TG.onEvent('viewportChanged', applyTgViewport);
    TG.BackButton.onClick(tgBack);
  }catch(e){ console.warn('Telegram WebApp init не удался', e); }
}

/* ============ СОХРАНЕНИЕ ПРОГРЕССА (localStorage + Telegram CloudStorage) ============ */
const SAVE_KEY = 'vrata_save_v1';
function saveState(){
  const payload = JSON.stringify({
    ans:S.ans, rank:S.rank, level:S.level, xp:S.xp, streak:S.streak,
    totalPush:S.totalPush, pushToday:S.pushToday, pushWeek:S.pushWeek,
    doneGates:S.doneGates, settings:S.settings,
    lastWinDate:S.lastWinDate, todayDate:S.todayDate, onboarded:S.onboarded,
  });
  try{ localStorage.setItem(SAVE_KEY, payload); }catch(e){ /* приватный режим и т.п. — просто не сохраняем локально */ }
  // CloudStorage синхронизирует прогресс между устройствами одного аккаунта
  // Telegram; localStorage выше остаётся быстрым локальным кэшем на случай,
  // если CloudStorage недоступен или это вообще не Telegram. Лимит Bot API —
  // 4096 символов на значение, при переполнении просто не шлём в облако.
  if(TG && TG.CloudStorage && payload.length < 4000){
    try{ TG.CloudStorage.setItem(SAVE_KEY, payload, ()=>{}); }catch(e){}
  }
}
function applyStateFromRaw(raw){
  try{
    const data = JSON.parse(raw);
    Object.assign(S.ans, data.ans||{});
    S.rank = data.rank || 'E';
    S.level = data.level || 1;
    S.xp = data.xp || 0;
    S.streak = data.streak || 0;
    S.totalPush = data.totalPush || 0;
    S.pushToday = data.pushToday || 0;
    S.pushWeek = data.pushWeek || 0;
    S.doneGates = data.doneGates || [];
    Object.assign(S.settings, data.settings||{});
    S.lastWinDate = data.lastWinDate || null;
    S.todayDate = data.todayDate || null;
    S.onboarded = !!data.onboarded;
    return true;
  }catch(e){ return false; }
}
function loadState(){
  const raw = (function(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } })();
  if(!raw) return false;
  return applyStateFromRaw(raw) && S.onboarded;
}
/* Догружаем облачную копию уже ПОСЛЕ первого рендера с локальными данными —
   приложение открывается мгновенно, не дожидаясь round-trip к серверам
   Telegram. Если там лежит более свежий профиль (играли с другого устройства),
   тихо подменяем состояние и перерисовываем экран. */
function syncFromCloud(){
  if(!TG || !TG.CloudStorage) return;
  try{
    TG.CloudStorage.getItem(SAVE_KEY, (err, value)=>{
      if(err || !value) return;
      const localRaw = (function(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } })();
      if(value === localRaw) return; // уже синхронизировано — лишний рендер не нужен
      if(applyStateFromRaw(value)){
        try{ localStorage.setItem(SAVE_KEY, value); }catch(e){}
        if(S.onboarded && S.screen!=='raid' && S.screen!=='rest'){ S.screen='map'; render(); }
      }
    });
  }catch(e){}
}

/* ============ WHEEL PICKER (в стиле iOS) ============ */
const AGE_VALUES = Array.from({length:80-14+1}, (_,i)=>14+i);
const HOUR_VALUES = Array.from({length:12}, (_,i)=>i+1);
const MIN_VALUES = Array.from({length:60}, (_,i)=> i<10?'0'+i:''+i);
const AMPM_VALUES = ['AM','PM'];

function parseTime12(str){
  if(str){
    let m = /^(\d{1,2}):(\d{2})\s*(AM|PM)$/i.exec(str.trim());
    if(m) return { h:Number(m[1]), m:m[2], ampm:m[3].toUpperCase() };
    m = /^(\d{1,2}):(\d{2})$/.exec(str.trim()); // поддержка старого 24-часового формата
    if(m){ let hh=Number(m[1]); const ampm = hh>=12 ? 'PM':'AM'; hh=hh%12; if(hh===0) hh=12; return { h:hh, m:m[2], ampm }; }
  }
  return { h:6, m:'00', ampm:'PM' };
}

function wheelColHTML(id, items, selectedIdx){
  const rows = items.map(v=>`<div class="wheel-item">${v}</div>`).join('');
  return `<div class="wheel-col" id="${id}" data-idx="${selectedIdx}"><div class="wheel-track">${rows}</div></div>`;
}

function smoothScrollTo(el, top){
  // На очень старых движках scrollTo({behavior:'smooth'}) может бросить исключение —
  // откатываемся на мгновенный scrollTop.
  try{ el.scrollTo({top, behavior:'smooth'}); }
  catch(e){ el.scrollTop = top; }
}
function setupWheel(elId, values, initialIndex, onSettle){
  const el = document.getElementById(elId);
  if(!el) return;
  const items = [...el.querySelectorAll('.wheel-item')];
  function itemHeight(){ return items[0] ? items[0].offsetHeight : 44; }
  function applyStyle(){
    const centerScroll = el.scrollTop + el.clientHeight/2;
    items.forEach(it=>{
      const itemCenter = it.offsetTop + it.offsetHeight/2;
      const d = Math.abs(itemCenter-centerScroll);
      it.style.opacity = Math.max(.18, 1-d/95);
      it.style.transform = `scale(${Math.max(.72, 1-d/230)})`;
    });
  }
  let raf=null;
  function settle(isInit){
    const itemH = itemHeight();
    if(!itemH) return;
    let idx = Math.round(el.scrollTop/itemH);
    idx = Math.max(0, Math.min(values.length-1, idx));
    const target = idx*itemH;
    if(Math.abs(el.scrollTop-target)>0.5) smoothScrollTo(el, target);
    // На самой первой инициализации колеса просто фиксируем позицию —
    // без вызова onSettle/пульса, иначе выбор "срабатывает" сам по себе,
    // хотя пользователь ещё ничего не крутил (было видно как двойной settle()).
    if(isInit) return;
    onSettle(values[idx], idx);
    const centerItem = items[idx];
    if(centerItem){ centerItem.classList.add('pulse'); setTimeout(()=>centerItem.classList.remove('pulse'), 300); }
  }
  el.addEventListener('scroll', ()=>{
    if(!raf) raf = requestAnimationFrame(()=>{ applyStyle(); raf=null; });
    clearTimeout(el._settleT);
    el._settleT = setTimeout(()=>settle(false), 130);
  });
  // Позиционирование колеса откладываем на следующий кадр отрисовки: если экран
  // ещё находится в процессе slide-перехода (hAnimated), к этому моменту layout
  // уже гарантированно посчитан и высоты элементов не "плавают" — раньше на
  // медленных телефонах колесо иногда успевало прыгнуть не на то значение.
  requestAnimationFrame(()=>{
    const itemH = itemHeight();
    el.scrollTop = initialIndex*itemH;
    applyStyle();
    settle(true);
  });
}

function timeWheelHTML(defaultVal){
  const p = parseTime12(defaultVal);
  return `<div class="wheel-wrap">
    <div class="wheel-highlight"></div>
    ${wheelColHTML('wheelHour', HOUR_VALUES, HOUR_VALUES.indexOf(p.h))}
    <div class="wheel-colon">:</div>
    ${wheelColHTML('wheelMin', MIN_VALUES, MIN_VALUES.indexOf(p.m))}
    ${wheelColHTML('wheelAmpm', AMPM_VALUES, AMPM_VALUES.indexOf(p.ampm))}
  </div>`;
}
function setupTimeWheels(defaultVal, onChange){
  const p = parseTime12(defaultVal);
  const state = { h:p.h, m:p.m, ampm:p.ampm };
  function commit(){ onChange(`${state.h}:${state.m} ${state.ampm}`); }
  setupWheel('wheelHour', HOUR_VALUES, HOUR_VALUES.indexOf(p.h), v=>{ state.h=v; commit(); });
  setupWheel('wheelMin', MIN_VALUES, MIN_VALUES.indexOf(p.m), v=>{ state.m=v; commit(); });
  setupWheel('wheelAmpm', AMPM_VALUES, AMPM_VALUES.indexOf(p.ampm), v=>{ state.ampm=v; commit(); });
}

/* ---- генератор HP: 5 значений плавно растущих от lo до hi ---- */
function spread(lo, hi, n=5){
  const out=[];
  for(let i=0;i<n;i++) out.push(Math.round(lo + i*(hi-lo)/(n-1)));
  return out;
}
function regularMobs(lo,hi,name,kind){
  return spread(lo,hi).map(hp=>({ maxHp:hp, name, kind }));
}
function bossMobs(trashLo,trashHi,bossHp,trashName,bossName,kind){
  const trash = spread(trashLo,trashHi).map(hp=>({ maxHp:hp, name:trashName, kind, isBoss:false }));
  return [...trash, { maxHp:bossHp, name:bossName, kind, isBoss:true }];
}

/* ---- сборка полной карты врат по конфигурации рангов ---- */
const GATES = (function build(){
  const gates=[]; let r=0;
  RANK_DEFS.forEach((def,rankIdx)=>{
    const hiList=[];
    for(let i=0;i<def.regularCount;i++){
      const lo=3+r, hi=6+r; hiList.push(hi); r++;
      gates.push({ name:def.regularNames[i], rank:def.rank, stage:'regular', gateColor:'violet',
        mobs:regularMobs(lo,hi,def.regularMobNames[i],def.regularKinds[i]) });
    }
    const half = Math.ceil(def.regularCount/2);
    const Htrial = hiList[half-1];
    const Hexam = hiList[hiList.length-1];
    gates.push({ name:'Испытание: '+def.trial.bossName, rank:def.rank, stage:'trial', gateColor:'gold',
      mobs:bossMobs(Htrial+2,Htrial+4,Htrial+4+2, def.trial.trashName, def.trial.bossName, def.trial.kind) });
    gates.push({ name:'Красные врата '+ROMAN[rankIdx], rank:def.rank, stage:'exam', gateColor:'red', red:true,
      mobs:bossMobs(Hexam+5,Hexam+7,Hexam+7+4, def.exam.trashName, def.exam.bossName, def.exam.kind) });
  });
  gates.push({ name:'Бесконечные врата', rank:'S', locked:true });
  return gates.map((g,i)=>({ id:i, ...g }));
})();

function mobVisual(kind, size=170, name){
  const img = (name && MOB_IMAGES[kind+'|'+name]) || MOB_IMAGES[kind];
  if(img){
    const r = size<50 ? 8 : 16;
    return `<img src="${img}" width="${size}" height="${size}" style="object-fit:cover;border-radius:${r}px;display:block" alt="">`;
  }
  return mobSVG(kind, size);
}

  const bodies = {

function gateSVG(color){
  const map = { violet:'#8B5CF6', gold:'#F5C242', red:'#FF3B5C' };
  const c = map[color] || map.violet;
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="30" cy="32" rx="16" ry="24" fill="${c}" opacity=".28"/>
    <ellipse cx="30" cy="32" rx="16" ry="24" fill="none" stroke="${c}" stroke-width="2.5"/>
    <ellipse cx="30" cy="32" rx="8" ry="14" fill="${c}" opacity=".5">
      <animate attributeName="opacity" values=".5;.9;.5" dur="2.4s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M30 4 L34 12 M30 4 L26 12" stroke="${c}" stroke-width="2"/>
  </svg>`;
}

/* ============ УТИЛИТЫ ============ */
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* Своя модалка подтверждения вместо window.confirm() — в некоторых мобильных
   webview нативный confirm() блокируется/игнорируется, и кнопка молча не срабатывает. */
/* Пока открыт диалог подтверждения (например "Отступить из врат?"), бой на
   заднем плане приостанавливается — иначе можно было бы неожиданно умереть,
   просто читая вопрос "точно ли ты хочешь отступить". */
let modalOpenCount = 0;
function sysConfirm(message, onConfirm){
  modalOpenCount++;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(2,3,10,.72);padding:24px';
  wrap.innerHTML = `<div class="syswin" style="max-width:340px;width:100%;background:var(--panel-solid)">
    <div class="sys-tag"><span class="bang">!</span> ПОДТВЕРЖДЕНИЕ</div>
    <div style="font-size:14px;line-height:1.5;margin-bottom:16px">${escapeHtml(message)}</div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" style="margin:0">Отмена</button>
      <button class="btn" style="margin:0;background:linear-gradient(180deg,var(--danger),#B0203A);box-shadow:0 6px 0 #7A1428, 0 0 26px rgba(255,59,92,.35)">Да</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const [cancelBtn, yesBtn] = wrap.querySelectorAll('button');
  const close = ()=>{ wrap.remove(); modalOpenCount = Math.max(0, modalOpenCount-1); };
  wrap.addEventListener('click', e=>{ if(e.target===wrap) close(); });
  cancelBtn.onclick = close;
  yesBtn.onclick = ()=>{ close(); onConfirm(); };
}

/* Короткий тост снизу экрана — например для тапа по заблокированным вратам. */
function showToast(msg){
  const old = document.getElementById('sysToast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.id = 'sysToast';
  t.style.cssText = "position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:60;max-width:86%;padding:12px 18px;border-radius:12px;background:var(--panel-solid);border:1px solid var(--line);color:var(--text);font-size:13.5px;font-weight:700;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:'Manrope',sans-serif;animation:fadeIn .2s ease";
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.remove(), 2200);
}

/* Кнопка "Далее" в квизе — отдельный persistent-узел ВНЕ #root (как sysConfirm/
   showToast выше), а не часть innerHTML, который перерисовывает rQuiz(). Так
   position:fixed всегда считается от вьюпорта: если бы кнопка была внутри
   .screen, который во время hAnimated()-перехода получает CSS transform,
   она на время анимации "перепривязывалась" бы к этому transform-предку
   вместо вьюпорта (так работает position:fixed по спецификации) и могла бы
   на мгновение съезжать. Здесь просто показываем/прячем и точечно обновляем
   disabled, без пересоздания. */
let quizBottomEl = null;
function ensureQuizBottomEl(){
  if(quizBottomEl) return quizBottomEl;
  quizBottomEl = document.createElement('div');
  quizBottomEl.className = 'quiz-bottom';
  quizBottomEl.style.display = 'none';
  quizBottomEl.innerHTML = `<button id="nextBtn" class="btn" onclick="nextStep()">Далее</button>`;
  document.body.appendChild(quizBottomEl);
  return quizBottomEl;
}
function quizStepFilled(){
  const q = QUIZ[S.step]; if(!q) return false;
  return q.type==='age' || q.type==='info' || q.type==='pose' || (q.type==='input' ? !!S.ans.name.trim() : S.ans[q.id]!=null);
}
function renderQuizBottom(){
  if(S.screen!=='quiz'){ if(quizBottomEl) quizBottomEl.style.display='none'; return; }
  const el = ensureQuizBottomEl();
  el.style.display='';
  const btn = document.getElementById('nextBtn');
  if(btn) btn.disabled = !quizStepFilled();
}

/* ============ РЕНДЕР ============ */
const root = document.getElementById('root');
function h(html){
  // Защита от «залипших» инлайн-стилей: если экран сменился, пока не отработал
  // 340-мс таймер очистки в hAnimated() (см. ниже), root мог остаться с
  // overflow:hidden/min-height от предыдущего слайд-перехода квиза — тогда новый
  // экран рисуется внутри этой обрезанной коробки и визуально "не влезает"/не
  // скроллится. Явный сброс перед каждой обычной отрисовкой убирает этот риск.
  root.style.cssText = '';
  root.innerHTML = html; root.className=''; const el=root.firstElementChild; if(el) el.classList.add('screen-fade');
}
function go(screen){
  // Камера/детектор нужны только на экранах боя и отдыха между мобами —
  // при уходе куда-либо ещё (отступление, победа, карта) сразу освобождаем стрим.
  if(screen!=='raid' && screen!=='rest') stopCamera();
  S.screen = screen; render(); saveState();
}

/* ---- слайд-переход между шагами квиза (вперёд/назад), как в нативных приложениях ---- */
function hAnimated(html, direction){
  const oldEl = root.firstElementChild;
  if(!oldEl){ h(html); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const newEl = tmp.firstElementChild;
  const oldH = oldEl.getBoundingClientRect().height;

  root.style.position = 'relative';
  root.style.minHeight = oldH+'px';
  root.style.overflow = 'hidden';

  oldEl.style.position='absolute'; oldEl.style.top='0'; oldEl.style.left='0'; oldEl.style.width='100%';
  newEl.style.position='absolute'; newEl.style.top='0'; newEl.style.left='0'; newEl.style.width='100%';
  newEl.style.transform = `translateX(${direction>0?100:-100}%)`;
  newEl.style.opacity='0';
  root.appendChild(newEl);

  const newH = newEl.getBoundingClientRect().height;
  root.style.minHeight = Math.max(oldH,newH)+'px';
  void newEl.offsetHeight; // форсируем reflow перед стартом transition

  const easing = 'cubic-bezier(.4,0,.2,1)';
  oldEl.style.transition = `transform .34s ${easing}, opacity .34s ${easing}`;
  newEl.style.transition = `transform .34s ${easing}, opacity .34s ${easing}`;

  requestAnimationFrame(()=>{
    oldEl.style.transform = `translateX(${direction>0?-28:28}%)`;
    oldEl.style.opacity='0';
    newEl.style.transform = 'translateX(0)';
    newEl.style.opacity='1';
  });

  setTimeout(()=>{
    oldEl.remove();
    root.style.position=''; root.style.minHeight=''; root.style.overflow='';
    newEl.style.position=''; newEl.style.top=''; newEl.style.left=''; newEl.style.width='';
    newEl.style.transform=''; newEl.style.transition=''; newEl.style.opacity='';
  }, 340);
}

function render(){
  const phoneEl = document.getElementById('phone');
  if(phoneEl) phoneEl.setAttribute('data-rank', S.rank); // фон-атмосфера сдвигается по рангу
  // Слайд-переход между шагами квиза сохраняет текущую позицию скролла (double-buffer
  // на месте) — принудительный scrollTo(0,0) в этом случае только даёт лишний рывок.
  const isSlideTransition = S.screen==='quiz' && !!S._navDir;
  ({
    splash: rSplash, quiz: rQuiz, reveal: rReveal, journey: rJourney,
    map: rMap, raid: rRaid, rest: rRest, victory: rVictory, profile: rProfile, settings: rSettings,
    death: rDeath
  })[S.screen]();
  updateTgBackButton();
  updateSwipeLock();
  renderQuizBottom(); // на не-квиз экранах прячет persistent-кнопку "Далее" (см. выше)
  if(!isSlideTransition) window.scrollTo(0,0);
}

/* ---- 2. Квиз ---- */
function rQuiz(){
  const q = QUIZ[S.step];
  const pct = Math.round(((S.step)/QUIZ.length)*100)+6;
  let body='';
  if(q.type==='input'){
    // onfocus/onblur — защита от редкого глюка Android-клиента Telegram, когда
    // клавиатура открывается и тут же захлопывается сама (см. updateSwipeLock()
    // выше — основная причина уже устранена, это просто подстраховка):
    // если поле теряет фокус быстрее чем за 400мс и всё ещё пустое, пробуем
    // вернуть фокус ещё раз.
    body = `<input class="field" id="nameField" placeholder="${q.ph}" value="${escapeHtml(S.ans.name)}" maxlength="14"
      autocomplete="off" autocorrect="off"
      onfocus="this.dataset.focusedAt=Date.now()"
      onblur="if(!this.value && Date.now()-(+this.dataset.focusedAt||0)<400){ const t=this; setTimeout(()=>{ if(document.body.contains(t)) t.focus(); },50); }"

  }
  if(q.type==='info'){

  if(S._navDir){ hAnimated(stepHtml, S._navDir); S._navDir=0; } else { h(stepHtml); }

root.addEventListener('click', (e)=>{

/* ---- 3.5 Объяснение пути ---- */
function miniPathHTML(count=6){
  const colorMap = { violet:'#8B5CF6', gold:'#F5C242', red:'#FF3B5C' };
  const gates = GATES.slice(0, count);
  const n = gates.length;
  const pts = gates.map((g,i)=>({ x: (i/(n-1))*100, y: i%2===0 ? 28 : 74 }));
  let path='';
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    path += `M ${a.x} ${a.y} C ${(a.x+b.x)/2} ${a.y}, ${(a.x+b.x)/2} ${b.y}, ${b.x} ${b.y} `;
  }
  const nodes = gates.map((g,i)=>{
    const p=pts[i], c=colorMap[g.gateColor]||colorMap.violet;
    return `<div class="mini-gate" style="left:${p.x}%;top:${p.y}%">
      <div class="mini-gate-frame" style="border-color:${c};box-shadow:0 0 14px ${c}66, inset 0 0 10px ${c}44">${gateSVG(g.gateColor)}</div>
    </div>`;
  }).join('');
  return `<div class="mini-path">
    <svg class="mini-path-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="${path}" fill="none" stroke="#2A3560" stroke-width="3" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      <path d="${path}" fill="none" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    </svg>
    ${nodes}
  </div>
  <div class="sub" style="font-size:12px;margin-top:6px">${gates[0].name} → ${gates[gates.length-1].name}</div>`;
}
function rJourney(){
  // Раньше блок с путём стоял в flex:1/justify-content:center — на невысоких
  // экранах он зависел от "лишнего" места во flex-цепочке, которого могло не
