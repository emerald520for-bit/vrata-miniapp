/* Бонус опыта на Exam-вратах: System форсирует прорыв игрока через уровневый порог ранга.
   Множитель подобран так, чтобы прохождение экзамена гарантированно поднимало
   уровень игрока минимум до RANK_LEVEL_TARGET текущего ранга. */
const EXAM_XP_MULT = { E:2.6, D:1, C:1, B:1, A:1 };
function xpMultiplierFor(gate){
  return gate.stage==='exam' ? (EXAM_XP_MULT[gate.rank]||1) : 1;
}
function gainXP(amount){
  S.xp += amount;
  while(S.xp>=100){ S.xp-=100; S.level++; }
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
/* Сбрасывает "сегодня"/"неделя" при смене календарного дня — иначе счётчики
   в профиле продолжали бы расти вечно после полуночи. */
function ensureDay(){
  const today = todayStr();
  if(S.todayDate !== today){
    S.pushToday = 0;
    if(new Date().getDay()===1) S.pushWeek = 0; // понедельник — новая неделя
    S.todayDate = today;
  }
}

/* Каждый распознанный камерой повтор = 1 удар по мобу (1 отжимание = 1 урон).
   XP начисляется одним куском в момент убийства моба (как и раньше), чтобы не
   ломать округлением аккуратно откалиброванный EXAM_XP_MULT по рангам. */
function registerPush(){
  const r=S.raid; if(!r) return;
  if(!r.started) return; // идёт отсчёт перед боем — повторы ещё не считаются
  const m=r.mobs[r.idx]; if(!m || m.hp<=0) return;
  m.hp = Math.max(0, m.hp-1);
  r.reps = (r.reps||0) + 1; // счётчик за весь заход — растёт независимо от replay/наград
  updateRepCounterDOM();
  if(!r.replay){ S.totalPush++; S.pushToday++; S.pushWeek++; }
  updateRaidDOM();
  if(S.settings.vibration) hapticImpact(m.hp<=0 ? 'heavy' : 'medium');
  if(m.hp<=0){
    if(!r.replay){
      const xpGain = Math.round(m.maxHp * xpMultiplierFor(r.gate));
      gainXP(xpGain);
      r.xpGained = (r.xpGained||0) + xpGain;
    }
    showKillBanner();
    setTimeout(()=>{
      r.idx++;
      if(r.idx >= r.mobs.length){ winRaid(); }
      else {
        const dur = restSecondsFor(m);
        S.restLeft = dur; S.restTotal = dur;
        go('rest'); tickRest();
      }
    }, 1300);
  }
}
/* Отдых между подходами масштабируется от сложности только что побеждённого
   моба — чем больше отжиманий он потребовал, тем длиннее перерыв, с нижней
   границей REST_MIN_SECONDS. Линейный рост от maxHp — та же "шкала силы",
   что уже используется для урона моба (mobDps). */
const REST_MIN_SECONDS = 15;
function restSecondsFor(m){
  return Math.max(REST_MIN_SECONDS, Math.round(REST_MIN_SECONDS + m.maxHp*0.5));
}
const REST_RING = { size:150, stroke:10 };
function restRingCircumference(){ return 2*Math.PI*((REST_RING.size-REST_RING.stroke)/2); }
function restRingSVG(pct){
  const r = (REST_RING.size-REST_RING.stroke)/2;
  const c = restRingCircumference();
  const offset = c*(1-pct/100);
  return `<svg width="${REST_RING.size}" height="${REST_RING.size}" viewBox="0 0 ${REST_RING.size} ${REST_RING.size}" style="transform:rotate(-90deg)">
    <circle cx="${REST_RING.size/2}" cy="${REST_RING.size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${REST_RING.stroke}"/>
    <circle id="restRingFg" cx="${REST_RING.size/2}" cy="${REST_RING.size/2}" r="${r}" fill="none" stroke="var(--sys)" stroke-width="${REST_RING.stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .3s linear"/>
  </svg>`;
}
function rRest(){
  const r=S.raid, next=r.mobs[r.idx];
  const pct = Math.max(0, Math.min(100, S.restLeft/(S.restTotal||REST_MIN_SECONDS)*100));
  h(`<div class="screen" style="justify-content:center;text-align:center">
    <div class="syswin"><div class="sys-tag"><span class="bang">!</span> ПЕРЕЗАРЯДКА МАНЫ</div>
      <div class="sub" style="font-size:14px">Моб повержен. На очереди <b class="cy">${next.isBoss?'👑 '+next.name:next.name+' '+next.n}</b>: <b class="gold">${next.maxHp} отжиманий</b>.</div>
    </div>
    <div style="position:relative;width:${REST_RING.size}px;height:${REST_RING.size}px;margin:18px auto 4px">
      ${restRingSVG(pct)}
      <div class="rest-timer" id="restT" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;margin:0">${S.restLeft}</div>
    </div>
    <div class="sub">секунд до следующей атаки</div>
    ${!Cam.error ? `<div class="cam-wrap" id="camWrap" style="max-height:200px;margin-top:14px">
      <video id="raidVideo" autoplay playsinline muted></video><canvas id="raidCanvas"></canvas>${repCounterHTML()}
    </div>` : ''}
    <div style="margin-top:14px;width:100%">
      <div class="hpbar player"><i id="playerHpFill" style="width:${Math.max(0,r.hp/r.hpMax*100)}%"></i></div>
      <div class="hp-num player" id="playerHpNum">Твоё HP ${r.hp} / ${r.hpMax}</div>
    </div>
    <div class="bottom">
      <button class="btn" onclick="go('raid')">Атаковать сейчас</button>
    </div>
  </div>`);
  // Камера не выключается на отдыхе — стрим уже жив (см. go()), просто
  // заново привязываем новый <video>/<canvas> (root перерисован целиком).
  // Детектор позы всё равно бездействует вне экрана raid (camLoop), так что
  // повторы во время отдыха не считаются — только живой предпросмотр.
  if(!Cam.error){ attachCamRefs(); if(!Cam.running) startCamera(); }
}
function tickRest(){
  clearInterval(S._t);
  const c = restRingCircumference();
  S._t = setInterval(()=>{
    S.restLeft--;
    const el=document.getElementById('restT');
    if(el) el.textContent=S.restLeft;
    const fg=document.getElementById('restRingFg');
    if(fg){ const pct=Math.max(0, Math.min(100, S.restLeft/(S.restTotal||REST_MIN_SECONDS)*100)); fg.style.strokeDashoffset = c*(1-pct/100); }
    if(S.restLeft<=0 || S.screen!=='rest'){ clearInterval(S._t); if(S.screen==='rest') go('raid'); }
  },1000);
}
function winRaid(){
  stopCombatTick();
  const g=S.raid.gate;
  const wasReplay = S.raid.replay;
  if(!S.doneGates.includes(g.id)) S.doneGates.push(g.id);
  S.justRanked = null;
  if(g.stage==='exam'){
    const idx = RANK_ORDER.indexOf(g.rank);
    if(idx>=0 && idx<RANK_ORDER.length-1){ S.rank = RANK_ORDER[idx+1]; S.justRanked = S.rank; }
  }
  // Стрик реально увеличивается максимум один раз в календарный день, и только
  // за настоящую (не повторную) победу — раньше "+1 к стрику" на экране победы
  // был просто текстом, никак не связанным с состоянием.
  ensureDay();
  S.justStreakInc = false;
  if(!wasReplay){
    const today = todayStr();
    if(S.lastWinDate !== today){
      S.streak = (S.lastWinDate === yesterdayStr()) ? S.streak+1 : 1;
      S.lastWinDate = today;
      S.justStreakInc = true;
    }
  }
  go('victory');
}
function rVictory(){
  const g=S.raid.gate;
  const total = S.raid.mobs.reduce((a,m)=>a+m.maxHp,0);
  const lastMob = S.raid.mobs[S.raid.mobs.length-1];
  h(`<div class="screen reveal">
    <div class="syswin" style="width:100%"><div class="sys-tag"><span class="bang">!</span> ВРАТА ЗАКРЫТЫ</div>
      <div style="font-size:15px">Все монстры (<b class="gold">${S.raid.mobs.length}</b>) повержены. Угроза устранена.</div>
    </div>
    <div style="width:150px;filter:grayscale(.3) drop-shadow(0 0 20px rgba(52,211,153,.4))">${mobVisual(lastMob.kind,150)}</div>
    <h2 style="font-size:24px">ПОБЕДА</h2>
    ${S.justRanked ? `<div class="syswin" style="width:100%;border-color:var(--gold);box-shadow:0 0 30px rgba(245,194,66,.25)">
      <div class="sys-tag" style="color:var(--gold)"><span class="bang" style="border-color:var(--gold)">!</span> РАНГ ПОВЫШЕН</div>
      <div style="font-size:16px">Охотник переведён в ранг <b class="gold" style="font-size:20px">${S.justRanked}</b>.</div>
    </div>` : ''}
    <div class="loot">
      <div class="card"><div class="v">+${total}</div><div class="k">${S.raid.replay?'отж. (повтор)':'отжиманий'}</div></div>
      <div class="card"><div class="v">+${S.raid.xpGained||0}</div><div class="k">опыта</div></div>
      <div class="card"><div class="v">${S.justStreakInc?'+1':S.streak}</div><div class="k">${S.justStreakInc?'к стрику 🔥':'стрик, дн. 🔥'}</div></div>
    </div>
    <div style="width:100%;text-align:left">
      <div style="display:flex;justify-content:space-between;font-size:12px" class="mono"><span>УРОВЕНЬ ${S.level}</span><span>${S.xp}/100 XP</span></div>
      <div class="xpbar"><i style="width:${S.xp}%"></i></div>
    </div>
    <div class="bottom" style="width:100%"><button class="btn" onclick="S.justRanked=null;go('map')">Вернуться к карте</button></div>
  </div>`);
}

/* ---- 6. Профиль ---- */
function rProfile(){
  const a=S.ans;
  h(`<div class="screen">
    <div class="hdr">
      <h2 style="margin:0">Охотник</h2>
      <button class="icon-btn" onclick="S.prevScreen=S.screen;go('settings')" aria-label="Настройки">⚙️</button>
    </div>
    <div class="profile-head">
      <div class="avatar">${S.rank}</div>
      <div>
        <div style="font-family:'Russo One';font-size:22px">${escapeHtml(a.name)||'Безымянный'}</div>
        <div class="sub" style="font-size:13px">Ранг ${S.rank} · Уровень ${S.level} · ${a.age} лет</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px" class="mono"><span>УРОВЕНЬ ${S.level}</span><span>${S.xp}/100 XP</span></div>
    <div class="xpbar"><i style="width:${S.xp}%"></i></div>

    <div class="sub" style="margin-top:18px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Прогресс отжиманий</div>
    <div class="grid2">
      <div class="gcard"><div class="v">${S.pushToday}</div><div class="k">сегодня</div></div>
      <div class="gcard"><div class="v">${S.pushWeek}</div><div class="k">за неделю</div></div>
      <div class="gcard"><div class="v">${S.totalPush}</div><div class="k">отжиманий всего</div></div>
      <div class="gcard"><div class="v">${S.doneGates.length}</div><div class="k">врат закрыто</div></div>
    </div>

    <div class="sub" style="margin-top:18px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Дисциплина</div>
    <div class="grid2">
      <div class="gcard"><div class="v">🔥 ${S.streak}</div><div class="k">дней подряд</div></div>
      <div class="gcard"><div class="v">${a.days||'—'}</div><div class="k">дней / неделя</div></div>
    </div>

    ${rankProgressHTML()}

    <div class="syswin" style="margin-top:16px">
      <div class="sys-tag"><span class="bang">!</span> ЕЖЕДНЕВНЫЙ КВЕСТ</div>
      <div class="sub" style="font-size:14px">Призыв во врата: <b class="cy">${a.time||'—'}</b>. Выполни рейд сегодня, чтобы сохранить стрик.</div>
    </div>
    <div style="flex:1"></div>
    ${navBar('profile')}
  </div>`);
}
function rankProgressHTML(){
  const idx = RANK_ORDER.indexOf(S.rank);
  const nextRank = RANK_ORDER[idx+1];
  const target = RANK_LEVEL_TARGET[S.rank];
  if(!nextRank || target==null){
    return `<div class="syswin" style="margin-top:16px"><div class="sys-tag"><span class="bang">!</span> ВЫСШИЙ РАНГ</div>
      <div class="sub" style="font-size:14px">Ты достиг ранга <b class="gold">${S.rank}</b> — предела известной системы охотников.</div></div>`;
  }
  const left = Math.max(0, target - S.level);
  const pct = Math.min(100, Math.round((S.level/target)*100));
  return `<div class="syswin" style="margin-top:16px">
    <div class="sys-tag"><span class="bang">!</span> ПУТЬ К РАНГУ ${nextRank}</div>
    <div class="sub" style="font-size:14px">Нужен уровень <b class="gold">${target}</b> (сейчас ${S.level})${left>0?` — ещё <b class="cy">${left}</b> ур.`:' — цель достигнута, закрой Exam-врата'}</div>
    <div class="xpbar" style="margin-top:10px"><i style="width:${pct}%"></i></div>
  </div>`;
}

/* ---- 7. Настройки ---- */
const DAYS_OPTS = [3,4,5,6,7];
function toggleSetting(key, btn){
  S.settings[key] = !S.settings[key];
  const pill = btn && btn.querySelector('.toggle-pill');
  if(pill){ pill.classList.toggle('on', S.settings[key]); pill.textContent = S.settings[key] ? 'ВКЛ' : 'ВЫКЛ'; }
  saveState();
}
function setAnsAndRender(key,val,btn){
  S.ans[key]=val;
  if(btn){ btn.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel')); btn.classList.add('sel'); }
  saveState();
}
function rSettings(){
  const a=S.ans, st=S.settings;
  h(`<div class="screen">
    <div class="topbar"><button class="back" onclick="go(S.prevScreen||'map')">‹</button>
      <h2 style="margin:0;font-size:20px">Настройки</h2>
    </div>

    <div class="sub" style="margin-top:6px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Уведомления</div>
    <div class="opts" style="margin-top:10px">
      <button class="toggle-row" onclick="toggleSetting('notifications',this)">
        <span>Уведомления о призыве</span>
        <span class="toggle-pill ${st.notifications?'on':''}">${st.notifications?'ВКЛ':'ВЫКЛ'}</span>
      </button>
      <button class="toggle-row" onclick="toggleSetting('sound',this)">
        <span>Звук</span>
        <span class="toggle-pill ${st.sound?'on':''}">${st.sound?'ВКЛ':'ВЫКЛ'}</span>
      </button>
      <button class="toggle-row" onclick="toggleSetting('vibration',this)">
        <span>Вибрация</span>
        <span class="toggle-pill ${st.vibration?'on':''}">${st.vibration?'ВКЛ':'ВЫКЛ'}</span>
      </button>
    </div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Время ежедневного призыва</div>
    <div style="margin-top:10px">${timeWheelHTML(a.time)}</div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Дней тренировок в неделю</div>
    <div class="chips" style="margin-top:10px">${DAYS_OPTS.map(d=>`
      <button class="chip ${a.days===d?'sel':''}" onclick="setAnsAndRender('days',${d},this)">${d}</button>`).join('')}</div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Приватность</div>
    <div class="syswin" style="margin-top:10px">
      <div class="sys-tag"><span class="bang">i</span> КАМЕРА</div>
      <div class="sub" style="font-size:13px">Видео с камеры никогда не покидает телефон. Распознавание позы (счёт отжиманий) считается прямо на устройстве, в браузере — на сервер не передаётся ни один кадр.</div>
    </div>

    <div class="sub" style="margin-top:22px;font-size:12px;letter-spacing:1px;text-transform:uppercase">Данные</div>
    <div class="opts" style="margin-top:10px">
      <button class="opt" style="color:var(--danger);border-color:rgba(255,59,92,.35)" onclick="resetProgress()">Сбросить прогресс охотника</button>
    </div>

    <div style="flex:1"></div>
    ${navBar('')}
  </div>`);
  setupTimeWheels(a.time, v=>{ S.ans.time=v; saveState(); });
}
function resetProgress(){
  sysConfirm('Сбросить весь прогресс охотника? Это действие необратимо.', ()=>{
    stopCombatTick();
    stopRaidCountdown();
    S.level=1; S.xp=0; S.streak=0; S.totalPush=0; S.pushToday=0; S.pushWeek=0;
    S.doneGates=[]; S.rank='E'; S.justRanked=null; S.justStreakInc=false;
    S.raid=null; S.lastWinDate=null; S.todayDate=null; S.onboarded=false; S.step=0;
    // сбрасываем и ответы квиза (имя/возраст/цель и т.д.) — иначе "сброс прогресса"
    // на деле оставлял старый профиль нетронутым
    S.ans = { name:'', exp:null, goal:null, age:25, max:null, days:null, time:null };
    try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
    go('splash');
  });
}

function boot(){
  const hasProfile = loadState();
  ensureDay();
  if(hasProfile) S.screen = 'map'; // профиль уже есть — сразу к карте, минуя онбординг
  tgInit();
  render();
  syncFromCloud();
}
boot();

</script>
</body>
</html>
