<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05070F">
<title>ВРАТА — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<!-- fonts.gstatic.com — реальный хост файлов шрифтов, а не только CSS; без этого preconnect
     соединение к нему открывается на кадр позже, шрифты чуть медленнее -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Telegram Mini App SDK — должен грузиться максимально рано. Вне Telegram
     (обычный браузер) объект window.Telegram просто не появится, весь код
     ниже это учитывает и работает как обычная веб-страница. -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --void:#05070F;
  --panel:rgba(13,18,38,.88);
  --panel-solid:#0D1226;
  --line:#1B2547;
  --sys:#4CC9FF;
  --sys-dim:rgba(76,201,255,.35);
  --mana:#8B5CF6;
  --mana-2:#6D28D9;
  --danger:#FF3B5C;
  --gold:#F5C242;
  --text:#EAF0FF;
  --muted:#8A94B8;
  --ok:#34D399;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  background:#02030A;
  color:var(--text);
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  display:flex;justify-content:center;
  overflow-x:hidden; /* страховка от горизонтального скролла на очень узких экранах */
}
#phone{
  width:100%;max-width:430px;min-height:100vh;min-height:100dvh;
  overflow-x:hidden; /* только X — вертикальный скролл документа не трогаем */
  /* --tg-vh выставляется из JS через Telegram.WebApp.viewportStableHeight —
     внутри Telegram 100vh/100dvh часто не совпадает с реальной видимой
     высотой (учитывает шапку клиента), из-за чего низ экрана обрезался
     или, наоборот, оставалась пустая полоса. Вне Telegram переменная не
     задана — работает обычный dvh-фоллбэк. */
  min-height:var(--tg-vh, 100dvh);
  background-color:var(--void);
  background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(139,92,246,.16), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(76,201,255,.08), transparent 60%);
  position:relative;display:flex;flex-direction:column;
}
/* #root — простой контейнер-обёртка вокруг текущего экрана. Без display:flex
   здесь цепочка flex:1 у #phone → .screen обрывается на этом уровне: #root
   как flex-item в #phone по умолчанию не растягивается по высоте (flex-basis:auto),
   поэтому .screen{flex:1} внутри него ни на что не влияет — экран просто равен
   высоте своего контента. На коротких экранах (Твой путь, профиль и т.п.) это
   давало пустой "хвост" фона под контентом и непредсказуемое место кнопки внизу;
   на длинных (карта врат) — не влияло на факт скролла, но ломало консистентность.
   display:flex тут делает #root прозрачным передаточным звеном цепочки. */
#root{display:flex;flex-direction:column;flex:1;width:100%;min-width:0}
/* Прогрессия по рангу — лёгкий сдвиг оттенка фонового свечения (E фиолетовый →
   D зелёный → C голубой → B фиолетово-золотой → A золотой → S красный). */
#phone[data-rank="D"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(52,211,153,.16), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(76,201,255,.08), transparent 60%); }
#phone[data-rank="C"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(76,201,255,.17), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(139,92,246,.08), transparent 60%); }
#phone[data-rank="B"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(139,92,246,.15), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(245,194,66,.09), transparent 60%); }
#phone[data-rank="A"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(245,194,66,.17), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(255,59,92,.07), transparent 60%); }
#phone[data-rank="S"]{ background-image:
    radial-gradient(120% 60% at 50% -10%, rgba(255,59,92,.2), transparent 60%),
    radial-gradient(90% 40% at 50% 110%, rgba(245,194,66,.09), transparent 60%); }
/* На широких экранах (планшет/десктоп) колонка 430px иначе теряется на голом
   чёрном фоне — добавляем рамку и лёгкую виньетку вокруг телефона. */
@media (min-width:600px){
  body{ background:radial-gradient(120% 100% at 50% 0%, #0A0E1E, #02030A); padding:32px 0; }
  #phone{ border:1px solid var(--line); border-radius:28px; box-shadow:0 40px 100px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02); }
}
/* Внутри Telegram своя рамка/шапка уже есть — декоративная "карточка телефона"
   поверх неё выглядит лишней. Класс tg-app вешается из JS при обнаружении
   Telegram.WebApp. Специфичность (класс+класс+id) перебивает правило выше
   независимо от порядка объявления. */
/* ВАЖНО: max-width НЕ трогаем — на Telegram Desktop окно мини-аппа может
   быть гораздо шире телефона (пользователь на большом мониторе), и без
   этого ограничения вся фикс-пиксельная вёрстка (карта врат, камера,
   HP-бары) растягивалась на всю ширину окна и ломалась. Убираем только
   декоративную рамку — сама колонка остаётся ~430px и просто центрируется. */
html.tg-app #phone{ border:none; box-shadow:none; border-radius:0; }
html.tg-app body{ padding:0; background:var(--void); }
/* Приложение не адаптировано под ландшафтную ориентацию — на невысоких экранах
   в landscape мягко просим повернуть телефон, а не показываем сломанную вёрстку.
   ВАЖНО: html.kb-open (вешается из JS, пока в фокусе текстовое поле) отключает
   эту заглушку. Когда на телефоне открывается клавиатура, Telegram сжимает
   вьюпорт до ~300-400px высоты — и media-query формально становится
   "landscape" (ширина > высоты): заглушка мгновенно прятала всё приложение,
   поле ввода исчезало из DOM-раскладки, фокус слетал и клавиатура сама
   захлопывалась. Это и был баг "клавиатура открывается и тут же прячется"
   на экране ввода имени (видео пользователя: короткое "затемнение" — это
   вспышка этой самой заглушки). */
.rotate-hint{display:none}
@media (orientation:landscape) and (max-height:500px){
  html:not(.kb-open) #phone{display:none}
  html:not(.kb-open) .rotate-hint{
    display:flex;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;
    text-align:center;padding:24px;background:var(--void);color:var(--text);
    font-family:'Manrope',sans-serif;font-size:15px;line-height:1.5;
  }
}
/* фоновые "частицы маны" */
#phone::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, rgba(139,92,246,.8), transparent),
    radial-gradient(1px 1px at 70% 15%, rgba(76,201,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 85% 55%, rgba(139,92,246,.6), transparent),
    radial-gradient(1px 1px at 35% 75%, rgba(76,201,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 55% 45%, rgba(139,92,246,.5), transparent);
}
.screen{flex:1;display:flex;flex-direction:column;padding:22px 20px calc(20px + env(safe-area-inset-bottom));position:relative;z-index:1}
.screen-fade{animation:fadeIn .35s ease}
/* Раньше здесь ещё был transform:translateY() — убрали: если пользователь
   тапает по текстовому полю, пока родительский .screen ещё анимируется через
   transform, некоторые Android-WebView (в т.ч. клиент Telegram) путаются с
   позиционированием клавиатуры и захлопывают её сразу после открытия. Чистый
   fade по opacity той же проблемы не вызывает. */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* Малые экраны (iPhone SE и т.п.) — колесо и отступы компактнее, чтобы кнопка
   "Далее" на шаге времени не уезжала слишком далеко за пределы видимой области. */
@media (max-height:700px){
  .screen{padding:16px 20px calc(14px + env(safe-area-inset-bottom))}
  .wheel-wrap{height:176px;margin:16px 0}
  .wheel-col{height:176px}
  .wheel-track{padding:66px 0}
  .topbar{margin-bottom:16px}
  h2{margin-bottom:4px}
  /* На совсем невысоких экранах ужимаем ещё и боевой экран — приоритет
     отдаём камере, а не карточке моба над ней. */
  .mob-art{width:52px;height:52px}
}

h1,h2,.display{font-family:'Russo One',sans-serif;font-weight:400;letter-spacing:.5px}
h2{font-size:26px;line-height:1.2;margin-bottom:8px}
.sub{color:var(--muted);font-size:15px;line-height:1.45}
.mono{font-family:'JetBrains Mono',monospace}

/* ---- шапка квиза ---- */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:26px}
.back{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.progress{flex:1;height:6px;border-radius:3px;background:var(--line);overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--mana),var(--sys));border-radius:3px;transition:width .4s ease;box-shadow:0 0 10px var(--mana)}

/* ---- системное окно ---- */
.syswin{
  border:1px solid var(--sys-dim);background:var(--panel);border-radius:10px;
  padding:16px 18px;position:relative;
  box-shadow:0 0 24px rgba(76,201,255,.08), inset 0 0 30px rgba(76,201,255,.04);
}
.syswin::before,.syswin::after{content:"";position:absolute;width:14px;height:14px;border-color:var(--sys);border-style:solid}
.syswin::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:10px 0 0 0}
.syswin::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 10px 0}
.sys-tag{display:flex;align-items:center;gap:8px;color:var(--sys);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;margin-bottom:8px}
.sys-tag .bang{width:18px;height:18px;border:1.5px solid var(--sys);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(76,201,255,.5)}50%{box-shadow:0 0 0 6px rgba(76,201,255,0)}}

/* ---- кнопки ---- */
.btn{
  width:100%;padding:17px;border:none;border-radius:16px;cursor:pointer;
  font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:.5px;color:#fff;
  background:linear-gradient(180deg,var(--mana),var(--mana-2));
  box-shadow:0 6px 0 #3B1E7A, 0 0 26px rgba(139,92,246,.35);
  transition:transform .08s, box-shadow .08s, opacity .2s;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #3B1E7A}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.ghost{background:transparent;border:1px solid var(--line);box-shadow:none;color:var(--muted);font-family:'Manrope';font-weight:700;font-size:15px}
.bottom{margin-top:auto;padding-top:18px;display:flex;flex-direction:column;gap:10px}
/* Кнопка "Далее" в квизе — раньше просто margin-top:auto внутри flex-экрана,
   из-за чего на коротких шагах (имя) она стояла у самого низа вьюпорта, а на
   длинных (5 опций) — сразу под контентом, визуально "прыгая" между шагами.
   Приклеиваем к низу вьюпорта всегда, как уже сделано у .nav на карте. */
/* position:sticky зависел от скролл-контекста родителей и на деле не всегда
   прижимался к самому низу вьюпорта (см. скриншоты — то повыше, то пониже).
   position:fixed надёжнее: кнопка всегда в одном и том же месте физического
   экрана, независимо от длины контента и от скролла. left:50%+translateX
   центрирует её той же колонкой 430px, что и #phone (см. body{display:flex;
   justify-content:center}), — на широких экранах/десктопе не растягивается
   на всю ширину окна. */
.quiz-bottom{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:430px;
  padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:var(--void);border-top:1px solid var(--line);z-index:5;
}
/* Резерв места под фиксированную кнопку внизу — иначе последний контент шага
   (особенно длинные списки опций) заезжал бы под неё. */
.quiz-body-pad{padding-bottom:96px}

/* ---- варианты ответов ---- */
.opts{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.opt{
  display:flex;align-items:center;gap:12px;padding:17px 16px;border-radius:14px;
  border:1px solid var(--line);background:var(--panel);cursor:pointer;
  font-weight:700;font-size:16px;color:var(--text);text-align:left;
  transition:border-color .25s ease, box-shadow .25s ease, color .25s ease, transform .12s ease;
}
.opt:active{transform:scale(.97)}
.opt .ico{font-size:18px;width:24px;text-align:center;filter:grayscale(.4)}
.opt .side{margin-left:auto;color:var(--muted);font-size:13px;font-weight:600}
.opt.sel{border-color:var(--mana);color:#CBB7FF;box-shadow:0 0 0 1px var(--mana), 0 0 18px rgba(139,92,246,.35)}
.opt.sel .side{color:#CBB7FF}
input.field{
  width:100%;margin-top:20px;padding:17px 16px;border-radius:14px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);font-size:17px;font-weight:600;outline:none;font-family:'Manrope';
}
input.field:focus{border-color:var(--sys);box-shadow:0 0 14px rgba(76,201,255,.25)}

/* ---- возраст ---- */
.age-picker{display:flex;align-items:center;justify-content:center;gap:22px;margin:42px 0}

/* ---- wheel picker (в стиле iOS) ---- */
.wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center;gap:2px;height:220px;margin:24px 0}
.wheel-col{flex:1;max-width:110px;height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;position:relative;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 32%, #000 68%, transparent 100%);
  mask-image:linear-gradient(to bottom, transparent 0, #000 32%, #000 68%, transparent 100%);}
.wheel-col::-webkit-scrollbar{display:none}
.wheel-track{padding:88px 0}
.wheel-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:22px;color:var(--text);scroll-snap-align:center;will-change:opacity,transform}
.wheel-item.pulse{animation:wheelPulse .3s ease}
@keyframes wheelPulse{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.wheel-highlight{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--sys-dim);border-bottom:1px solid var(--sys-dim);background:rgba(76,201,255,.07);pointer-events:none;border-radius:10px;z-index:0}
.wheel-colon{font-family:'Russo One',sans-serif;font-size:22px;color:var(--muted);padding:0 2px;align-self:center}
.age-btn{width:56px;height:56px;border-radius:16px;border:1px solid var(--line);background:var(--panel);color:var(--sys);font-size:26px;cursor:pointer}
.age-val{font-family:'Russo One';font-size:64px;min-width:120px;text-align:center;color:var(--gold);text-shadow:0 0 24px rgba(245,194,66,.4)}

/* ---- чипы времени ---- */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.chip{padding:12px 18px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-family:'JetBrains Mono';font-size:15px;cursor:pointer;transition:border-color .25s ease, box-shadow .25s ease, color .25s ease, transform .12s ease}
.chip:active{transform:scale(.94)}
.chip.sel{border-color:var(--sys);color:var(--sys);box-shadow:0 0 14px rgba(76,201,255,.25)}

/* ---- онбординг: поза перед камерой ---- */
.pose-card{
  width:100%;border-radius:18px;border:1px solid var(--sys-dim);background:var(--panel);
  padding:18px 14px 6px;margin-top:14px;box-shadow:0 0 24px rgba(76,201,255,.12);
}

/* ---- экран ранга ---- */
.reveal{align-items:center;justify-content:center;text-align:center;gap:18px}
.rankbox{width:150px;height:150px;border-radius:24px;display:flex;align-items:center;justify-content:center;position:relative;margin:10px 0}
.rankbox .glyph{font-family:'Russo One';font-size:86px;color:var(--sys);text-shadow:0 0 34px var(--sys)}
.rankbox::before{content:"";position:absolute;inset:0;border:2px solid var(--sys);border-radius:24px;animation:pulse 2s infinite}
.stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.stat-row b{color:var(--sys)}

/* ---- карта врат ---- */
.map-wrap{margin:0 -20px;padding:10px 20px 30px;position:relative}
.map-inner{position:relative;min-height:900px}
.map-svg{position:absolute;inset:0;width:100%;height:100%}

.mini-path{position:relative;height:130px;margin:6px 0}
.mini-path-svg{position:absolute;inset:0;width:100%;height:100%}
.mini-gate{position:absolute;transform:translate(-50%,-50%)}
.mini-gate-frame{width:46px;height:46px;border-radius:13px;border:2px solid #8B5CF6;background:rgba(13,18,38,.9);display:flex;align-items:center;justify-content:center}
.mini-gate-frame svg{width:30px;height:30px}
.gate-node{position:absolute;width:104px;text-align:center;cursor:pointer;transform:translateX(-50%)}
.gate-frame{
  width:86px;height:86px;margin:0 auto;border-radius:20px;border:2px solid var(--mana);
  background:radial-gradient(ellipse at 50% 60%, rgba(139,92,246,.5), rgba(13,18,38,.95) 70%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 22px rgba(139,92,246,.45), inset 0 0 18px rgba(139,92,246,.35);
}
.gate-frame svg{width:56px;height:56px}
.gate-node.red .gate-frame{border-color:var(--danger);background:radial-gradient(ellipse at 50% 60%, rgba(255,59,92,.5), rgba(13,18,38,.95) 70%);box-shadow:0 0 24px rgba(255,59,92,.5), inset 0 0 18px rgba(255,59,92,.4)}
.gate-node.gold .gate-frame{border-color:var(--gold);background:radial-gradient(ellipse at 50% 60%, rgba(245,194,66,.5), rgba(13,18,38,.95) 70%);box-shadow:0 0 24px rgba(245,194,66,.5), inset 0 0 18px rgba(245,194,66,.4)}
.gate-node.gold .gate-rank{color:var(--gold)}
.gate-node.locked .gate-frame{border-color:var(--line);background:var(--panel);box-shadow:none;filter:grayscale(1);opacity:.55}
.gate-node.done .gate-frame{border-color:var(--ok);box-shadow:0 0 18px rgba(52,211,153,.4)}
.gate-name{margin-top:8px;font-size:12.5px;font-weight:800;line-height:1.25;text-shadow:0 2px 6px #000}
.gate-rank{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--sys);margin-top:2px}
.gate-node.red .gate-rank{color:var(--danger)}
.gate-node.locked .gate-name,.gate-node.locked .gate-rank{color:var(--muted)}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.icon-row{display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .12s ease, border-color .2s ease}
.icon-btn:active{transform:scale(.9)}
/* Активный переключатель направления (Врата Силы/Выносливости) в icon-row —
   тот же приём подсветки, что и у выбранного низа nav, см. .nav button.on. */
.icon-btn.on{border-color:var(--gold);box-shadow:0 0 10px rgba(245,194,66,.35)}
/* Подпись текущего направления над картой врат — какая из двух карт сейчас
   показана (см. rMap()/TRACKS). */
.track-tag{font-family:'JetBrains Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sys);text-align:center;margin-bottom:8px}
/* Верхний блок карты врат (ранг/стрик/уровень + переключатель направления +
   профиль/настройки) — раньше просто скроллился вместе с картой, на 44
   вратах приходилось скроллить обратно наверх, чтобы дотянуться до иконок.
   position:fixed, тот же приём, что и у .nav (см. её комментарий) — не
   зависит от того, какой предок на самом деле скроллится, всегда сверху.
   .map-top-spacer резервирует под ним место в потоке .screen (высота
   выставляется из JS по факту отрисовки, см. requestAnimationFrame в rMap()) —
   без него первые врата на карте оказались бы под панелью. */
.map-fixed-top{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;box-sizing:border-box;padding:22px 20px 10px;background:var(--void);border-bottom:1px solid var(--line);z-index:5}
.map-fixed-top .icon-row,.map-fixed-top .hdr{margin-bottom:10px}
.map-fixed-top .track-tag{margin-bottom:0}
.map-top-spacer{height:0}
.toggle-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;text-align:left;transition:border-color .2s ease, transform .12s ease}
.toggle-row:active{transform:scale(.98)}
.toggle-pill{padding:5px 12px;border-radius:8px;background:var(--line);color:var(--muted);font-family:'JetBrains Mono';font-size:12px;font-weight:700;transition:background .25s ease, color .25s ease}
.toggle-pill.on{background:rgba(52,211,153,.18);color:var(--ok)}
.pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);font-family:'JetBrains Mono';font-size:12px}
.pill b{color:var(--gold)}

/* ---- нижняя навигация ---- */
/* .nav — раньше был position:sticky, но на реальном устройстве в Telegram
   всё равно убегал при скролле длинных экранов (44 врат). position:fixed
   надёжнее: не зависит от того, какой из предков ("#phone"/"#root"/".screen")
   на самом деле является скролл-контейнером — просто всегда прибит к низу
   видимой области. left:50%+translateX компенсирует центрирование той же
   430px-колонки, что и #phone (см. body{display:flex;justify-content:center}),
   поэтому на широких экранах панель не растягивается на всё окно.
   .nav-spacer — невидимый разделитель той же высоты, добавляется в конце
   navBar() перед самой панелью: раз .nav теперь вне потока (fixed), место,
   которое он раньше занимал внизу .screen, больше не резервируется само,
   без спейсера последние врата/кнопки на экране оказались бы под панелью. */
.nav-spacer{height:calc(70px + env(safe-area-inset-bottom))}
.nav{display:flex;gap:10px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;background:var(--void);z-index:5;box-sizing:border-box}
.nav button{flex:1;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:800;font-size:13px;cursor:pointer}
.nav button.on{color:var(--sys);border-color:var(--sys-dim);box-shadow:0 0 12px rgba(76,201,255,.15)}

/* ---- рейд ---- */
.mob-stage{display:flex;flex-direction:column;align-items:center;margin:8px 0 4px}
.mob-queue{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:2px}
.qmob{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:.9;position:relative}
.qmob svg{width:20px;height:20px}
.qmob.dead{opacity:.25;filter:grayscale(1)}
.qmob.cur{border-color:var(--gold);box-shadow:0 0 10px rgba(245,194,66,.5)}
.qmob.boss{width:32px;height:32px;border-color:var(--danger)}
.qmob.boss svg{width:24px;height:24px}
.qmob.boss.gold{border-color:var(--gold)}
/* Значок упражнения в углу превью моба в очереди — какое упражнение победит
   именно этого моба (см. mobExercise()). */
.qmob-ex{position:absolute;bottom:-3px;right:-3px;font-size:9px;line-height:1;background:var(--panel-solid);border:1px solid var(--line);border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center}
.qmob.boss .qmob-ex{width:15px;height:15px;font-size:10px;bottom:-4px;right:-4px}
/* Плашка "Отжимания"/"Приседания" — какое упражнение нужно прямо сейчас в
   этих вратах (одно на весь заход, включая босса, см. mobExercise()).
   Раньше была отдельной строкой под именем — на низких экранах она и была
   одной из причин, почему низ экрана (камера/кнопки) не помещался, поэтому
   теперь это узкая плашка встроена в ту же строку, что и имя моба. */
.mob-exercise{display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:2px 8px;border-radius:20px;background:var(--panel-solid);border:1px solid var(--line);font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--sys);vertical-align:middle}
.lockbadge{position:absolute;bottom:-4px;right:-4px;font-size:16px;background:var(--panel-solid);border:1px solid var(--line);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
/* Портрет моба — круглая рамка (как на референсе игрока), а не просто картинка
   в воздухе. overflow:hidden обрезает mobVisual() в круг, не трогая саму
   функцию — она используется и в других местах (очередь, победа) с другими
   радиусами. */
.mob-art{
  width:68px;height:68px;border-radius:50%;border:3px solid var(--mana);
  background:#000;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 22px rgba(139,92,246,.45), inset 0 0 16px rgba(0,0,0,.5);
}
.mob-art.hit{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.mob-name{
  font-family:'Russo One';font-size:14px;margin-top:6px;padding:5px 14px;
  border-radius:8px;background:var(--panel);border:1px solid var(--line);
  width:max-content;max-width:96%;display:flex;align-items:center;flex-wrap:wrap;justify-content:center;gap:2px 6px;
}
/* Полоса HP моба — текст поверх тёмной плашки (как "0/12 HP" на референсе),
   а не число под цветной полосой. Заливка теперь фоновая подсветка внутри
   той же плашки, а не отдельный бар. */
.hp-strip{
  width:100%;height:26px;margin-top:8px;border-radius:8px;background:#0B0E1C;
  border:1px solid var(--line);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.hp-strip i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#FF3B5C,#FF7A5C);opacity:.4;transition:width .5s ease}
.hp-strip span{position:relative;z-index:1;font-family:'JetBrains Mono';font-size:12px;letter-spacing:1px;color:var(--text)}
.hpbar{width:100%;height:10px;border-radius:6px;border:1px solid var(--line);background:#141A33;margin-top:6px;overflow:hidden}
.hpbar i{display:block;height:100%;background:linear-gradient(90deg,#FF3B5C,#FF7A5C);transition:width .5s ease;border-radius:6px}
.hp-num{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
/* HP игрока — зелёная полоса, отдельно от красной полосы моба (та же .hpbar,
   просто другой цвет заливки), чтобы два бара не путались между собой. */
.hpbar.player i{background:linear-gradient(90deg,#1FAE71,#34D399)}
.hp-num.player{color:var(--ok);text-align:left}
.set-info{text-align:center;margin:20px 0 8px}
.set-info .big{font-family:'Russo One';font-size:58px;color:var(--gold);text-shadow:0 0 26px rgba(245,194,66,.35);line-height:1}
.set-info .lbl{color:var(--muted);font-size:14px;margin-top:6px}

/* ---- камера-счётчик отжиманий ---- */
.cam-wrap{position:relative;width:100%;aspect-ratio:3/4;max-height:360px;border-radius:16px;overflow:hidden;border:1px solid var(--sys-dim);background:#000;margin-top:14px;box-shadow:0 0 24px rgba(76,201,255,.12)}
/* Базовый (сейчас нигде фактически не используемый — экран боя всегда
   .raid-fullbleed, см. override ниже) вариант — contain, без обрезки. Оставлен
   как безопасный дефолт на случай возврата "коробочной" камеры 3:4. */
.cam-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transform:scaleX(-1)}
.cam-wrap canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cam-status{position:absolute;left:0;right:0;bottom:0;padding:9px 12px;background:linear-gradient(0deg, rgba(2,3,10,.9), transparent);color:var(--sys);font-family:'JetBrains Mono';font-size:11.5px;text-align:center;letter-spacing:.4px}
/* Экран боя (rRaid) — раньше просто рос по контенту и скроллился, как и все
   остальные экраны. На нём это плохо: во время калибровки пользователь стоит
   в 1.5-2м от телефона и физически не может скроллить, а низ (статус камеры,
   кнопки "Засчитать вручную"/"Отступить") на невысоких экранах уезжал за
   пределы видимой области — см. репорт пользователя со скриншотом. Решение —
   вся верхняя часть (очередь мобов, карточка моба, полосы HP) остаётся
   обычной фиксированной высоты, а камера становится единственным "резиновым"
   блоком: занимает весь оставшийся вертикальный запас и сама сжимается, если
   его мало, вместо того чтобы вытеснять кнопки за экран. object-fit:cover на
   video/canvas и так уже одинаково хорошо работает при любой пропорции блока,
   отдельный aspect-ratio 3:4 тут больше не нужен. */
.screen.raid-fit{height:var(--tg-vh, 100dvh);overflow:hidden}
.raid-fit>*{flex-shrink:0}
.raid-fit .cam-wrap{flex:1 1 auto;min-height:130px;max-height:none;aspect-ratio:auto;margin-top:10px}
.cam-fallback{position:absolute;inset:0;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;padding:22px;text-align:center;color:var(--muted);font-size:13.5px;background:var(--panel-solid)}
.cam-fallback .btn{width:auto;padding:12px 22px}
/* ---- рейд, второй вариант — камера на весь экран (по плану пользователя,
   battle_screen_buttons_placement.html). Раньше камера была одним из блоков
   в столбик (карточка моба, полосы HP, камера, кнопки) — теперь она сама
   .cam-wrap растягивается на весь .screen, а вся игровая информация —
   полупрозрачные плашки поверх неё. .raid-fit выше больше не используется
   на экране боя (остался только для отдыха, см. rRest()), но не удалён —
   логика та же (растягивать камеру), просто в другой раскладке. */
.screen.raid-fullbleed{height:var(--tg-vh, 100dvh);overflow:hidden;padding:0}
/* Без собственного z-index — если бы он был, .cam-wrap создавал бы новый
   stacking context, и тогда z-index её потомков (калибровка, плашка "враг
   повержен") сравнивался бы только МЕЖДУ СОБОЙ, а не с кнопками назад/
   отступить/счётчиком ниже (те — прямые сиблинги .cam-wrap, не её дети).
   Без контекста все z-index ниже сравниваются в одном общем списке — так
   кнопки (z:5) гарантированно остаются кликабельны поверх калибровки (z:3)
   и плашки убийства (z:4), как явно требовалось при планировании. */
.raid-fullbleed .cam-wrap{
  position:absolute;inset:0;width:100%;height:100%;max-height:none;aspect-ratio:auto;
  margin-top:0;border-radius:0;border:none;box-shadow:none;
}
/* Полноэкранный бой — единственный реальный режим камеры сейчас. Тут cover,
   а не contain: видео с камеры теперь запрашивается БЕЗ навязанной пропорции
   (см. startCamera() — только facingMode + потолок разрешения), поэтому
   отдаёт нативный, необрезанный кадр камеры. Cover уже на уровне CSS
   подгоняет его любую реальную пропорцию под экран (обрезая по одной из
   осей единым множителем) — без чёрных полос и без того "зума", который
   раньше возникал из-за того, что мы просили саму камеру подрезать сенсор
   под конкретную форму (сначала под экран, потом под 9:16 — оба раза камера
   резала кадр ещё до рендера). drawSkeleton() ниже использует ту же
   cover-формулу (Math.max), чтобы скелет совпадал с реально показанной
   (обрезанной cover-ом, как и настоящая картинка) частью видео. */
.raid-fullbleed .cam-wrap video{object-fit:cover}
/* Тень сверху и снизу камеры — не декоративная, а чтобы текст оверлеев
   (счётчик, статус-строка, карточка моба) оставался читаемым на любом фоне
   видео, включая светлую стену или окно позади игрока. */
.raid-fullbleed .cam-wrap::before{
  content:"";position:absolute;inset:0 0 auto 0;height:140px;z-index:1;pointer-events:none;
  background:linear-gradient(180deg, rgba(2,3,10,.75), transparent);
}
.raid-fullbleed .cam-wrap::after{
  content:"";position:absolute;inset:auto 0 0 0;height:190px;z-index:1;pointer-events:none;
  background:linear-gradient(0deg, rgba(2,3,10,.85), transparent);
}
/* Статус-строка распознавания (#camStatus, см. setCamStatus()) — раньше была
   прижата к низу самой камеры (max-height:360px), теперь камера — это весь
   экран, так что тот же элемент естественно оказывается у самого низа
   экрана. Кнопки (счётчик/отступить/вручную) сознательно держим строго выше
   неё, а не в одной зоне — это системная жестовая область iOS снизу экрана,
   и класть туда игровые кнопки — верный способ ловить случайные тапы/свайпы. */
.raid-fullbleed .cam-status{
  padding:8px 24px calc(8px + env(safe-area-inset-bottom));
  font-size:11.5px;line-height:1.35;z-index:2;
}
.raid-fullbleed .cam-fallback{z-index:2;background:rgba(4,6,16,.92)}
.raid-fullbleed .raid-calib{z-index:3}
/* Кнопка "назад" — верхний левый угол. Уходит на карту напрямую, без
   подтверждения и без потери опыта — то же поведение, что было у .topbar
   .back на этом экране раньше. Это НЕ то же самое, что "Отступить" у
   счётчика ниже (тот, наоборот, спрашивает подтверждение и откатывает
   опыт захода, см. retreatRaid()) — два разных, оба нужны по плану.
   z-index держим ВЫШЕ калибровки и плашки "враг повержен" (см. .kill-banner
   ниже) — кнопки должны оставаться нажимаемыми даже поверх обеих. */
.raid-back{
  position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:5;
  width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.25);
  background:rgba(4,6,16,.55);backdrop-filter:blur(6px);color:var(--text);font-size:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
/* Мини-очередь — верхний правый угол, только 2 БЛИЖАЙШИХ моба впереди (не
   вся пройденная история, как раньше в .mob-queue — для полной ленты на
   камере во весь экран просто нет места), плюс бейдж "+N" на тех, кто ещё
   дальше в очереди. */
.raid-mini-queue{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:5;display:flex;gap:6px}
.raid-mini-mob{
  width:30px;height:30px;border-radius:9px;border:1px solid rgba(255,255,255,.25);
  background:rgba(4,6,16,.55);backdrop-filter:blur(6px);display:flex;align-items:center;
  justify-content:center;overflow:hidden;position:relative;
}
.raid-mini-mob svg{width:22px;height:22px}
.raid-mini-mob.boss{border-color:var(--danger)}
.raid-mini-mob.boss.gold{border-color:var(--gold)}
.raid-mini-more{
  width:30px;height:30px;border-radius:9px;border:1px solid rgba(255,255,255,.25);
  background:rgba(4,6,16,.55);backdrop-filter:blur(6px);display:flex;align-items:center;
  justify-content:center;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);
}
/* Верхняя панель — карточка моба + полоса HP игрока (+ баннеры экзамена/
   реплея, если есть) одним flex-столбцом. Специально НЕ через отдельные
   absolute-блоки с угаданными отступами — так высота карточки (может
   переноситься на 2 строки у длинных имён) не ломает раскладку под ней. */
.raid-top-panel{
  position:absolute;top:calc(8px + env(safe-area-inset-top));left:14px;right:14px;z-index:5;
  display:flex;flex-direction:column;gap:4px;
}
/* Баннер экзамена/реплея рисуется первым в top-panel и в этот момент делит
   верхнюю строку с кнопкой "назад"/мини-очередью (обе — absolute, тот же
   верхний отступ, см. .raid-back/.raid-mini-queue выше). Карточку моба это
   не касается — без баннера она сама первая и должна сидеть у самого верха
   экрана без отступа. На экране отдыха (.rest-fullbleed) этой коллизии нет
   (там нет ни кнопки назад, ни мини-очереди) — там баннер по-прежнему без
   лишнего отступа. */
.raid-fullbleed:not(.rest-fullbleed) .raid-banner{margin-top:40px}
.raid-banner{
  padding:8px 12px;border-radius:12px;background:rgba(4,6,16,.6);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);font-size:12px;line-height:1.35;color:var(--text);
}
.raid-banner b{color:var(--gold)}
.raid-banner.replay{border-color:rgba(76,201,255,.35)}
.raid-banner.exam{border-color:rgba(255,59,92,.4)}
/* Карточка моба — раньше портрет и текст стояли в ряд (мелкая картинка
   слева, текст справа). По просьбе пользователя разложили в столбец:
   плашка врат сверху, крупный портрет по центру, имя/прогресс/HP снизу —
   так моб виден сразу, а не мелкой иконкой сбоку. Применяется одинаково
   ко всем мобам (не только к примеру со скриншота) — карточка одна на всех
   в rRaid(), другой разметки для конкретных типов мобов нет. */
/* Раньше вся карточка (плашка врат/портрет/имя/HP) сидела на одной сплошной
   полупрозрачной панели с блюром — на живом фоне камеры это читалось как
   тёмный "квадрат" за мобом, ровно то, что убирали у самой картинки моба
   (см. комментарий у mobVisual выше). Панель убрали совсем: заголовок,
   портрет, имя и HP теперь просто плавают над камерой без подложки, а
   читаемость текста держит text-shadow — тот же приём, что уже применён у
   других плавающих надписей поверх камеры (.raid-fullbleed .cam-status,
   .rest-ring-sub). Полосу HP (.hp-strip) не трогали — у неё функциональный
   тёмный фон под красной заливкой, не "квадрат-подложка" из жалобы. */
.raid-mob-card{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.raid-mob-card .mob-art{width:125px;height:125px;flex-shrink:0;margin:0}
.raid-mob-card-body{width:100%}
/* Плашка ранга/типа врат внутри карточки — наше добавление поверх плана
   пользователя: без неё контекст (какие именно врата, ранг, экзамен/
   испытание) терялся вместе со старой шапкой, а он важен для понимания
   риска на ходу. По просьбе пользователя переехала под портрет моба (была
   над ним) — теперь центрирована как остальные строки карточки, а не
   прижата к левому краю (там раньше был ориентир на кнопку "назад", но
   сейчас вся карточка сама уехала к самому верху экрана). */
.raid-gate-tag{
  font-family:'JetBrains Mono';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}
.raid-mob-card .mob-name{
  background:transparent;border:none;padding:0;width:auto;max-width:100%;margin-top:0;
  font-size:14px;justify-content:center;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.9);
}
.raid-mob-card .hp-strip{height:20px;margin-top:2px;background:rgba(11,14,28,.85)}
.raid-mob-card .hp-strip span{font-size:11px}
/* Ряд со счётчиком повторов и боковыми кнопками — по плану держим строго
   выше статус-строки камеры (жестовая зона iOS, см. комментарий у
   .raid-fullbleed .cam-status выше). Обе кнопки всегда на экране: "Отступить"
   слева, "Засчитать вручную" справа — можно самому досчитать промах живого
   счётчика, а не только при полном отказе камеры (Cam.error по-прежнему
   переключает камеру на текстовый фолбэк, см. showCamError(), но кнопка "+"
   от этого больше не зависит). */
.raid-counter-row{
  position:absolute;left:0;right:0;bottom:calc(66px + env(safe-area-inset-bottom));z-index:5;
  display:flex;align-items:flex-start;justify-content:center;gap:22px;padding:0 20px;
}
.raid-counter-row .rep-counter{position:static;width:74px;height:74px;font-size:28px}
/* Здоровье игрока — раньше жило отдельной плашкой в верхней панели, теперь
   прямо под золотым счётчиком повторов (по просьбе пользователя): и то и
   другое — про текущий заход в бою, логично держать рядом. Колонка чуть шире
   самого кружка, чтобы полоса HP не выглядела зауженной. */
.raid-counter-col{display:flex;flex-direction:column;align-items:center;gap:6px}
/* HP игрока теперь та же плашка-полоса (.hp-strip), что и у моба — раньше
   была тонкая линия (.hpbar, 7px) с числом отдельной строкой под ней, из-за
   чего два HP выглядели как разные элементы интерфейса. Ширина колонки
   выросла настолько, чтобы влезла полная подпись из updatePlayerHpDOM()
   ("Твоё HP N / M"), заливка — зелёная (player), а не красная, как у моба. */
.raid-counter-hp{width:132px}
.raid-counter-hp .hp-strip{height:20px;margin-top:0}
.raid-counter-hp .hp-strip i{background:linear-gradient(90deg,#1FAE71,#34D399)}
.raid-counter-hp .hp-strip span{font-size:10px}
/* Ряд теперь align-items:flex-start (а не center) — колонка счётчик+HP стала
   выше боковых кнопок, и center заметно сдвинул бы кнопки вниз от истинного
   центра самого кружка. flex-start + отступ сверху у кнопок = (74-52)/2 =
   11px даёт кнопкам центр ровно на высоте центра золотого кружка, а не
   всей колонки целиком. */
.raid-side-btn{
  width:52px;height:52px;margin-top:11px;border-radius:50%;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;
  border:1px solid rgba(255,255,255,.25);background:rgba(4,6,16,.55);backdrop-filter:blur(6px);
  color:var(--text);font-family:'Manrope',sans-serif;
}
.raid-side-btn.retreat{color:var(--danger);border-color:rgba(255,59,92,.4)}
.raid-side-btn.manual{color:var(--gold);border-color:rgba(245,194,66,.4);font-size:26px;font-family:'Russo One'}
/* Счётчик "пульсирует" на каждый засчитанный повтор — короткий scale-подскок,
   класс добавляется/снимается в updateRepCounterDOM() тем же приёмом, что уже
   используется у .mob-art.hit (снять → reflow → добавить, чтобы анимация
   ре-триггерилась на каждый вызов, а не срабатывала только один раз). */
.rep-counter.pulse{animation:repPulse .28s ease}
@keyframes repPulse{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
/* ---- отдых между мобами — тот же полноэкранный слой камеры, что и на бою
   (см. .screen.raid-fullbleed/.raid-fullbleed .cam-wrap выше — .rest-fullbleed
   переиспользует тот же класс на .screen), но другой набор оверлеев: баннер
   "перезарядка маны" сверху, кольцо-таймер по центру, HP игрока и кнопка
   "Атаковать сейчас" снизу. Ручной кнопки здесь сознательно нет — см.
   комментарий в showCamError() про то, почему на отдыхе это списывало бы HP
   ещё не начавшемуся бою; отступить тоже не предлагаем — это уже можно было
   сделать на самом бою, только что законченном. */
.rest-fullbleed .raid-top-panel{top:calc(14px + env(safe-area-inset-top));right:70px}
.rest-fullbleed .rep-counter{
  position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;left:auto;bottom:auto;
  width:46px;height:46px;font-size:19px;z-index:5;
}
.rest-ring-wrap{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
/* Тёмная радиальная подложка под кольцом — тот же приём читаемости, что и у
   верхней/нижней тени камеры (.raid-fullbleed .cam-wrap::before/::after):
   серая линия-трек кольца (var(--line)) едва видна на живом фоне камеры без
   подложки под ней. */
.rest-ring-wrap::before{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;z-index:-1;
  background:radial-gradient(circle, rgba(2,3,10,.72) 0%, rgba(2,3,10,.4) 60%, transparent 100%);
}
.rest-ring-sub{color:var(--muted);font-size:14px;text-shadow:0 2px 10px rgba(0,0,0,.85)}
.rest-bottom-panel{
  position:absolute;left:14px;right:14px;z-index:5;bottom:calc(84px + env(safe-area-inset-bottom));
  padding:10px 14px;border-radius:14px;background:rgba(4,6,16,.55);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);
}
.rest-bottom-panel .hpbar{margin-top:0}
.rest-bottom-panel .hp-num{margin-top:2px}
.rest-attack-bar{
  position:absolute;left:0;right:0;bottom:0;z-index:5;
  padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg, rgba(2,3,10,.92), rgba(2,3,10,.55) 65%, transparent);
}
/* Живая калибровка перед боем — поверх превью камеры. Вместо слепого таймера
   ждём, чтобы Система реально увидела человека в кадре и продержала это
   распознавание стабильно ~1.5с (см. updateCalibration() в блоке камеры) —
   тогда бой стартует сразу, а не по произвольной цифре. */
.raid-calib{
  position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(2,3,10,.55);text-align:center;padding:0 24px;animation:countPulse .3s ease;
}
@keyframes countPulse{0%{transform:scale(1.06);opacity:0}100%{transform:scale(1);opacity:1}}
.raid-calib-label{font-family:'Manrope',sans-serif;font-weight:700;font-size:16px;color:var(--text);text-shadow:0 2px 8px rgba(0,0,0,.7)}
.raid-calib[data-state="searching"] .raid-calib-label{color:var(--muted)}
.raid-calib[data-state="ready"] .raid-calib-label{font-family:'Russo One',sans-serif;font-size:22px;color:var(--gold);text-shadow:0 0 24px rgba(245,194,66,.6)}
.raid-calib-bar{width:150px;height:6px;border-radius:3px;background:rgba(255,255,255,.15);overflow:hidden}
.raid-calib-bar i{display:block;height:100%;width:0;background:var(--gold);border-radius:3px;transition:width .15s linear}
.raid-calib-sub{font-family:'Manrope',sans-serif;font-size:12.5px;color:var(--muted)}
/* Полупрозрачный контур-подсказка "где стоять" — виден только пока Система
   ещё ищет человека в кадре (searching). Как только реально пошла живая
   трекинг-калибровка (holding), контур и подсказка про дистанцию гаснут —
   их сменяет уже настоящий скелет, отрисованный в canvas поверх видео. */
.raid-guide{position:absolute;inset:0;z-index:-1;opacity:0;transition:opacity .35s ease;pointer-events:none}
.raid-calib[data-state="searching"] .raid-guide{opacity:.42}
.raid-guide-line{stroke:var(--sys)}
.raid-calib-distance{font-family:'Manrope',sans-serif;font-size:12px;color:var(--sys);opacity:0;transition:opacity .3s ease}
.raid-calib[data-state="searching"] .raid-calib-distance{opacity:1}
/* Счётчик отжиманий за весь текущий заход во врата — снизу слева поверх камеры,
   обновляется на каждое повторение (см. registerPush()/updateRepCounterDOM()). */
.rep-counter{
  position:absolute;left:12px;bottom:12px;z-index:3;width:52px;height:52px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%, rgba(245,194,66,.95), rgba(184,134,11,.95) 70%);
  border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:'Russo One';font-size:21px;color:#1A1204;box-shadow:0 0 18px rgba(245,194,66,.6);
}
/* Плашка "враг повержен" — поверх камеры на пару секунд сразу после убийства
   моба, пока не сменился экран (см. showKillBanner() в registerPush()).
   z-index:4 — ниже кнопок назад/отступить/счётчика (те z:5 в raid-fullbleed,
   см. .cam-wrap без своего stacking context выше), чтобы отступить
   оставалось нажимаемым даже пока плашка на экране. */
.kill-banner{
  position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;background:rgba(2,3,10,.4);animation:killPop .35s ease;
}
.kill-skull{font-size:32px;filter:drop-shadow(0 0 10px rgba(255,59,92,.7))}
.kill-text{
  font-family:'Russo One',sans-serif;font-size:32px;line-height:1.08;text-align:center;color:#FF3B5C;
  text-shadow:0 0 18px rgba(255,59,92,.85), 0 0 40px rgba(255,59,92,.5);letter-spacing:1px;
}
@keyframes killPop{0%{transform:scale(1.3);opacity:0}100%{transform:scale(1);opacity:1}}
.dots{display:flex;gap:8px;justify-content:center;margin-top:14px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line)}
.dot.done{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.cur{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.rest-timer{font-family:'Russo One';font-size:64px;text-align:center;color:var(--sys);text-shadow:0 0 26px rgba(76,201,255,.4);margin:8px 0}
.dmg-float{position:absolute;font-family:'Russo One';font-size:30px;color:var(--gold);text-shadow:0 0 14px rgba(245,194,66,.6);animation:floatUp 1s forwards;pointer-events:none}
.dmg-float.xp-float{font-size:16px;color:var(--sys);text-shadow:0 0 10px rgba(76,201,255,.6);animation-delay:.1s}
@keyframes floatUp{to{transform:translateY(-70px);opacity:0}}

/* ---- победа ---- */
.loot{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.loot .card{width:86px;padding:12px 6px;border-radius:14px;border:1px solid var(--sys-dim);background:var(--panel);text-align:center}
/* Разблокировка титула на экране победы — см. titleUnlockHTML(). Заметно
   тише баннера ранг-апа (тот золотой, во всю ширину, с сиянием) — здесь
   только короткая вспышка рамки, гаснущая до статичного вида. */
.title-unlock{position:relative;width:100%;margin-top:10px;border:1px solid var(--line);background:var(--panel);
  border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;overflow:hidden;
  opacity:0;transform:translateY(10px);animation:titleUnlockIn .45s ease forwards}
.title-unlock .tu-flash{position:absolute;inset:0;border-radius:12px;border:2px solid var(--gold);opacity:0;animation:titleUnlockFlash .9s ease forwards;pointer-events:none}
.title-unlock .tu-badge{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--panel-solid);border:1px solid var(--gold);color:var(--gold)}
.title-unlock .tu-tag{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.title-unlock .tu-name{font-family:'Manrope',sans-serif;font-weight:800;font-size:14.5px;color:var(--gold)}
@keyframes titleUnlockIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes titleUnlockFlash{0%{opacity:0}15%{opacity:.9}75%{opacity:.9}100%{opacity:0}}
.loot .card .v{font-family:'Russo One';font-size:20px;color:var(--gold)}
.loot .card .k{font-size:11px;color:var(--muted);margin-top:4px}
.xpbar{width:100%;height:12px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:8px}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--sys),var(--mana));border-radius:6px;transition:width 1.2s ease}

/* ---- профиль ---- */
.profile-head{display:flex;align-items:center;gap:16px;margin:8px 0 18px}
.avatar{width:74px;height:74px;border-radius:20px;border:2px solid var(--sys);display:flex;align-items:center;justify-content:center;font-family:'Russo One';font-size:36px;color:var(--sys);box-shadow:0 0 20px rgba(76,201,255,.3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
/* Три колонки — раздельная статистика отжиманий/приседаний в профиле
   (сегодня/неделя/всего на каждое упражнение, см. rProfile()). */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.grid3 .gcard{padding:11px 8px}
.grid3 .gcard .v{font-size:19px}
.gcard{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px}
.gcard .v{font-family:'Russo One';font-size:24px;color:var(--gold)}
.gcard .k{font-size:12px;color:var(--muted);margin-top:4px}
/* ---- Экран "Титулы и бестиарий" (rTitlesScreen) ---- */
.tb-tabs{display:flex;gap:8px;margin-top:4px}
.tb-tabs button{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:800;font-size:13px;cursor:pointer}
.tb-tabs button.on{border-color:var(--sys);color:var(--sys);box-shadow:0 0 12px rgba(76,201,255,.2)}
.title-card{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:13px;margin-top:9px;display:flex;align-items:center;gap:12px}
.title-card.locked{opacity:.55}
.title-card.unlocked{border-color:rgba(245,194,66,.4)}
.title-card .tc-badge{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--panel-solid);border:1px solid var(--line)}
.title-card.unlocked .tc-badge{border-color:var(--gold);color:var(--gold)}
.title-card .tc-body{flex:1;min-width:0}
.title-card .tc-name{font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;color:var(--text)}
.title-card.unlocked .tc-name{color:var(--gold)}
.title-card .tc-sub{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}
.title-card .tc-select{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--panel-solid);color:var(--gold);font-size:13px;cursor:pointer}
.title-card .tc-select.on{border-color:var(--gold);box-shadow:0 0 10px rgba(245,194,66,.4)}
.beast-group-title{margin-top:18px;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.beast-card{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:11px;display:flex;align-items:center;gap:10px;margin-top:8px}
.beast-card.unseen{opacity:.5}
.beast-card.seen{opacity:.8}
.beast-card .bc-portrait{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--panel-solid);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.beast-card .bc-body{flex:1;min-width:0}
.beast-card .bc-name{font-family:'Manrope',sans-serif;font-weight:800;font-size:13px}
.beast-card .bc-lore{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);background:var(--panel);border-radius:14px;margin-top:8px}
.lb-row.me{border-color:var(--gold);box-shadow:0 0 12px rgba(245,194,66,.25)}
.lb-rnk{width:24px;flex-shrink:0;font-family:'JetBrains Mono';font-size:13px;color:var(--muted);text-align:center}
.lb-rank-badge{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Russo One';font-size:12px;color:var(--sys);border:1px solid var(--line)}
.lb-name{flex:1;min-width:0;font-weight:800;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'JetBrains Mono';font-weight:800;color:var(--gold);font-size:14px;flex-shrink:0}
.lb-divider{text-align:center;color:var(--muted);font-size:13px;letter-spacing:3px;margin:12px 0 4px}
.gold{color:var(--gold)}.cy{color:var(--sys)}.vio{color:#CBB7FF}
</style>
</head>
<body>
<div id="phone"><div id="root"></div></div>
<div class="rotate-hint">Разверни телефон вертикально — «Врата» рассчитаны на портретную ориентацию.</div>
<script>
/* ============ СОСТОЯНИЕ ============ */
const S = {
  screen: 'splash',
  step: 0,
  ans: { name:'', exp:null, goal:null, age:25, max:null, days:null, time:null },
  rank: 'E',
  level: 1, xp: 20, streak: 0, totalPush: 0,
  pushToday: 0, pushWeek: 0,
  // Разбивка того же счётчика повторов по упражнению (см. registerPush()) —
  // для профиля, где "Прогресс повторений" теперь считает отжимания и
  // приседания отдельно. totalPush/pushToday/pushWeek выше по-прежнему растут
  // на КАЖДЫЙ повтор (сумма обоих) — трогать их не стал, чтобы не задевать
  // остальную логику (XP/стрик тут ни при чём, это чисто витринная статистика).
  pushupsTotal: 0, pushupsToday: 0, pushupsWeek: 0,
  squatsTotal: 0, squatsToday: 0, squatsWeek: 0,
  // Какое направление сейчас открыто на карте — 'strength' (Врата Силы,
  // отжимания) или 'endurance' (Врата Выносливости, приседания), см. TRACKS.
  currentTrack: 'strength',

  doneGates: [],

  settings: { notifications:true, sound:true, vibration:true, stormMode:false },

  titles: [],       // id разблокированных титулов (короткие строки)

  achievements: [],

/* ============ TELEGRAM MINI APP ============ */
// initData пустая строка вне Telegram (открыто как обычная веб-страница) —
// по ней и отличаем реальный запуск внутри клиента Telegram от браузера.
// Весь код ниже аккуратно проверяет TG на существование, поэтому страница
// продолжает нормально работать и как обычный сайт вне Telegram.
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
const inTelegram = !!(TG && TG.initData);

/* ============ Напоминания "Ежедневный призыв" на сервере ============
   Мини-апп сам ничего не присылает — он только сообщает боту-воркеру на
   Cloudflare, во сколько (по UTC) написать пользователю. Сам пуш шлёт бот,
   по Cron Trigger, см. vrata-bot-worker.js. */
const REMINDER_API_URL = 'https://vrata-bot.emerald520for.workers.dev/api/reminder';

function localTimeToUTC(hhmm){
  if(!hhmm) return null;
  const p = parseTime24(hhmm); // тот же парсер, что и у колёс — понимает и старый формат "6:00 PM"
  const d = new Date();
  d.setHours(Number(p.h), Number(p.m), 0, 0);
  return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
}

function syncReminder(){
  if(!TG || !TG.initDataUnsafe || !TG.initDataUnsafe.user) return;
  const chatId = TG.initDataUnsafe.user.id;
  const on = !!(S.settings.notifications && S.ans.time);
  const time = on ? localTimeToUTC(S.ans.time) : null;
  try{
    fetch(REMINDER_API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chatId, time }),
    }).catch(()=>{});
  }catch(e){}
}

// Фиксирует на сервере факт открытия мини-аппа (для /stats) — отдельно от
// напоминаний, чтобы учитывать всех уникальных пользователей, а не только
// тех, кто писал /start боту.
const TRACK_API_URL = 'https://vrata-bot.emerald520for.workers.dev/api/track';
function trackOpen(){
  if(!TG || !TG.initDataUnsafe || !TG.initDataUnsafe.user) return;
  const chatId = TG.initDataUnsafe.user.id;
  try{
    fetch(TRACK_API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chatId }),
    }).catch(()=>{});
  }catch(e){}
}
/* ============ Таблица лидеров ============
   Клиент шлёт своё текущее НАКОПИТЕЛЬНОЕ значение за сегодня (pushupsToday/
   squatsToday) по завершении рейда (см. winRaid()) — не на каждый повтор,
   иначе это утопит лимит запросов воркера и D1. Сервер сам решает, в какой
   день/неделю (по UTC) записать очки, и перезаписывает, а не суммирует —
   повторная отправка того же числа ничего не задваивает. */
const SCORE_API_URL = 'https://vrata-bot.emerald520for.workers.dev/api/score';
const LEADERBOARD_API_URL = 'https://vrata-bot.emerald520for.workers.dev/api/leaderboard';

function rankChatId(){
  return (TG && TG.initDataUnsafe && TG.initDataUnsafe.user) ? TG.initDataUnsafe.user.id : null;
}
function sendScore(){
  const chatId = rankChatId();
  if(!chatId) return;
  try{
    fetch(SCORE_API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chatId, name:S.ans.name, rank:S.rank, pushupsToday:S.pushupsToday, squatsToday:S.squatsToday }),
    }).catch(()=>{});
  }catch(e){}
}
// Загружает топ-20 + свою строку (если не попал в топ) для текущей комбинации
// вкладок (S.rankTab/S.rankPeriod). Проверка "гонки" перед применением ответа —
// пока шёл запрос, пользователь мог переключить вкладку или уйти с экрана,
// тогда устаревший ответ просто отбрасывается, а не затирает актуальный.
function loadLeaderboard(){
  const tab = S.rankTab, period = S.rankPeriod;
  const chatId = rankChatId();
  S.rankLoading = true; S.rankError = false;
  const qs = `?exercise=${tab}&period=${period}` + (chatId ? `&chatId=${chatId}` : '');
  fetch(LEADERBOARD_API_URL + qs)
    .then(r=>{ if(!r.ok) throw new Error('bad response'); return r.json(); })
    .then(data=>{
      if(S.screen!=='rank' || S.rankTab!==tab || S.rankPeriod!==period) return;
      S.rankData = data; S.rankLoading = false;
      render();
    })
    .catch(()=>{
      if(S.screen!=='rank' || S.rankTab!==tab || S.rankPeriod!==period) return;
      S.rankLoading = false; S.rankError = true;
      render();
    });
}
function setRankTab(tab){
  if(S.rankTab===tab) return;
  S.rankTab = tab; S.rankData = null; render(); loadLeaderboard();
}
function setRankPeriod(period){
  if(S.rankPeriod===period) return;
  S.rankPeriod = period; S.rankData = null; render(); loadLeaderboard();
}
// "Активен сейчас" в /stats — это не настоящий realtime, а "виделся за
// последние 5 минут" на сервере. Чтобы это было честно для тех, кто держит
// приложение открытым долго, шлём отметку раз в минуту, пока вкладка видима.
function startPresenceHeartbeat(){
  if(!TG || !TG.initDataUnsafe || !TG.initDataUnsafe.user) return;
  // Было 60000 (раз в минуту) — при большом числе одновременно активных
  // пользователей это быстро упиралось в дневной лимит записей на
  // бесплатном тарифе Cloudflare KV (1000 записей/сутки), и после лимита
  // переставало сохраняться вообще всё, включая напоминания и статистику.
  // 300000 (раз в 5 минут) снижает число записей примерно в 5 раз.
  setInterval(()=>{ if(document.visibilityState==='visible') trackOpen(); }, 300000);
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible') trackOpen();
  });
}
// Пока в фокусе текстовое поле, не трогаем --tg-vh вообще — судя по видео от
// пользователя, именно пересчёт высоты вьюпорта прямо во время анимации
// системной клавиатуры на Android-клиенте Telegram и обрывает её (клавиатура
// открывается и тут же схлопывается сама, с лёгким затемнением экрана —
// похоже на конфликт двух ресайзов подряд). focusin/focusout всплывают,
// поэтому один обработчик на document ловит любое текстовое поле, не только
// текущее (имя) — на будущее тоже.
let viewportSuppressed = false;
// kb-open на <html> дополнительно отключает landscape-заглушку "разверни
// телефон" — при открытой клавиатуре сжатый Telegram'ом вьюпорт формально
// становится "ландшафтным", и без этого класса заглушка прятала всё
// приложение вместе с полем ввода, обрывая фокус (см. комментарий в CSS).
document.addEventListener('focusin', e=>{ if(e.target && e.target.tagName==='INPUT'){ viewportSuppressed = true; document.documentElement.classList.add('kb-open'); } });
document.addEventListener('focusout', e=>{ if(e.target && e.target.tagName==='INPUT'){ viewportSuppressed = false; document.documentElement.classList.remove('kb-open'); } });
function applyTgViewport(e){
  if(!TG || viewportSuppressed) return;
  // Telegram шлёт viewportChanged несколько раз подряд во время анимации
  // (isStateStable:false), и только последний раз — когда высота уже
  // устоялась. Реагируем только на финальное событие, а не на каждое
  // промежуточное — так же советует делать официальная документация Bot API.
  if(e && e.isStateStable===false) return;
  const hpx = TG.viewportStableHeight || TG.viewportHeight;
  if(hpx) document.documentElement.style.setProperty('--tg-vh', hpx+'px');
}
/* Экран → куда ведёт нативная кнопка "назад" в шапке Telegram. Полностью
   повторяет логику собственных стрелок "‹" на каждом экране — в мини-аппе
   нет браузерного "назад", и системная кнопка должна вести туда же, иначе
   получится два разных способа выйти с разным результатом. */
function tgBack(){
  switch(S.screen){
    case 'quiz': if(S.step===0){ go('splash'); } else { S._navDir=-1; S.step--; render(); } return;
    case 'journey': go('reveal'); return;
    case 'raid': go('map'); return;
    case 'settings': go(S.prevScreen||'map'); return;
    case 'titles': go(S.prevScreen||'profile'); return;
    default: return; // на splash/reveal/map/rest/victory/profile своей стрелки нет — прячем и нативную
  }
}
function updateTgBackButton(){
  if(!TG || !TG.BackButton) return;
  const show = ['quiz','journey','raid','settings','titles'].includes(S.screen);
  try{ show ? TG.BackButton.show() : TG.BackButton.hide(); }catch(e){}
}
/* Блокировка свайпа-вниз нужна ТОЛЬКО во время подхода — иначе на экранах с
   текстовым вводом (например, имя в квизе) она, судя по всему, конфликтует
   с открытием клавиатуры в Android-клиенте Telegram: клавиатура на долю
   секунды всплывает и тут же захлопывается. Включаем блокировку точечно
   только на raid/rest (там же живёт камера), на всех остальных экранах
   свайп остаётся обычным. */
function updateSwipeLock(){
  if(!TG) return;
  const lock = S.screen==='raid' || S.screen==='rest';
  try{
    if(lock){ if(TG.disableVerticalSwipes) TG.disableVerticalSwipes(); }
    else { if(TG.enableVerticalSwipes) TG.enableVerticalSwipes(); }
  }catch(e){}
}
/* Тактильный отклик через нативный API Telegram вместо голого navigator.vibrate —
   у встроенного в клиент WebView он либо не поддержан, либо требует разрешений,
   которых у мини-аппа просто нет. Вне Telegram тихо откатываемся на vibrate. */
function hapticImpact(style){
  if(TG && TG.HapticFeedback){ try{ TG.HapticFeedback.impactOccurred(style||'medium'); return; }catch(e){} }
  if(navigator.vibrate){ try{ navigator.vibrate(style==='heavy'?[40,30,60]:35); }catch(e){} }
}

/* ============ ЗВУК УДАРА ============ */
// Общий AudioContext создаётся и "разблокируется" на первый же тап где угодно
// в приложении — браузеры/Telegram WebView запрещают звук без явного жеста
// пользователя. Ко входу в рейд (а до него всегда есть тапы по квизу/карте)
// звук уже готов работать без дополнительных действий игрока.
let audioCtx = null;
function ensureAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  return audioCtx;
}
document.addEventListener('pointerdown', ensureAudioCtx, { once:true });
/* Короткий синтезированный "удар" по мобу — без внешних аудиофайлов (тот же
   принцип, что и с локально нарисованной картинкой врат: ничего стороннего
   не подключаем). Падающий тон + быстрый экспоненциальный спад громкости —
   компактный "чпок", не режет слух при частых повторах. На добивающий удар
   (heavy) тон ниже, дольше и громче — читается как более весомый импакт. */
function playHitSound(heavy){
  if(!S.settings.sound) return;
  const ctx = ensureAudioCtx(); if(!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(heavy?220:340, now);
  osc.frequency.exponentialRampToValueAtTime(heavy?90:150, now+0.11);
  gain.gain.setValueAtTime(heavy?0.22:0.14, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+(heavy?0.22:0.13));
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now+(heavy?0.24:0.15));
}
function tgInit(){
  if(!TG) return;
  try{
    TG.ready();
    TG.expand();
    // Свайп блокируется точечно из updateSwipeLock() (см. render()) — только
    // на экранах подхода, не глобально при старте (см. комментарий там же).
    if(TG.setHeaderColor) TG.setHeaderColor('#05070F');
    if(TG.setBackgroundColor) TG.setBackgroundColor('#05070F');
    document.documentElement.classList.add('tg-app');
    applyTgViewport();
    TG.onEvent('viewportChanged', applyTgViewport);
    TG.BackButton.onClick(tgBack);
  }catch(e){ console.warn('Telegram WebApp init не удался', e); }
}

/* ============ СОХРАНЕНИЕ ПРОГРЕССА (localStorage + Telegram CloudStorage) ============ */
const SAVE_KEY = 'vrata_save_v1';
function saveState(){
  const payload = JSON.stringify({
    ans:S.ans, rank:S.rank, level:S.level, xp:S.xp, streak:S.streak,
    totalPush:S.totalPush, pushToday:S.pushToday, pushWeek:S.pushWeek,
    pushupsTotal:S.pushupsTotal, pushupsToday:S.pushupsToday, pushupsWeek:S.pushupsWeek,
    squatsTotal:S.squatsTotal, squatsToday:S.squatsToday, squatsWeek:S.squatsWeek,
    currentTrack:S.currentTrack,
    doneGates:S.doneGates, doneGatesEndurance:S.doneGatesEndurance, settings:S.settings,
    lastWinDate:S.lastWinDate, todayDate:S.todayDate, onboarded:S.onboarded,
    titles:S.titles, bestiary:S.bestiary, selectedTitle:S.selectedTitle,
    achievements:S.achievements, everDied:S.everDied,
  });
  try{ localStorage.setItem(SAVE_KEY, payload); }catch(e){ /* приватный режим и т.п. — просто не сохраняем локально */ }
  // CloudStorage синхронизирует прогресс между устройствами одного аккаунта
  // Telegram; localStorage выше остаётся быстрым локальным кэшем на случай,
  // если CloudStorage недоступен или это вообще не Telegram. Лимит Bot API —
  // 4096 символов на значение, при переполнении просто не шлём в облако.
  if(TG && TG.CloudStorage && payload.length < 4000){
    try{ TG.CloudStorage.setItem(SAVE_KEY, payload, ()=>{}); }catch(e){}
  }
}
function applyStateFromRaw(raw){
  try{
    const data = JSON.parse(raw);
    Object.assign(S.ans, data.ans||{});
    S.rank = data.rank || 'E';
    S.level = data.level || 1;
    S.xp = data.xp || 0;
    S.streak = data.streak || 0;
    S.totalPush = data.totalPush || 0;
    S.pushToday = data.pushToday || 0;
    S.pushWeek = data.pushWeek || 0;
    S.pushupsTotal = data.pushupsTotal || 0;
    S.pushupsToday = data.pushupsToday || 0;
    S.pushupsWeek = data.pushupsWeek || 0;
    S.squatsTotal = data.squatsTotal || 0;
    S.squatsToday = data.squatsToday || 0;
    S.squatsWeek = data.squatsWeek || 0;
    S.currentTrack = (data.currentTrack==='endurance') ? 'endurance' : 'strength';
    S.doneGates = data.doneGates || [];
    S.doneGatesEndurance = data.doneGatesEndurance || [];
    Object.assign(S.settings, data.settings||{});
    S.lastWinDate = data.lastWinDate || null;
    S.todayDate = data.todayDate || null;
    S.onboarded = !!data.onboarded;
    S.titles = data.titles || [];
    S.bestiary = data.bestiary || {};
    S.selectedTitle = data.selectedTitle || null;
    S.achievements = data.achievements || [];
    S.everDied = !!data.everDied;
    return true;
  }catch(e){ return false; }
}
function loadState(){
  const raw = (function(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } })();
  if(!raw) return false;
  return applyStateFromRaw(raw) && S.onboarded;
}
/* Догружаем облачную копию уже ПОСЛЕ первого рендера с локальными данными —
   приложение открывается мгновенно, не дожидаясь round-trip к серверам
   Telegram. Если там лежит более свежий профиль (играли с другого устройства),
   тихо подменяем состояние и перерисовываем экран. */
function syncFromCloud(){
  if(!TG || !TG.CloudStorage) return;
  try{
    TG.CloudStorage.getItem(SAVE_KEY, (err, value)=>{
      if(err || !value) return;
      const localRaw = (function(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } })();
      if(value === localRaw) return; // уже синхронизировано — лишний рендер не нужен
      if(applyStateFromRaw(value)){
        try{ localStorage.setItem(SAVE_KEY, value); }catch(e){}
        if(S.onboarded && S.screen!=='raid' && S.screen!=='rest'){ S.screen='map'; render(); }
      }
    });
  }catch(e){}
}

const AGE_VALUES = Array.from({length:80-14+1}, (_,i)=>14+i);
const HOUR_VALUES = Array.from({length:24}, (_,i)=> i<10?'0'+i:''+i);
const MIN_VALUES = Array.from({length:60}, (_,i)=> i<10?'0'+i:''+i);

function parseTime24(str){
  if(str){
    let m = /^(\d{1,2}):(\d{2})\s*(AM|PM)?$/i.exec(str.trim()); // третья группа — поддержка старого 12-часового формата
    if(m){
      let hh = Number(m[1]);
      if(m[3]){ const ampm = m[3].toUpperCase(); hh = hh%12; if(ampm==='PM') hh += 12; }
      if(hh>=0 && hh<=23) return { h: hh<10?'0'+hh:''+hh, m:m[2] };
    }
  }
  return { h:'18', m:'00' };
}

function wheelColHTML(id, items, selectedIdx){
  const rows = items.map(v=>`<div class="wheel-item">${v}</div>`).join('');
  return `<div class="wheel-col" id="${id}" data-idx="${selectedIdx}"><div class="wheel-track">${rows}</div></div>`;
}

function smoothScrollTo(el, top){
  // На очень старых движках scrollTo({behavior:'smooth'}) может бросить исключение —
  // откатываемся на мгновенный scrollTop.
  try{ el.scrollTo({top, behavior:'smooth'}); }
  catch(e){ el.scrollTop = top; }
}
function setupWheel(elId, values, initialIndex, onSettle){
  const el = document.getElementById(elId);
  if(!el) return;
  const items = [...el.querySelectorAll('.wheel-item')];
  function itemHeight(){ return items[0] ? items[0].offsetHeight : 44; }
  function applyStyle(){
    const centerScroll = el.scrollTop + el.clientHeight/2;
    items.forEach(it=>{
      const itemCenter = it.offsetTop + it.offsetHeight/2;
      const d = Math.abs(itemCenter-centerScroll);
      it.style.opacity = Math.max(.18, 1-d/95);
      it.style.transform = `scale(${Math.max(.72, 1-d/230)})`;
    });
  }
  let raf=null;
  function settle(isInit){
    const itemH = itemHeight();
    if(!itemH) return;
    let idx = Math.round(el.scrollTop/itemH);
    idx = Math.max(0, Math.min(values.length-1, idx));
    const target = idx*itemH;
    if(Math.abs(el.scrollTop-target)>0.5) smoothScrollTo(el, target);
    // На самой первой инициализации колеса просто фиксируем позицию —
    // без вызова onSettle/пульса, иначе выбор "срабатывает" сам по себе,
    // хотя пользователь ещё ничего не крутил (было видно как двойной settle()).
    if(isInit) return;
    onSettle(values[idx], idx);
    const centerItem = items[idx];
    if(centerItem){ centerItem.classList.add('pulse'); setTimeout(()=>centerItem.classList.remove('pulse'), 300); }
  }
  el.addEventListener('scroll', ()=>{
    if(!raf) raf = requestAnimationFrame(()=>{ applyStyle(); raf=null; });
    clearTimeout(el._settleT);
    el._settleT = setTimeout(()=>settle(false), 130);
  });
  // Позиционирование колеса откладываем на следующий кадр отрисовки: если экран
  // ещё находится в процессе slide-перехода (hAnimated), к этому моменту layout
  // уже гарантированно посчитан и высоты элементов не "плавают" — раньше на
  // медленных телефонах колесо иногда успевало прыгнуть не на то значение.
  requestAnimationFrame(()=>{
    const itemH = itemHeight();
    el.scrollTop = initialIndex*itemH;
    applyStyle();
    settle(true);
  });
}

function timeWheelHTML(defaultVal){
  const p = parseTime24(defaultVal);
  return `<div class="wheel-wrap">
    <div class="wheel-highlight"></div>
    ${wheelColHTML('wheelHour', HOUR_VALUES, HOUR_VALUES.indexOf(p.h))}
    <div class="wheel-colon">:</div>
    ${wheelColHTML('wheelMin', MIN_VALUES, MIN_VALUES.indexOf(p.m))}
  </div>`;
}
function setupTimeWheels(defaultVal, onChange){
  const p = parseTime24(defaultVal);
  const state = { h:p.h, m:p.m };
  function commit(){ onChange(`${state.h}:${state.m}`); }
  setupWheel('wheelHour', HOUR_VALUES, HOUR_VALUES.indexOf(p.h), v=>{ state.h=v; commit(); });
  setupWheel('wheelMin', MIN_VALUES, MIN_VALUES.indexOf(p.m), v=>{ state.m=v; commit(); });
}

/* ---- генератор HP: 5 значений плавно растущих от lo до hi ---- */
function spread(lo, hi, n=5){
  const out=[];
  for(let i=0;i<n;i++) out.push(Math.round(lo + i*(hi-lo)/(n-1)));
  return out;
}
// Раньше волна мобов делилась 60/40 между отжиманиями и приседаниями в одной
// и той же карте врат, а босс — на 2 фазы по HP. Теперь вместо смешанного
// формата — два отдельных направления (Сила/Выносливость, см. buildGates()),
// каждое целиком одним упражнением, поэтому и генератор мобов просто получает
// нужное упражнение параметром и проставляет его всем мобам волны без исключений.
function regularMobs(lo,hi,name,kind,exercise){
  return spread(lo,hi).map(hp=>({ maxHp:hp, name, kind, exercise }));
}
function bossMobs(trashLo,trashHi,bossHp,trashName,bossName,kind,exercise){
  const trash = spread(trashLo,trashHi).map(hp=>({ maxHp:hp, name:trashName, kind, isBoss:false, exercise }));
  return [...trash, { maxHp:bossHp, name:bossName, kind, isBoss:true, exercise }];
}
// Какое упражнение нужно для конкретного моба — берётся из m.exercise,
// который выставляется один раз при генерации волны и больше не меняется
// (см. buildGates()/regularMobs()/bossMobs()). Раньше здесь был ещё
// динамический сплит: у босса упражнение переключалось по ходу боя при
// пересечении половины HP (смешанный формат врат, одна карта на оба
// упражнения). Убрано вместе с самим смешанным форматом — теперь у каждого
// направления (Сила/Выносливость) одно упражнение на все врата целиком,
// включая боссов, так что менять позу посреди боя больше не нужно.
function mobExercise(m){
  if(!m) return 'pushup';
  return m.exercise || 'pushup';
}
// Что нужно делать прямо сейчас в активном заходе (текущий моб в очереди).
function currentExercise(){
  const r = S.raid; if(!r) return 'pushup';
  return mobExercise(r.mobs[r.idx]);
}
// Иконка + подпись для UI (очередь мобов, плашка под именем моба, калибровка).
function exerciseLabel(ex){
  return ex==='squat' ? { icon:'🦵', name:'Приседания', verb:'приседания' } : { icon:'👊', name:'Отжимания', verb:'отжимания' };
}

/* ---- сборка полной карты врат по конфигурации рангов ----
   Параметризовано упражнением: раньше была одна общая GATES со смешанными
   мобами, теперь строим её дважды — целиком отжиманиями (Врата Силы) и
   целиком приседаниями (Врата Выносливости), см. TRACKS ниже. Структура
   (ранги, названия, HP, число мобов) у обеих карт идентична — отличается
   только то, каким упражнением бьём. */
function buildGates(forcedExercise){
  const gates=[]; let r=0;
  RANK_DEFS.forEach((def,rankIdx)=>{
    const hiList=[];
    for(let i=0;i<def.regularCount;i++){
      const lo=3+r, hi=6+r; hiList.push(hi); r++;
      gates.push({ name:def.regularNames[i], rank:def.rank, stage:'regular', gateColor:'violet',
        mobs:regularMobs(lo,hi,def.regularMobNames[i],def.regularKinds[i],forcedExercise) });
    }
    const half = Math.ceil(def.regularCount/2);
    const Htrial = hiList[half-1];
    const Hexam = hiList[hiList.length-1];
    gates.push({ name:'Испытание: '+def.trial.bossName, rank:def.rank, stage:'trial', gateColor:'gold',
      mobs:bossMobs(Htrial+2,Htrial+4,Htrial+4+2, def.trial.trashName, def.trial.bossName, def.trial.kind, forcedExercise) });
    gates.push({ name:'Красные врата '+ROMAN[rankIdx], rank:def.rank, stage:'exam', gateColor:'red', red:true,
      mobs:bossMobs(Hexam+5,Hexam+7,Hexam+7+4, def.exam.trashName, def.exam.bossName, def.exam.kind, forcedExercise) });
  });
  gates.push({ name:'Бесконечные врата', rank:'S', locked:true });
  return gates.map((g,i)=>({ id:i, ...g }));
}
