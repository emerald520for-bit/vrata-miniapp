// Достижения — отдельная полка от титулов: не описывают "кем стал охотник",
// а просто фиксируют пройденные вехи, и намеренно не подписаны условием
// получения в интерфейсе (см. rTitlesAchievementsTab()) — сюрприз, а не
// чек-лист. Условие получения у каждого — в коде рядом с местом разблокировки
// (winRaid(), playerDied()/startRaid(), retreatRaid()), не здесь.
const ACHIEVEMENTS_LIST = [
  { id:'first_gate', name:'Первый шаг' },
  { id:'first_rankup', name:'Пробуждение началось' },
  { id:'first_trial', name:'Первое испытание позади' },
  { id:'phoenix', name:'Восставший из пепла' },
  { id:'first_retreat', name:'Разумное отступление' },
];

// unlockTitle() — единая точка записи разблокировки: пишет в постоянный
// прогресс (S.titles) и, если разблокировка произошла во время боя,
// складывает id в S.raid.newTitles — они не показываются немедленно, а
// копятся за весь текущий заход и все разом всплывают на экране победы
// (см. rVictory()), одним за другим.
function unlockTitle(id){
  if(S.titles.includes(id)) return;
  S.titles.push(id);
  if(S.raid) (S.raid.newTitles = S.raid.newTitles||[]).push(id);
}
// unlockAchievement() — тот же принцип, что unlockTitle(), но пишет в
// отдельный S.achievements (не выбираются для показа под именем). Всплывающий
// список на экране победы (titleUnlockHTML()) общий для обоих — id ачивки
// ищется сначала в TITLES_LIST, потом в ACHIEVEMENTS_LIST.
function unlockAchievement(id){
  if(S.achievements.includes(id)) return;
  S.achievements.push(id);
  if(S.raid) (S.raid.newTitles = S.raid.newTitles||[]).push(id);
}
// checkTitles(event, payload) — единая точка проверки, вызывается из трёх
// существующих моментов игры:
//   'enter' — начало захода во врата (startRaid()): просто отмечает мобов
//     этих врат как "встреченных" в бестиарии (видны в очереди боя).
//   'kill'  — смерть моба (registerPush()): бестиарий "повержен", "Первая
//     кровь", групповые титулы бестиария.
//   'win'   — победа во вратах (winRaid()): титулы за ранг/боссов/сводные,
//     "На волоске".
function checkTitles(event, payload){
  if(event==='enter'){
    payload.mobs.forEach(m=>{
      const entry = S.bestiary[m.kind] || (S.bestiary[m.kind] = {});
      entry.seen = true;
    });
  } else if(event==='kill'){
    const mob = payload.mob;
    const wasAnyKilled = Object.keys(S.bestiary).some(k=>S.bestiary[k].killed);
    const entry = S.bestiary[mob.kind] || (S.bestiary[mob.kind] = {});
    entry.seen = true; entry.killed = true;
    if(!wasAnyKilled) unlockTitle(TITLE_FIRST_BLOOD.id);
    Object.keys(BESTIARY_GROUPS).forEach(groupKey=>{
      const kinds = Object.keys(BESTIARY).filter(k=>BESTIARY[k].group===groupKey);
      if(kinds.every(k=>S.bestiary[k] && S.bestiary[k].killed)) unlockTitle(BESTIARY_GROUPS[groupKey].title.id);
    });
  } else if(event==='win'){
    const g = payload.gate;
    if(rankRegularAllDone(g.rank)){
      const t = RANK_CLEAR_TITLES[g.rank]; if(t) unlockTitle(t.id);
    }
    if(g.stage==='trial'){
      const t = TRIAL_BOSS_TITLES[g.rank]; if(t) unlockTitle(t.id);
      if(stageAllDone('trial')) unlockTitle(TITLE_ELITE.id);
    }
    if(g.stage==='exam'){
      const t = EXAM_BOSS_TITLES[g.rank]; if(t) unlockTitle(t.id);
      if(stageAllDone('exam')) unlockTitle(TITLE_BOSS_SLAYER.id);
    }
    if(S.raid && S.raid.hpMax>0 && S.raid.hp <= S.raid.hpMax*0.1) unlockTitle(TITLE_CLOSE_CALL.id);
  }
}
// Раньше эти условия проверялись по одной общей GATES — теперь врат вдвое
// больше (Сила + Выносливость, см. TRACKS), и по решению пользователя сводные
// звания ("Пробуждённый", "Элитный охотник", "Палач боссов") требуют закрытия
// соответствующих врат В ОБОИХ направлениях, а не в любом одном.
function countDoneAcrossTracks(filterFn){
  const s = GATES_STRENGTH.filter(filterFn), e = GATES_ENDURANCE.filter(filterFn);
  const done = s.filter(x=>S.doneGates.includes(x.id)).length + e.filter(x=>S.doneGatesEndurance.includes(x.id)).length;
  return { done, total: s.length + e.length };
}
function rankRegularAllDone(rank){
  const { done, total } = countDoneAcrossTracks(x=>x.rank===rank && x.stage==='regular');
  return total>0 && done===total;
}
function stageAllDone(stage){
  const { done, total } = countDoneAcrossTracks(x=>x.stage===stage);
  return total>0 && done===total;
}
// Прогресс для ещё не разблокированных титулов на экране "Титулы" — короткая
// строка вида "4/7", либо null, если у титула нет осмысленного дробного прогресса.
function titleProgressText(t){
  if(t.cat==='rank'){
    const { done, total } = countDoneAcrossTracks(x=>x.rank===t.rank && x.stage==='regular');
    return `${done}/${total}`;
  }
  if(t.cat==='combo'){
    const stage = t.id==='elite_hunter' ? 'trial' : 'exam';
    const { done, total } = countDoneAcrossTracks(x=>x.stage===stage);
    return `${done}/${total}`;
  }
  if(t.cat==='bestiary_group'){
    const groupKey = Object.keys(BESTIARY_GROUPS).find(k=>BESTIARY_GROUPS[k].title.id===t.id);
    const kinds = Object.keys(BESTIARY).filter(k=>BESTIARY[k].group===groupKey);
    const done = kinds.filter(k=>S.bestiary[k] && S.bestiary[k].killed).length;
    return `${done}/${kinds.length}`;
  }
  return null;
}

function mobVisual(kind, size=170, name){
  const img = (name && MOB_IMAGES[kind+'|'+name]) || MOB_IMAGES[kind];
  if(img){
    const r = size<50 ? 8 : 16;
    return `<img src="${img}" width="${size}" height="${size}" style="object-fit:cover;border-radius:${r}px;display:block" alt="">`;
  }
  return mobSVG(kind, size);
}

function gateSVG(color){
  const map = { violet:'#8B5CF6', gold:'#F5C242', red:'#FF3B5C' };
  const c = map[color] || map.violet;
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="30" cy="32" rx="16" ry="24" fill="${c}" opacity=".28"/>
    <ellipse cx="30" cy="32" rx="16" ry="24" fill="none" stroke="${c}" stroke-width="2.5"/>
    <ellipse cx="30" cy="32" rx="8" ry="14" fill="${c}" opacity=".5">
      <animate attributeName="opacity" values=".5;.9;.5" dur="2.4s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M30 4 L34 12 M30 4 L26 12" stroke="${c}" stroke-width="2"/>
  </svg>`;
}

/* ============ УТИЛИТЫ ============ */
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* Своя модалка подтверждения вместо window.confirm() — в некоторых мобильных
   webview нативный confirm() блокируется/игнорируется, и кнопка молча не срабатывает. */
/* Пока открыт диалог подтверждения (например "Отступить из врат?"), бой на
   заднем плане приостанавливается — иначе можно было бы неожиданно умереть,
   просто читая вопрос "точно ли ты хочешь отступить". */
let modalOpenCount = 0;
function sysConfirm(message, onConfirm){
  modalOpenCount++;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(2,3,10,.72);padding:24px';
  wrap.innerHTML = `<div class="syswin" style="max-width:340px;width:100%;background:var(--panel-solid)">
    <div class="sys-tag"><span class="bang">!</span> ПОДТВЕРЖДЕНИЕ</div>
    <div style="font-size:14px;line-height:1.5;margin-bottom:16px">${escapeHtml(message)}</div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" style="margin:0">Отмена</button>
      <button class="btn" style="margin:0;background:linear-gradient(180deg,var(--danger),#B0203A);box-shadow:0 6px 0 #7A1428, 0 0 26px rgba(255,59,92,.35)">Да</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const [cancelBtn, yesBtn] = wrap.querySelectorAll('button');
  const close = ()=>{ wrap.remove(); modalOpenCount = Math.max(0, modalOpenCount-1); };
  wrap.addEventListener('click', e=>{ if(e.target===wrap) close(); });
  cancelBtn.onclick = close;
  yesBtn.onclick = ()=>{ close(); onConfirm(); };
}

/* Короткий тост снизу экрана — например для тапа по заблокированным вратам. */
function showToast(msg){
  const old = document.getElementById('sysToast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.id = 'sysToast';
  t.style.cssText = "position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:60;max-width:86%;padding:12px 18px;border-radius:12px;background:var(--panel-solid);border:1px solid var(--line);color:var(--text);font-size:13.5px;font-weight:700;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:'Manrope',sans-serif;animation:fadeIn .2s ease";
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.remove(), 2200);
}

/* Кнопка "Далее" в квизе — отдельный persistent-узел ВНЕ #root (как sysConfirm/
   showToast выше), а не часть innerHTML, который перерисовывает rQuiz(). Так
   position:fixed всегда считается от вьюпорта: если бы кнопка была внутри
   .screen, который во время hAnimated()-перехода получает CSS transform,
   она на время анимации "перепривязывалась" бы к этому transform-предку
   вместо вьюпорта (так работает position:fixed по спецификации) и могла бы
   на мгновение съезжать. Здесь просто показываем/прячем и точечно обновляем
   disabled, без пересоздания. */
let quizBottomEl = null;
function ensureQuizBottomEl(){
  if(quizBottomEl) return quizBottomEl;
  quizBottomEl = document.createElement('div');
  quizBottomEl.className = 'quiz-bottom';
  quizBottomEl.style.display = 'none';
  quizBottomEl.innerHTML = `<button id="nextBtn" class="btn" onclick="nextStep()">Далее</button>`;
  document.body.appendChild(quizBottomEl);
  return quizBottomEl;
}
function quizStepFilled(){
  const q = QUIZ[S.step]; if(!q) return false;
  return q.type==='age' || q.type==='info' || q.type==='pose' || (q.type==='input' ? !!S.ans.name.trim() : S.ans[q.id]!=null);
}
function renderQuizBottom(){
  if(S.screen!=='quiz'){ if(quizBottomEl) quizBottomEl.style.display='none'; return; }
  const el = ensureQuizBottomEl();
  el.style.display='';
  const btn = document.getElementById('nextBtn');
  if(btn) btn.disabled = !quizStepFilled();
}

/* ============ РЕНДЕР ============ */
const root = document.getElementById('root');
function h(html){
  // Защита от «залипших» инлайн-стилей: если экран сменился, пока не отработал
  // 340-мс таймер очистки в hAnimated() (см. ниже), root мог остаться с
  // overflow:hidden/min-height от предыдущего слайд-перехода квиза — тогда новый
  // экран рисуется внутри этой обрезанной коробки и визуально "не влезает"/не
  // скроллится. Явный сброс перед каждой обычной отрисовкой убирает этот риск.
  root.style.cssText = '';
  root.innerHTML = html; root.className=''; const el=root.firstElementChild; if(el) el.classList.add('screen-fade');
}
function go(screen){
  // Камера/детектор нужны только на экранах боя и отдыха между мобами —
  // при уходе куда-либо ещё (отступление, победа, карта) сразу освобождаем стрим.
  if(screen!=='raid' && screen!=='rest') stopCamera();
  // Рейтинг — не клиентское состояние, а снимок с сервера: при каждом заходе
  // на экран запрашиваем заново (см. loadLeaderboard()), а не показываем то,
  // что могло устареть с прошлого визита.
  if(screen==='rank'){ S.rankData = null; S.rankError = false; S.rankLoading = true; }
  S.screen = screen; render(); saveState();
  if(screen==='rank') loadLeaderboard();
}

/* ---- слайд-переход между шагами квиза (вперёд/назад), как в нативных приложениях ---- */
function hAnimated(html, direction){
  const oldEl = root.firstElementChild;
  if(!oldEl){ h(html); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const newEl = tmp.firstElementChild;
  const oldH = oldEl.getBoundingClientRect().height;

  root.style.position = 'relative';
  root.style.minHeight = oldH+'px';
  root.style.overflow = 'hidden';

  oldEl.style.position='absolute'; oldEl.style.top='0'; oldEl.style.left='0'; oldEl.style.width='100%';
  newEl.style.position='absolute'; newEl.style.top='0'; newEl.style.left='0'; newEl.style.width='100%';
  newEl.style.transform = `translateX(${direction>0?100:-100}%)`;
  newEl.style.opacity='0';
  root.appendChild(newEl);

  const newH = newEl.getBoundingClientRect().height;
  root.style.minHeight = Math.max(oldH,newH)+'px';
  void newEl.offsetHeight; // форсируем reflow перед стартом transition

  const easing = 'cubic-bezier(.4,0,.2,1)';
  oldEl.style.transition = `transform .34s ${easing}, opacity .34s ${easing}`;
  newEl.style.transition = `transform .34s ${easing}, opacity .34s ${easing}`;

  requestAnimationFrame(()=>{
    oldEl.style.transform = `translateX(${direction>0?-28:28}%)`;
    oldEl.style.opacity='0';
    newEl.style.transform = 'translateX(0)';
    newEl.style.opacity='1';
  });

  setTimeout(()=>{
    oldEl.remove();
    root.style.position=''; root.style.minHeight=''; root.style.overflow='';
    newEl.style.position=''; newEl.style.top=''; newEl.style.left=''; newEl.style.width='';
    newEl.style.transform=''; newEl.style.transition=''; newEl.style.opacity='';
  }, 340);
}

function render(){
  const phoneEl = document.getElementById('phone');
  if(phoneEl) phoneEl.setAttribute('data-rank', S.rank); // фон-атмосфера сдвигается по рангу
  // Слайд-переход между шагами квиза сохраняет текущую позицию скролла (double-buffer
  // на месте) — принудительный scrollTo(0,0) в этом случае только даёт лишний рывок.
  const isSlideTransition = S.screen==='quiz' && !!S._navDir;
  ({
    splash: rSplash, quiz: rQuiz, reveal: rReveal, journey: rJourney,
    map: rMap, raid: rRaid, rest: rRest, victory: rVictory, profile: rProfile, settings: rSettings,
    death: rDeath, titles: rTitlesScreen, rank: rRank
  })[S.screen]();
  updateTgBackButton();
  updateSwipeLock();
  renderQuizBottom(); // на не-квиз экранах прячет persistent-кнопку "Далее" (см. выше)
  if(!isSlideTransition) window.scrollTo(0,0);
}

/* ---- 1. Сплэш ---- */
function rSplash(){
  h(`<div class="screen" style="align-items:center;justify-content:center;text-align:center;gap:22px">
    <div style="width:170px;height:170px">${gateSVG('violet')}</div>

    <div class="syswin" style="max-width:320px">
      <div class="sys-tag"><span class="bang">!</span> СИСТЕМА</div>
      <div style="font-size:15px;line-height:1.5">Обнаружен спящий потенциал.<br>Ты был выбран. Ответь на несколько вопросов, чтобы завершить <b class="cy">пробуждение</b>.</div>
    </div>

      <button class="btn" onclick="S.step=0;go('quiz')">Начать пробуждение</button>

}

/* ---- 2. Квиз ---- */
function rQuiz(){
  const q = QUIZ[S.step];
  const pct = Math.round(((S.step)/QUIZ.length)*100)+6;
  let body='';
  if(q.type==='input'){
    // onfocus/onblur — защита от редкого глюка Android-клиента Telegram, когда
    // клавиатура открывается и тут же захлопывается сама (см. updateSwipeLock()
    // выше — основная причина уже устранена, это просто подстраховка):
    // если поле теряет фокус быстрее чем за 400мс и всё ещё пустое, пробуем
    // вернуть фокус ещё раз.
    body = `<input class="field" id="nameField" placeholder="${q.ph}" value="${escapeHtml(S.ans.name)}" maxlength="14"
      autocomplete="off" autocorrect="off"
      onfocus="this.dataset.focusedAt=Date.now()"
      onblur="if(!this.value && Date.now()-(+this.dataset.focusedAt||0)<400){ const t=this; setTimeout(()=>{ if(document.body.contains(t)) t.focus(); },50); }"
      oninput="S.ans.name=this.value;document.getElementById('nextBtn').disabled=!this.value.trim()">`;
  }
  if(q.type==='opts'){
    body = `<div class="opts">`+q.opts.map((o,idx)=>`
      <button class="opt ${S.ans[q.id]===o.v?'sel':''}" data-pick-q="${q.id}" data-pick-i="${idx}">
        ${o.i?`<span class="ico">${o.i}</span>`:''}${o.t}${o.s?`<span class="side">${o.s}</span>`:''}
      </button>`).join('')+`</div>`;
  }
  if(q.type==='age'){
    body = `<div class="wheel-wrap"><div class="wheel-highlight"></div>${wheelColHTML('wheelAge', AGE_VALUES, AGE_VALUES.indexOf(S.ans.age))}</div>`;
  }
  if(q.type==='time'){
    body = timeWheelHTML(S.ans.time) +
      `<div class="syswin" style="margin-top:22px"><div class="sys-tag"><span class="bang">!</span> УВЕДОМЛЕНИЕ</div>
      <div style="font-size:14px" class="sub">В дни тренировок Система пришлёт призыв во врата. Пропуск призыва снижает дисциплину охотника.</div></div>`;
  }
  if(q.type==='info'){
    body = `<div class="syswin" style="margin-top:14px;text-align:center">
      <div style="font-size:40px;margin-bottom:10px">${q.icon||''}</div>
      <div style="font-size:15px;line-height:1.55">${q.text}</div>
    </div>`;
  }
  if(q.type==='pose'){
    body = poseIllustrationHTML();
  }
  const stepHtml = `<div class="screen quiz-body-pad">
    <div class="topbar">
      <button class="back" onclick="${S.step===0?"go('splash')":"S._navDir=-1;S.step--;render()"}">‹</button>
      <div class="progress"><i style="width:${pct}%"></i></div>
    </div>
    <h2>${q.h}</h2>
    ${q.sub?`<div class="sub">${q.sub}</div>`:''}
    ${body}
  </div>`;
  if(S._navDir){ hAnimated(stepHtml, S._navDir); S._navDir=0; } else { h(stepHtml); }
  renderQuizBottom();
  if(q.type==='age'){
    setupWheel('wheelAge', AGE_VALUES, AGE_VALUES.indexOf(S.ans.age), v=>{ S.ans.age=v; });
  }
  if(q.type==='time'){
    setupTimeWheels(S.ans.time, v=>{
      S.ans.time=v;
      const btn=document.getElementById('nextBtn'); if(btn) btn.disabled=false;
      syncReminder();
    });
  }
}
function pick(id,v){ S.ans[id]=v; }
root.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-pick-q]');
  if(!el) return;
  const qid = el.getAttribute('data-pick-q');
  const idx = Number(el.getAttribute('data-pick-i'));
  const q = QUIZ.find(x=>x.id===qid);
  if(!q || !q.opts || !q.opts[idx]) return;
  pick(qid, q.opts[idx].v);
  // точечно подсвечиваем выбранную карточку, без ре-рендера всего экрана
  root.querySelectorAll(`[data-pick-q="${qid}"]`).forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  const btn = document.getElementById('nextBtn');
  if(btn) btn.disabled = false;
});
function nextStep(){
  if(S.step < QUIZ.length-1){ S._navDir=1; S.step++; render(); }
  else { S.rank = 'E'; S.onboarded = true; go('reveal'); }
}

/* ---- 3.5 Объяснение пути ---- */
function miniPathHTML(count=6){
  const colorMap = { violet:'#8B5CF6', gold:'#F5C242', red:'#FF3B5C' };
  const gates = GATES_STRENGTH.slice(0, count);
  const n = gates.length;
  const pts = gates.map((g,i)=>({ x: (i/(n-1))*100, y: i%2===0 ? 28 : 74 }));
  let path='';
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    path += `M ${a.x} ${a.y} C ${(a.x+b.x)/2} ${a.y}, ${(a.x+b.x)/2} ${b.y}, ${b.x} ${b.y} `;
  }
  const nodes = gates.map((g,i)=>{
    const p=pts[i], c=colorMap[g.gateColor]||colorMap.violet;
    return `<div class="mini-gate" style="left:${p.x}%;top:${p.y}%">
      <div class="mini-gate-frame" style="border-color:${c};box-shadow:0 0 14px ${c}66, inset 0 0 10px ${c}44">${gateSVG(g.gateColor)}</div>
    </div>`;
  }).join('');
  return `<div class="mini-path">
    <svg class="mini-path-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="${path}" fill="none" stroke="#2A3560" stroke-width="3" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      <path d="${path}" fill="none" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    </svg>
    ${nodes}
  </div>
  <div class="sub" style="font-size:12px;margin-top:6px">${gates[0].name} → ${gates[gates.length-1].name}</div>`;
}
function rJourney(){
  // Раньше блок с путём стоял в flex:1/justify-content:center — на невысоких

    <div style="margin-top:16px">

    <div class="bottom"><button class="btn" onclick="go('map')">К карте врат</button></div>
  </div>`);

/* ---- 4. Карта врат ---- */
// track — 'strength' (👊, GATES_STRENGTH/S.doneGates) или 'endurance' (🦵,
// GATES_ENDURANCE/S.doneGatesEndurance), см. TRACKS/gatesForTrack()/doneGatesForTrack().
function isSeqLocked(g,i,track){
  if(g.locked) return true; // контент ещё не открыт (будущие миры)
  if(i===0) return false;
  const gates = gatesForTrack(track);
  return !doneGatesForTrack(track).includes(gates[i-1].id);
}
// Переключение направления — обе карты открыты и независимы с самого начала
// (см. решение пользователя), это просто смена того, какую из двух GATES_*
// показывает rMap() и с каким списком S.doneGates*/started считает прогресс.
function setTrack(track){
  if(!TRACKS[track] || S.currentTrack===track) return;
  S.currentTrack = track;
  saveState();
  render();
}
function trackIconsHTML(){
  return Object.values(TRACKS).map(t=>
    `<button class="icon-btn ${S.currentTrack===t.key?'on':''}" onclick="setTrack('${t.key}')" aria-label="${t.label}" title="${t.label}">${t.icon}</button>`
  ).join('');
}
function rMap(){
  const track = S.currentTrack;
  const GATES = gatesForTrack(track);
  const done = doneGatesForTrack(track);
  // 30/70 вместо 28/72 — с запасом, чтобы 104px-широкая карточка врат (gate-node)
  // не подрезалась по краям на узких экранах (320px, iPhone SE).
  const pos = GATES.map((g,i)=>({ x: i%2===0? 30 : 70, y: 70 + i*115 }));
  let path='';
  for(let i=0;i<pos.length-1;i++){
    const a=pos[i],b=pos[i+1];
    path += `M ${a.x} ${a.y} C ${a.x} ${a.y+60}, ${b.x} ${b.y-60}, ${b.x} ${b.y} `;
  }
  const nodes = GATES.map((g,i)=>{
    const p=pos[i];
    const gDone = done.includes(g.id);
    const seqLocked = !g.locked && isSeqLocked(g,i,track);
    const mystery = g.locked; // будущий контент (S-ранг, бесконечные врата)
    const locked = mystery || seqLocked;
    const cls = `gate-node ${locked?'locked':''} ${g.gateColor==='gold'?'gold':''} ${g.gateColor==='red'?'red':''} ${gDone?'done':''}`;
    // Заблокированные врата тоже кликабельны — но вместо боя показывают тултип,
    // почему нельзя войти, а не молчат.
    const click = locked
      ? `onclick="showToast('${mystery ? 'Эти врата откроются позже' : 'Сначала закрой предыдущие врата'}')"`
      : `onclick="startRaid('${track}',${g.id})"`;
    let frame, rankLabel;
    if(mystery){
      frame = '<span style="font-family:Russo One;font-size:30px;color:#3A4570">?</span>';
      rankLabel = '· · ·';
    } else if(seqLocked){
      frame = gateSVG(g.gateColor) + '<span class="lockbadge">🔒</span>';
      rankLabel = '🔒 закрыто';
    } else {
      frame = gateSVG(g.gateColor);
      rankLabel = g.stage==='exam' ? 'ЭКЗАМЕН · РАНГ '+g.rank : g.stage==='trial' ? 'ИСПЫТАНИЕ · РАНГ '+g.rank : 'ВРАТА '+g.rank;
    }
    return `<div class="${cls}" data-gate-id="${g.id}" style="left:${p.x}%;top:${p.y-43}px" ${click}>
      <div class="gate-frame" style="position:relative">${frame}</div>
      <div class="gate-name">${gDone?'✓ ':''}${g.name}</div>
      <div class="gate-rank">${rankLabel}</div>
    </div>`;
  }).join('');
  h(`<div class="screen">
    <div class="map-fixed-top">
      <div class="hdr">
        <div class="pill">РАНГ <b>${S.rank}</b></div>
        <div class="pill">🔥 <b>${S.streak}</b> дн.</div>
        <div class="pill">УР. <b>${S.level}</b></div>
      </div>
      <div class="icon-row">
        ${trackIconsHTML()}
        <button class="icon-btn" onclick="go('profile')" aria-label="Профиль">👤</button>
        <button class="icon-btn" onclick="S.prevScreen=S.screen;go('settings')" aria-label="Настройки">⚙️</button>
      </div>
      <div class="track-tag">${TRACKS[track].icon} ${TRACKS[track].label}</div>
    </div>
    <div class="map-top-spacer" id="mapTopSpacer"></div>
    <div class="map-wrap"><div class="map-inner" style="min-height:${70+GATES.length*115}px">
      <svg class="map-svg" viewBox="0 0 100 ${70+GATES.length*115}" preserveAspectRatio="none">
        <path d="${path}" fill="none" stroke="#2A3560" stroke-width="7" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
        <path d="${path}" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-dasharray="1 10" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      </svg>
      ${nodes}
    </div></div>
    ${navBar('map')}
  </div>`);
  // Высота верхней панели (map-fixed-top) не константа — зависит от того,
  // сколько строк займут пилюли/иконки на узком экране, поэтому не хардкодим
  // пиксели, а меряем по факту отрисовки и подгоняем спейсер под неё.
  requestAnimationFrame(()=>{
    const topEl = document.querySelector('.map-fixed-top');
    const spacer = document.getElementById('mapTopSpacer');
    if(topEl && spacer) spacer.style.height = topEl.getBoundingClientRect().height + 'px';
  });
  // Автопрокрутка к первым незакрытым вратам — на 44 вратах скроллить руками
  // с самого верха каждый раз неудобно.
  requestAnimationFrame(()=>{
    const current = GATES.find((g,i)=> !done.includes(g.id) && !(g.locked || isSeqLocked(g,i,track)) ) || GATES[GATES.length-1];
    const el = document.querySelector(`.gate-node[data-gate-id="${current.id}"]`);
    if(el){
      try{ el.scrollIntoView({block:'center', behavior:'auto'}); }
      catch(e){ el.scrollIntoView(); }
    }
  });
}
function navBar(on){
  return `<div class="nav-spacer"></div><div class="nav">
    <button class="${on==='map'?'on':''}" onclick="go('map')">⛩ Врата</button>
    <button class="${on==='rank'?'on':''}" onclick="go('rank')">🏆 Рейтинг</button>
    <button class="${on==='profile'?'on':''}" onclick="go('profile')">👤 Охотник</button>
  </div>`;
}

/* ============ КАМЕРА: СЧЁТЧИК ОТЖИМАНИЙ ПО ПОЗЕ ============ */
/* Подсчёт идёт по углу в локте (плечо–локоть–запястье): разогнутая рука (~150°+) —
   верхняя точка, согнутая (<95°) — нижняя. Полный цикл вниз→вверх = один повтор.
   Угол не зависит от расстояния до камеры и ракурса — надёжнее, чем просто
   отслеживать координату Y корпуса. */
const POSE_LIBS = {
  tf: 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
  pd: 'https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js',
};
const Cam = {
  stream:null, detector:null, videoEl:null, canvasEl:null,
  running:false, initializing:false, error:null,
  armState:'up', emaAngle:null, lastRepAt:0, rafId:null, downStreak:0, upStreak:0,
  // Какое упражнение отслеживалось в предыдущем кадре — при смене (новый моб
  // волны или у босса началась вторая фаза, см. mobExercise()) обнуляем стрики
  // и сглаженный угол ниже по коду, иначе чужое состояние путает первый повтор.
  curExercise:null,
  // Второй, независимый от угла в локте сигнал повторения — см. getDepthSignal().
  // Угол в локте не срабатывает, если руки прижаты к туловищу (locti tucked):
  // с фронтальной камеры на полу локоть в этом положении либо перекрыт корпусом,
  // либо ракурс "сплющивает" его 2D-проекцию так, что вычисленный угол не
  // достигает порога согнутой руки, даже когда человек реально внизу.
  depthBaseline:null, depthDisplaced:false,
  // Сглаженные (EMA) координаты точек скелета для отрисовки — отдельно от
  // сырых keypoints. См. комментарий у drawSkeleton().
  smoothPts:{},
};
function loadScriptOnce(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = ()=>resolve(); s.onerror = ()=>reject(new Error('Не удалось загрузить '+src));
    document.head.appendChild(s);
  });
}
async function ensurePoseLibsLoaded(){
  if(!(window.tf)) await loadScriptOnce(POSE_LIBS.tf);
  if(!(window.poseDetection)) await loadScriptOnce(POSE_LIBS.pd);
}
function setCamStatus(msg){
  const el = document.getElementById('camStatus');
  if(el) el.textContent = msg;
}
function showCamError(msg){
  Cam.error = msg;
  const wrap = document.getElementById('camWrap');
  if(!wrap) return;
  // На отдыхе ручной кнопки быть не должно — она бы сразу списывала HP
  // следующему мобу ещё до начала боя с ним. Там просто прячем камеру.
  if(S.screen==='rest'){ wrap.remove(); return; }
  wrap.innerHTML = `<div class="cam-fallback">⚠️ ${escapeHtml(msg)}<div class="sub" style="margin-top:6px;font-size:12px">Используй кнопку «+» внизу — так повторение засчитывается вручную.</div></div>`;
  // Кнопка "+" теперь всегда на экране боя (не только при сбое камеры, см.
  // .raid-side-btn.manual в rRaid()), так что здесь её видимость больше не
  // нужно чинить отдельным патчем DOM — только сам фолбэк камеры.
}
function attachCamRefs(){
  const v = document.getElementById('raidVideo');
  if(v){ Cam.videoEl = v; if(Cam.stream){ v.srcObject = Cam.stream; v.play().catch(()=>{}); } }
  const c = document.getElementById('raidCanvas');
  if(c) Cam.canvasEl = c;
}
async function startCamera(){
  if(Cam.running || Cam.stream || Cam.initializing) { attachCamRefs(); return; }
  Cam.initializing = true;
  try{
    setCamStatus('Загружаю модуль распознавания…');
    await ensurePoseLibsLoaded();
    setCamStatus('Запрашиваю доступ к камере…');
    // ВАЖНО, второй заход: даже когда мы просим камеру всего лишь про
    // "ideal"-пропорцию (не жёсткую), на iOS/WebKit (а Telegram открывает
    // страницу именно в системном WKWebView) фронтальная камера всё равно
    // цифрово обрезает сенсор, чтобы её удовлетворить — своей "родной" 9:16
    // у TrueDepth-камеры нет. Именно это по-прежнему читалось как сильный
    // зум даже после перехода с "пропорция экрана" на фиксированные 9:16.
    // Правильное решение — вообще не диктовать камере пропорцию/точное
    // разрешение. Берём её нативный, необрезанный поток (как в родном
    // приложении "Камера"), а рамку под экран телефона делаем полностью на
    // CSS через object-fit:cover (см. .raid-fullbleed .cam-wrap video) —
    // это просто увеличивает/подрезает уже готовую картинку по краям
    // единым множителем, без дополнительного цифрового зума от самой камеры.
    // width/height здесь — не желаемая пропорция, а верхний потолок
    // разрешения (для производительности MoveNet на слабых устройствах),
    // он никак не заставляет камеру резать кадр под конкретную форму.
    Cam.stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:{max:1280}, height:{max:1280} }, audio:false });
    attachCamRefs();
    setCamStatus('Калибрую детектор позы…');
    await tf.ready();
    Cam.detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
    Cam.running = true;
    Cam.error = null;
    setCamStatus(currentExercise()==='squat' ? 'Готово — начинай приседать!' : 'Готово — начинай отжиматься!');
    camLoop();
  }catch(err){
    console.error('камера/поза: инициализация не удалась', err);
    // Внутри Telegram (особенно Android WebView старых версий приложения)
    // getUserMedia иногда недоступен вообще — это ограничение клиента, а не
    // баг страницы, поэтому добавляем отдельную подсказку вместо стандартной.
    const msg = (err && err.name==='NotAllowedError')
      ? 'Доступ к камере запрещён.' + (inTelegram ? ' Проверь разрешение камеры для Telegram в настройках телефона.' : ' Проверь разрешение в браузере.')
      : (err && err.name==='NotFoundError')
        ? 'Не найдена камера на устройстве.'
        : inTelegram
          ? 'Эта версия Telegram не даёт доступ к камере внутри мини-приложения. Обнови Telegram до последней версии — если не поможет, считай подходы вручную.'
          : 'Не удалось запустить камеру или распознавание позы (нужен интернет и разрешённый доступ к камере).';
    showCamError(msg);
  }finally{
    Cam.initializing = false;
  }
}
function stopCamera(){
  if(Cam.rafId) cancelAnimationFrame(Cam.rafId);
  Cam.rafId = null;
  if(Cam.stream){ try{ Cam.stream.getTracks().forEach(t=>t.stop()); }catch(e){} }
  Cam.stream = null; Cam.detector = null; Cam.videoEl = null; Cam.canvasEl = null;
  Cam.running = false; Cam.initializing = false; Cam.error = null;
  Cam.armState = 'up'; Cam.emaAngle = null; Cam._lastPoseAt = null; Cam.downStreak = 0; Cam.upStreak = 0;
  Cam.depthBaseline = null; Cam.depthDisplaced = false;
  Cam.smoothPts = {};
}
function angleAt(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const m1=Math.hypot(v1.x,v1.y), m2=Math.hypot(v2.x,v2.y);
  if(!m1||!m2) return null;
  let cos=(v1.x*v2.x+v1.y*v2.y)/(m1*m2);
  cos=Math.max(-1,Math.min(1,cos));
  return Math.acos(cos)*180/Math.PI;
}
function getElbowAngle(keypoints){
  const pts={}; keypoints.forEach(k=>pts[k.name]=k);
  function armAngle(side){
    const s=pts[side+'_shoulder'], e=pts[side+'_elbow'], w=pts[side+'_wrist'];
    if(!s||!e||!w||s.score<0.3||e.score<0.3||w.score<0.3) return null;
    return angleAt(s,e,w);
  }
  const L=armAngle('left'), R=armAngle('right');
  if(L!=null && R!=null) return (L+R)/2;
  return L!=null ? L : R;
}
// Угол в колене (бедро→колено→лодыжка) — тот же приём, что и для локтя выше,
// просто другая тройка суставов. Используется, когда текущий моб требует
// приседаний вместо отжиманий (см. mobExercise()/currentExercise()).
function getKneeAngle(keypoints){
  const pts={}; keypoints.forEach(k=>pts[k.name]=k);
  function legAngle(side){
    const h=pts[side+'_hip'], k=pts[side+'_knee'], a=pts[side+'_ankle'];
    if(!h||!k||!a||h.score<0.3||k.score<0.3||a.score<0.3) return null;
    return angleAt(h,k,a);
  }
  const L=legAngle('left'), R=legAngle('right');
  if(L!=null && R!=null) return (L+R)/2;
  return L!=null ? L : R;
}
/* Второй сигнал для счётчика повторений — насколько нос "нырнул" относительно
   линии плеч, в единицах ширины плеч (эта нормировка убирает зависимость от
   расстояния до камеры/масштаба видео). Работает независимо от локтей — нос
   и плечи почти всегда видны камере, даже когда локти прижаты к телу и угол
   в них не читается. Направление (растёт величина вниз или вверх) заранее не
   фиксируем — оно зависит от того, как именно стоит телефон, поэтому в
   camLoop() отслеживается ЛЮБОЕ достаточно большое отклонение от "домашней"
   позы и возврат обратно, без предположений о знаке. */
function getDepthSignal(keypoints){
  const pts={}; keypoints.forEach(k=>pts[k.name]=k);
  const ls=pts.left_shoulder, rs=pts.right_shoulder, nose=pts.nose;
  if(!ls||!rs||!nose||ls.score<0.3||rs.score<0.3||nose.score<0.3) return null;
  const shoulderWidth = Math.hypot(ls.x-rs.x, ls.y-rs.y);
  if(shoulderWidth < 1) return null;
  const shoulderMidY = (ls.y+rs.y)/2;
  return (nose.y - shoulderMidY) / shoulderWidth;
}
// Цвет скелета отражает реальное состояние счётчика повторов, а не статичен:
// голубой — ждём (рука вверху), янтарный — спуск пошёл, но ещё не подтверждён
// (не хватило подряд идущих кадров), золотой — зафиксировано "внизу", зелёная
// вспышка — только что реально засчитан удар (первые ~250мс после него).
function skeletonColor(){
  if(Cam.lastRepAt && performance.now()-Cam.lastRepAt < 250) return '#34D399';
  if(Cam.armState==='down') return '#F5C242';
  if((Cam.downStreak||0) > 0) return '#FFB454';
  return '#4CC9FF';
}
// Модель позы отдаёт координаты покадрово и без всякой временной связи между
// кадрами — на спуске отжимания (быстрее движение, локоть чаще частично
// закрыт корпусом/рукавом) её оценка сустава иногда на один кадр "прыгает"
// в сторону от реального положения. Раньше мы рисовали эти сырые координаты
// как есть — отсюда ощущение, что скелет "слетает". Лечим сглаживанием (EMA
// по x/y, отдельно от Cam.emaAngle, который сглаживает только угол для
// подсчёта повторов) и чуть более строгим порогом уверенности: если модель
// сама не уверена в кадре — точка на миг пропадает, а не рисуется не там.
const SKELETON_DRAW_SCORE_MIN = 0.4;
const SKELETON_SMOOTH_ALPHA = 0.35;
// Какие суставы рисовать и какими "костями" их соединять — зависит от того,
// какое упражнение сейчас реально измеряется (см. currentExercise()). Рисуем
// именно то, что участвует в подсчёте угла, а не абстрактный скелет целиком —
// лишние линии на маленьком превью только мешают читать позу с одного взгляда.
const SKELETON_JOINTS = {
  pushup: ['left_shoulder','right_shoulder','left_elbow','right_elbow','left_wrist','right_wrist'],
  squat:  ['left_shoulder','right_shoulder','left_hip','right_hip','left_knee','right_knee','left_ankle','right_ankle'],
};
const SKELETON_BONES = {
  pushup: [
    ['left_shoulder','right_shoulder'],
    ['left_shoulder','left_elbow'], ['left_elbow','left_wrist'],
    ['right_shoulder','right_elbow'], ['right_elbow','right_wrist'],
  ],
  squat: [
    ['left_shoulder','right_shoulder'],
    ['left_shoulder','left_hip'], ['right_shoulder','right_hip'], ['left_hip','right_hip'],
    ['left_hip','left_knee'], ['left_knee','left_ankle'],
    ['right_hip','right_knee'], ['right_knee','right_ankle'],
  ],
};
function drawSkeleton(keypoints, exercise){
  const canvas=Cam.canvasEl, video=Cam.videoEl;
  if(!canvas || !video || !video.videoWidth) return;
  if(canvas.width!==canvas.clientWidth) canvas.width=canvas.clientWidth;
  if(canvas.height!==canvas.clientHeight) canvas.height=canvas.clientHeight;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Видео на экране боя показывается через object-fit:cover (см.
  // .raid-fullbleed .cam-wrap video выше) — заполняет весь контейнер одним
  // общим коэффициентом, обрезая лишнее по одной из осей. Считаем тот же
  // коэффициент, что и браузер использует для cover (Math.max — большая из
  // двух осей, в отличие от contain, где было бы Math.min), чтобы скелет
  // совпадал с реально видимой (обрезанной по краям) частью картинки.
  const coverScale = Math.max(canvas.width/video.videoWidth, canvas.height/video.videoHeight);
  const offX = (canvas.width - video.videoWidth*coverScale)/2;
  const offY = (canvas.height - video.videoHeight*coverScale)/2;
  const pts={}; keypoints.forEach(k=>pts[k.name]=k);
  const mx=x=>canvas.width-(x*coverScale+offX); // зеркалим X — видео отражено через CSS transform
  const my=y=>y*coverScale+offY;
  const JOINTS = SKELETON_JOINTS[exercise] || SKELETON_JOINTS.pushup;
  const smoothed = {};
  JOINTS.forEach(name=>{
    const raw = pts[name];
    if(raw && raw.score >= SKELETON_DRAW_SCORE_MIN){
      const prev = Cam.smoothPts[name];
      if(prev){
        prev.x += (raw.x-prev.x)*SKELETON_SMOOTH_ALPHA;
        prev.y += (raw.y-prev.y)*SKELETON_SMOOTH_ALPHA;
      } else {
        Cam.smoothPts[name] = {x:raw.x, y:raw.y};
      }
      smoothed[name] = Cam.smoothPts[name];
    } else {
      // Кадр с низкой уверенностью — не тащим точку рывком на новое (возможно
      // неверное) место и не показываем её вовсе, пока уверенность не вернётся.
      Cam.smoothPts[name] = null;
      smoothed[name] = null;
    }
  });
  const color = skeletonColor();
  ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
  const BONES = SKELETON_BONES[exercise] || SKELETON_BONES.pushup;
  BONES.forEach(([a,b])=>{
    const A=smoothed[a], B=smoothed[b];
    if(A && B){
      ctx.beginPath(); ctx.moveTo(mx(A.x),my(A.y)); ctx.lineTo(mx(B.x),my(B.y)); ctx.stroke();
    }
  });
  ctx.fillStyle=color;
  JOINTS.forEach(name=>{
    const p=smoothed[name];
    if(p){ ctx.beginPath(); ctx.arc(mx(p.x),my(p.y),5,0,Math.PI*2); ctx.fill(); }
  });
}
// Пороги угла локтя + требование нескольких подряд идущих кадров в "мёртвой
// зоне" между ними — иначе одиночный шумный кадр от детектора позы (позу
// слегка тряхнуло) мог мгновенно перекинуть armState туда-обратно и либо
// засчитать удар без реального повторения, либо наоборот пропустить его.
// Свои пороги на каждое упражнение — геометрия колена другая, чем у локтя:
// даже неглубокий присед даёт заметно меньший угол в колене, чем "верхняя"
// стойка на прямых ногах, и абсолютные значения не переносятся 1:1.
const REP_THRESH = {
  pushup: { down:95,  up:155 }, // угол локтя: согнут ("внизу") / прямой ("вверху")
  squat:  { down:125, up:160 }, // угол колена: присед ("внизу") / стоя ("вверху")
};
const REP_CONFIRM_FRAMES = 3;
// Пороги для второго сигнала (getDepthSignal) — отклонение носа от линии плеч,
// в единицах ширины плеч. Не завязаны на конкретное направление (см. комментарий
// у getDepthSignal) — считаем только величину смещения от "домашней" позы.
const DEPTH_TRIGGER = 0.55; // насколько нужно сместиться, чтобы засчитать "опускание"
const DEPTH_RETURN  = 0.22; // насколько нужно вернуться к базовой позе, чтобы перевзвести
function camLoop(){
  Cam.rafId = requestAnimationFrame(camLoop);
  if(S.screen!=='raid' || !Cam.running || !Cam.detector || !Cam.videoEl) return;
  if(Cam.videoEl.readyState < 2 || Cam._busy) return;
  Cam._busy = true;
  Cam.detector.estimatePoses(Cam.videoEl).then(poses=>{
    Cam._busy = false;
    const pose = poses && poses[0];
    // Какое упражнение нужно текущему мобу прямо сейчас (у босса зависит от
    // его HP — см. mobExercise()). При смене упражнения (новый моб волны или
    // у босса пошла вторая фаза) чистим состояние счётчика — иначе стрики от
    // предыдущего упражнения путают первый повтор нового.
    const ex = currentExercise();
    if(ex !== Cam.curExercise){
      Cam.curExercise = ex;
      Cam.armState = 'up'; Cam.downStreak = 0; Cam.upStreak = 0; Cam.emaAngle = null;
      Cam.depthBaseline = null; Cam.depthDisplaced = false;
    }
    if(!pose){
      if(S.raid && !S.raid.started) updateCalibration(null, null);
      else maybeShowNoPoseHint();
      return;
    }
    const angle = ex==='squat' ? getKneeAngle(pose.keypoints) : getElbowAngle(pose.keypoints);
    // Второй сигнал (наклон носа к линии плеч) откалиброван под движение
    // отжимания — для приседа не подходит (корпус едет вниз совсем в другом
    // масштабе), поэтому для приседаний используем только угол в колене.
    const depth = ex==='squat' ? null : getDepthSignal(pose.keypoints);
    if(S.raid && !S.raid.started){ updateCalibration(angle, depth); try{ drawSkeleton(pose.keypoints, ex); }catch(e){} return; }
    let tracked = false;
    const th = REP_THRESH[ex];

    if(angle!=null){
      tracked = true;
      Cam.emaAngle = Cam.emaAngle==null ? angle : Cam.emaAngle*0.6 + angle*0.4;
      // Стрики подряд идущих кадров по каждую сторону от порогов. В "мёртвой
      // зоне" между th.down и th.up оба стрика сбрасываются — переход
      // засчитывается только когда угол уверенно и стабильно прошёл всю
      // дистанцию, а не просто на миг качнулся туда и обратно.
      if(Cam.emaAngle < th.down){ Cam.downStreak=(Cam.downStreak||0)+1; Cam.upStreak=0; }
      else if(Cam.emaAngle > th.up){ Cam.upStreak=(Cam.upStreak||0)+1; Cam.downStreak=0; }
      else { Cam.downStreak=0; Cam.upStreak=0; }

      // Урон наносится в момент ОПУСКАНИЯ (переход вверх→вниз) — как просил
      // пользователь, а не когда рука снова выпрямляется наверх. Подъём наверх
      // только перевзводит счётчик для следующего повторения, без урона.
      if(Cam.armState!=='down' && Cam.downStreak>=REP_CONFIRM_FRAMES){
        Cam.armState='down';
        const now=performance.now();
        if(now - Cam.lastRepAt > 450){
          Cam.lastRepAt = now; setCamStatus('Повтор засчитан ✔ · вниз'); registerPush();
        }
      } else if(Cam.armState==='down' && Cam.upStreak>=REP_CONFIRM_FRAMES){
        Cam.armState='up'; setCamStatus('Вверху — опускайся вниз ↓ · '+Math.round(Cam.emaAngle)+'°');
      } else if(Cam.armState!=='down'){
        // Постоянная обратная связь по углу, пока стоим в состоянии "вверху" —
        // видно, отслеживает ли вообще Система позу, а не тишина до срабатывания.
        setCamStatus('Вверху · '+Math.round(Cam.emaAngle)+'° — опускайся вниз ↓');
      }
    }

    // Второй, независимый детектор по наклону головы к плечам — ловит повторения
    // с прижатыми к туловищу локтями, которые угол в локте может не замечать
    // (либо локоть перекрыт корпусом от камеры, либо ракурс "сплющивает" угол).
    // Работает всегда, не только когда angle==null — оба детектора делят один
    // и тот же debounce (Cam.lastRepAt), так что при обычной технике (оба сигнала
    // видят одно и то же повторение) урон всё равно наносится только один раз.
    if(depth!=null){
      tracked = true;
      if(Cam.depthBaseline==null) Cam.depthBaseline = depth;
      const dev = depth - Cam.depthBaseline;
      if(!Cam.depthDisplaced){
        // Пока в "домашней" позе — медленно подстраиваем базовую линию под неё
        // (человек мог чуть сменить дистанцию до телефона между подходами).
        Cam.depthBaseline += (depth - Cam.depthBaseline) * 0.06;
        if(Math.abs(dev) > DEPTH_TRIGGER){
          Cam.depthDisplaced = true;
          const now = performance.now();
          if(now - Cam.lastRepAt > 450){
            Cam.lastRepAt = now; setCamStatus('Повтор засчитан ✔ · вниз'); registerPush();
          }
        }
      } else if(Math.abs(dev) < DEPTH_RETURN){
        Cam.depthDisplaced = false;
      }
    }

    if(tracked) Cam._lastPoseAt = performance.now();
    else maybeShowNoPoseHint();
    try{ drawSkeleton(pose.keypoints, ex); }catch(e){}
  }).catch(err=>{ Cam._busy=false; });
}
/* Если 3+ секунды подряд не удаётся распознать плечи/локти (человек вне кадра,
   слишком крупный план лица, плохой свет) — подсказываем, а не молчим, оставляя
   пользователя гадать, почему HP моба не падает. */
function maybeShowNoPoseHint(){
  const now = performance.now();
  if(!Cam._lastPoseAt) Cam._lastPoseAt = now;
  if(now - Cam._lastPoseAt > 3000){
    setCamStatus('Не вижу плечи и локти — отодвинь телефон, чтобы верх тела был в кадре');
  }
}
function updateRaidDOM(){
  const r=S.raid; if(!r) return;
  const m=r.mobs[r.idx]; if(!m) return;
  const pct = Math.max(0, m.hp/m.maxHp*100);
  const fill=document.getElementById('hpFill'); if(fill) fill.style.width=pct+'%';
  const num=document.getElementById('hpNum'); if(num) num.textContent=`HP ${m.hp} / ${m.maxHp}`;
  const art=document.getElementById('mobArt');
  if(art){ art.classList.remove('hit'); void art.offsetWidth; art.classList.add('hit'); }
}
function manualPush(){ registerPush(); }
/* Счётчик отжиманий за текущий заход во врата (сумма по всем мобам, включая
   уже убитых) — золотой бейдж снизу слева поверх камеры, живёт и на рейде,
   и на отдыхе (камера/бейдж не пересоздаются между ними, см. rRest()). */
function repCounterHTML(){ return `<div class="rep-counter" id="repCounter">${(S.raid&&S.raid.reps)||0}</div>`; }
function updateRepCounterDOM(){
  const el = document.getElementById('repCounter');
  if(!el) return;
  el.textContent = (S.raid&&S.raid.reps)||0;
  // Пульс на каждый засчитанный повтор — снять/reflow/добавить, тот же приём,
  // что и у .mob-art.hit, иначе повторное добавление того же класса подряд
  // не ре-триггерит CSS-анимацию у браузера.
  el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');
}
/* Плашка "враг повержен" поверх камеры сразу после убийства моба — держится,
   пока не сработает переход на экран отдыха/победы (тот полностью
   перерисовывает root и уносит плашку вместе со старым cam-wrap). */
function showKillBanner(){
  const wrap = document.getElementById('camWrap');
  if(!wrap) return;
  const el = document.createElement('div');
  el.className = 'kill-banner';
  el.innerHTML = `<div class="kill-skull">💀</div><div class="kill-text">ВРАГ<br>ПОВЕРЖЕН</div>`;
  wrap.appendChild(el);
}

/* ============ HP ИГРОКА ============ */
/* Формула подобрана так, чтобы обычные врата почти не ощущались по урону, а
   красные (экзамен) врата каждого ранга несли реальный риск смерти уже при
   среднем темпе отжиманий — это была явная договорённость с пользователем
   ("средняя" сложность). Числа эмпирические (без живого теста на реальном
   устройстве) и вынесены в константы специально, чтобы их было легко
   перекрутить по фидбэку, не трогая остальную логику. */
function hpMaxFor(level){
  return 120 + 16*Math.max(0, level-1);
}
// Урон моба в секунду растёт с его maxHp (это и есть "наша шкала силы" — тот
// же параметр, что определяет, сколько отжиманий нужно, чтобы его убить).
// Оба слагаемых (fight-длительность и dps) растут вместе с maxHp, поэтому
// суммарный входящий урон за бой растёт быстрее линейного — то есть именно
// боссы/экзамены на порядок опаснее рядовых врат, а не пропорционально.
function mobDps(m){ return Math.max(1, Math.round(1.4 + 0.15*m.maxHp)); }
// Реген на отдыхе всегда МЕДЛЕННЕЕ, чем урон следующего моба — иначе отдых
// просто обнулял бы весь риск. Берём dps того моба, что ждёт следующим (он
// уже известен на экране отдыха), и лечим долей от этого числа — так шкала
// реген/урон остаётся согласованной на любом ранге, не только в текущей
// балансировке. Множитель <1, т.е. реген строго медленнее урона по построению.
const REGEN_RATE_FACTOR = 0.4;
function updatePlayerHpDOM(){
  const r=S.raid; if(!r) return;
  const pct = Math.max(0, r.hp/r.hpMax*100);
  const fill=document.getElementById('playerHpFill'); if(fill) fill.style.width=pct+'%';
  const num=document.getElementById('playerHpNum'); if(num) num.textContent=`Твоё HP ${r.hp} / ${r.hpMax}`;
}
/* Единый тикер боя — раз в секунду. На экране рейда наносит урон игроку от
   текущего моба; на экране отдыха между мобами вместо этого лечит, но
   медленнее, чем следующий моб будет отнимать HP (REGEN_RATE_FACTOR<1) —
   HP не восстанавливается само по себе полностью между подходами, и урон
   от тяжёлого моба ощутимо переносится дальше по забегу. На любом другом
   экране просто ничего не делает — таймер живёт, пока жив S.raid. */
function startCombatTick(){
  stopCombatTick();
  S._combatTick = setInterval(combatTick, 1000);
}
function stopCombatTick(){
  if(S._combatTick) clearInterval(S._combatTick);
  S._combatTick = null;
}
function combatTick(){
  const r = S.raid;
  if(!r){ stopCombatTick(); return; }
  if(S.screen==='raid'){
    if(modalOpenCount>0) return; // открыт диалог подтверждения — бой на паузе
    const m = r.mobs[r.idx];
    if(m && m.hp>0){
      r.hp = Math.max(0, r.hp - mobDps(m));
      updatePlayerHpDOM();
      if(r.hp<=0) playerDied();
    }
  } else if(S.screen==='rest'){
    if(r.hp < r.hpMax){
      const next = r.mobs[r.idx];
      const heal = next ? Math.max(1, Math.round(mobDps(next)*REGEN_RATE_FACTOR)) : 1;
      r.hp = Math.min(r.hpMax, r.hp + heal);
      updatePlayerHpDOM();
    }
  }
}
function playerDied(){
  stopCombatTick();
  stopRaidCountdown();
  const r = S.raid;
  // Смерть откатывает опыт и уровень захода — как и при ручном отступлении.
  // Отжимания/приседания, сделанные до этого момента, остаются в статистике
  // (см. комментарий у snapshot в startRaid()) — они реальные и честные
  // независимо от исхода боя, откатывать их незачем.
  if(r && r.snapshot){
    S.xp = r.snapshot.xp; S.level = r.snapshot.level;
  }
  S.everDied = true; // см. проверку в startRaid() — ачивка "Восставший из пепла" даётся не за саму смерть, а за возвращение
  S.raid = null;
  go('death');
}
function rDeath(){
  h(`<div class="screen" style="align-items:center;justify-content:center;text-align:center;gap:18px">
    <div style="font-size:60px">💀</div>
    <h2 style="color:var(--danger)">Ты пал в бою</h2>
    <div class="syswin" style="border-color:var(--danger);box-shadow:0 0 30px rgba(255,59,92,.2)">
      <div class="sys-tag" style="color:var(--danger)"><span class="bang" style="border-color:var(--danger)">!</span> СИСТЕМА</div>
      <div style="font-size:14px;line-height:1.5">Монстр оказался сильнее. Опыт этого захода потерян, но отжимания и приседания уже засчитаны — восстанови силы и возвращайся во врата.</div>
    </div>
    <div class="bottom" style="width:100%"><button class="btn" onclick="go('map')">Вернуться к вратам</button></div>
  </div>`);
}

/* ---- 5. Рейд ---- */
function startRaid(track, id){
  const GATES = gatesForTrack(track);
  const g = GATES.find(x=>x.id===id);
  const mobs = g.mobs.map((m,i)=>({ ...m, n:i+1, hp:m.maxHp }));
  // Повторное прохождение уже закрытых врат не даёт наград — иначе можно фармить
  // опыт бесконечно, просто переигрывая пройденный контент.
  const replay = doneGatesForTrack(track).includes(g.id);
  const hpMax = hpMaxFor(S.level);
  S.raid = { gate:g, track, mobs, idx:0, replay, hp:hpMax, hpMax,
    // Счётчик отжиманий за весь текущий заход (все мобы суммарно) — бейдж
    // снизу слева на камере, см. repCounterHTML()/updateRepCounterDOM().
    reps: 0,
    // id титулов, разблокированных за этот заход (и при смерти мобов, и на
    // самой победе) — копятся тут и разом показываются на экране победы,
    // см. unlockTitle()/checkTitles() и rVictory().
    newTitles: [],
    // Живая калибровка перед боем вместо слепого таймера — см. updateCalibration().
    // Пока started:false, урон мобу/от моба не идёт — см. guard в registerPush()
    // и combatTick().
    started:false, calibState:'searching', calibStart:null, stableSince:null, calibPct:0,
    // снимок состояния на случай отступления/смерти — откатывается только
    // опыт и уровень (защита от фарма: без этого можно было бы бить лёгких
    // мобов, отступать перед боссом и заходить заново за бесконечным опытом).
    // Счётчики повторений (pushupsTotal/Today/Week, squatsTotal/Today/Week и
    // legacy totalPush/pushToday/pushWeek) сюда сознательно не входят —
    // отжимания и приседания реальные и честные независимо от исхода боя,
    // откатывать их незачем, см. retreatRaid()/playerDied().
    snapshot: { xp:S.xp, level:S.level } };
  // Чистое состояние счётчика повторов на случай, если Cam ещё держит
  // остатки предыдущего захода — иначе цвет скелета (skeletonColor()) мог бы
  // на миг показать "неверное" состояние ещё до того, как калибровка вообще
  // началась.
  Cam.armState = 'up'; Cam.downStreak = 0; Cam.upStreak = 0; Cam.smoothPts = {}; Cam.curExercise = null;
  checkTitles('enter', { mobs });
  // "Восставший из пепла" — не за саму смерть, а за то, что охотник всё равно
  // вернулся во врата после неё (см. флаг S.everDied в playerDied()).
  if(S.everDied) unlockAchievement('phoenix');
  go('raid');
  tickRaidCountdown();
}
function stopRaidCountdown(){
  if(S._countdownT) clearInterval(S._countdownT);
  S._countdownT = null;
}
// Сколько нужно продержать читаемую позу подряд, чтобы Система засчитала
// калибровку и пустила в бой.
const CALIB_STABLE_MS = 1500;
// Защитный потолок — если распознавание так и не стабилизируется (плохой
// свет/ракурс), всё равно не блокируем игрока навсегда.
const CALIB_MAX_MS = 15000;
/* Раньше здесь был слепой таймер на 10 секунд. Теперь только следит за
   Cam.error (если камера так и не завелась — сразу открываем ручной счёт,
   ждать смысла нет) — а сама калибровка по позе идёт из camLoop() через
   updateCalibration(), она откликается сразу на реальное распознавание,
   а не раз в секунду. */
function tickRaidCountdown(){
  stopRaidCountdown();
  S._countdownT = setInterval(()=>{
    const r = S.raid;
    if(!r || S.screen!=='raid' || r.started){ stopRaidCountdown(); return; }
    if(Cam.error) finishRaidCountdown();
  }, 500);
}
function finishRaidCountdown(){
  stopRaidCountdown();
  const r = S.raid; if(!r) return;
  r.started = true;
  // Чистый старт для реального боя — что бы ни происходило во время
  // калибровки (человек ещё двигался в кадр), первый настоящий повтор
  // не должен зависеть от этого.
  Cam.armState = 'up'; Cam.downStreak = 0; Cam.upStreak = 0; Cam.smoothPts = {}; Cam.curExercise = null;
  startCombatTick();
  const overlay = document.getElementById('raidCalib');
  if(overlay) overlay.remove();
}
function calibLabelFor(state){
  return state==='searching' ? 'Ищу тебя в кадре…'
    : state==='holding' ? 'Вижу! Держи позу…'
    : 'Готово!';
}
// Контур-подсказка в боевой позе — те же точки/кости, что рисует реальный
// drawSkeleton() для соответствующего упражнения, плюс условный торс, чтобы
// читалось как целая фигура. Специально повторяет форму настоящего скелета —
// когда трекинг поймает позу, "призрак" гаснет, а на его месте проявляется
// уже живой (цветной) скелет. Два варианта — упор лёжа (отжимания) и присед
// стоя (приседания), см. calibOverlayHTML()/mobExercise().
// viewBox 200×267 (≈3:4), preserveAspectRatio="meet" — этот силуэт НЕ привязан
// к реальной геометрии видео и просто центрируется в полноэкранном блоке
// калибровки own своим masштабом. Раньше (при contain-видео) это визуально
// более-менее совпадало; после перехода полноэкранной камеры на cover (см.
// .raid-fullbleed .cam-wrap video / drawSkeleton выше) силуэт может немного
// разъехаться с реальной раскадровкой камеры на очень узких экранах —
// стоит перепроверить на реальном устройстве и при необходимости подвинуть
// координаты фигуры отдельным заходом, это не мешает работе счётчика.
//
// Координаты фигуры (не только масштаб!) пересчитаны под БЛИЗКУЮ раскадровку —
// по референс-скриншоту пользователя, где при отжиманиях телефон стоит низко
// и близко: голова у самого верха кадра, плечи почти во всю ширину, руки
// уходят к самому нижнему краю. Это инструкция "встань именно так", а не
// просто декоративный силуэт — раньше фигура была мельче и с большими полями
// (рассчитана на более дальнюю, "во весь рост" раскадровку старого блока
// камеры 3:4), из-за чего не работала как ориентир для реальной посадки.
function calibGuideSVG(exercise){
  if(exercise==='squat'){
    // Присед требует видеть бёдра/колени/лодыжки целиком — так близко, как
    // при отжиманиях, не встанешь физически (не поместится в кадр), поэтому
    // тут просто увеличили и подняли фигуру ближе к краям кадра, не меняя
    // саму логику (полный рост сверху донизу), в отличие от отжиманий.
    return `<svg class="raid-guide" viewBox="0 0 200 267" preserveAspectRatio="xMidYMid meet" fill="none">
      <g class="raid-guide-line" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 8">

        <line x1="100" y1="60" x2="58" y2="95"/>
        <line x1="100" y1="60" x2="142" y2="95"/>
        <line x1="100" y1="155" x2="65" y2="200"/>
        <line x1="65" y1="200" x2="72" y2="258"/>
        <line x1="100" y1="155" x2="135" y2="200"/>
        <line x1="135" y1="200" x2="128" y2="258"/>
        <circle class="raid-guide-line" cx="100" cy="44" r="23" fill="none"/>
      </g>
    </svg>`;
  }
  return `<svg class="raid-guide" viewBox="0 0 200 267" preserveAspectRatio="xMidYMid meet" fill="none">
    <g class="raid-guide-line" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 8">
      <line x1="40" y1="105" x2="160" y2="105"/>
      <line x1="40" y1="105" x2="18" y2="165"/>
      <line x1="18" y1="165" x2="10" y2="230"/>
      <line x1="160" y1="105" x2="182" y2="165"/>
      <line x1="182" y1="165" x2="190" y2="230"/>
      <line x1="100" y1="105" x2="100" y2="205"/>
      <line x1="100" y1="205" x2="88" y2="260"/>
      <line x1="100" y1="205" x2="112" y2="260"/>
      <circle class="raid-guide-line" cx="100" cy="42" r="26" fill="none"/>
    </g>
  </svg>`;
}
function calibOverlayHTML(r){
  const ex = mobExercise(r.mobs[r.idx]);
  const jointsHint = ex==='squat' ? 'Встань так, чтобы бёдра, колени и лодыжки были в кадре' : 'Встань так, чтобы плечи и локти были в кадре';
  const exName = ex==='squat' ? 'приседания' : 'отжимания';
  // Подсказка про дистанцию раньше была одна на оба упражнения ("отойди на
  // 1.5–2 метра") — для приседа это верно (нужно видеть всё тело), но для
  // отжиманий прямо противоречит новому близкому контуру (см. calibGuideSVG):
  // телефон при отжиманиях кладут низко и близко к лицу, а не отходят от
  // него на пару метров. Разводим текст по упражнениям, как и остальные
  // подсказки в этом блоке.
  const distanceHint = ex==='squat'
    ? 'Отойди от телефона на 1.5–2 метра'
    : 'Положи телефон на пол экраном на себя — лицо и плечи должны лечь в контур';
  return `<div class="raid-calib" id="raidCalib" data-state="${r.calibState}">

    <div class="raid-calib-bar"><i id="raidCalibFill" style="width:${r.calibPct||0}%"></i></div>
    <div class="raid-calib-sub">${jointsHint}</div>
    <div class="raid-calib-distance">${distanceHint}</div>
    <div class="raid-calib-distance">Работай в спокойном темпе — так ${exName} считаются точнее</div>
  </div>`;
}
/* Живая калибровка: вызывается из camLoop() на каждый кадр, пока r.started
   ещё false. Как только распознавание держится стабильно CALIB_STABLE_MS
   подряд — сразу пускаем в бой (см. finishRaidCountdown()), не дожидаясь
   произвольного таймера. Обновляет оверлей напрямую через DOM (не через
   полный h()-рендер) — то же самое, что уже делает setCamStatus(), чтобы не
   дёргать видео/канвас камеры лишней перерисовкой экрана. */
function updateCalibration(angle, depth){
  const r = S.raid;
  if(!r || r.started) return;
  const now = performance.now();
  if(r.calibStart==null) r.calibStart = now;
  const tracked = angle!=null || depth!=null;
  if(tracked){
    if(r.stableSince==null) r.stableSince = now;
    const held = now - r.stableSince;
    r.calibPct = Math.min(100, Math.round(held/CALIB_STABLE_MS*100));
    r.calibState = held>=CALIB_STABLE_MS ? 'ready' : 'holding';
  } else {
    r.stableSince = null;
    r.calibPct = 0;
    r.calibState = 'searching';
  }
  const wrap = document.getElementById('raidCalib');
  if(wrap){
    wrap.dataset.state = r.calibState;
    const label = document.getElementById('raidCalibLabel');
    if(label) label.textContent = calibLabelFor(r.calibState);
    const fill = document.getElementById('raidCalibFill');
    if(fill) fill.style.width = (r.calibPct||0)+'%';
  }
  if(r.calibState==='ready' || now-r.calibStart>=CALIB_MAX_MS) finishRaidCountdown();
}
function retreatRaid(){
  const r = S.raid;
  sysConfirm('Отступить из врат? Опыт этого захода будет потерян (отжимания/приседания уже засчитаны).', ()=>{
    stopCombatTick();
    stopRaidCountdown();
    if(r && r.snapshot){
      S.xp = r.snapshot.xp; S.level = r.snapshot.level;
    }
    // "Разумное отступление" — отступление не проходит через экран победы,
    // поэтому новое достижение (если есть) объявляем через showToast().
    const wasNewRetreat = !S.achievements.includes('first_retreat');
    unlockAchievement('first_retreat');
    S.raid = null;
    go('map');
    if(wasNewRetreat){
      const a = ACHIEVEMENTS_LIST.find(x=>x.id==='first_retreat');
      showToast('🏆 Новое достижение: ' + (a ? a.name : ''));
    }
  });
}
function rRaid(){
  const r=S.raid, g=r.gate, m=r.mobs[r.idx];
  const pct = Math.max(0, m.hp/m.maxHp*100);
  const ex = mobExercise(m);
  const exLbl = exerciseLabel(ex);
  const gateColor = g.gateColor==='red' ? 'var(--danger)' : g.gateColor==='gold' ? 'var(--gold)' : 'var(--sys)';
  // Мини-очередь в правом верхнем углу — только 2 БЛИЖАЙШИХ моба впереди (не
  // вся пройденная история захода, как раньше в .mob-queue — камере на весь
  // экран просто некуда её деть), плюс "+N" на тех, кто дальше в очереди.
  const upcoming = r.mobs.slice(r.idx+1, r.idx+3);

  }).join('') + (remainAfter>0 ? `<div class="raid-mini-more">+${remainAfter}</div>` : '');

    : `<video id="raidVideo" autoplay playsinline muted></video><canvas id="raidCanvas"></canvas><div class="cam-status" id="camStatus">Включаю сканер Системы…</div>`;
  h(`<div class="screen raid-fullbleed">

      ${r.replay ? `<div class="raid-banner replay">ℹ️ Повторное прохождение — опыт и повторения за этот заход не засчитываются.</div>` : ''}
      <div class="raid-mob-card">
        <div class="mob-art" id="mobArt" style="border-color:${gateColor}">${mobVisual(m.kind,120,m.name)}</div>
        <div class="raid-gate-tag" style="color:${gateColor}">${g.stage==='exam'?'ЭКЗАМЕН':g.stage==='trial'?'ИСПЫТАНИЕ':'ВРАТА '+g.rank} · ${g.name.toUpperCase()}</div>
        <div class="raid-mob-card-body">
          <div class="mob-name">${m.isBoss?'👑 '+m.name:m.name} <span class="mono" style="color:var(--muted);font-size:12px">· ${r.idx+1}/${r.mobs.length}</span><span class="mob-exercise" id="mobExBadge">${exLbl.icon} ${exLbl.name}</span></div>
          <div class="hp-strip"><i id="hpFill" style="width:${pct}%"></i><span id="hpNum">HP ${m.hp} / ${m.maxHp}</span></div>
        </div>
      </div>
    </div>
    <div class="raid-counter-row">
      <button class="raid-side-btn retreat" onclick="retreatRaid()" aria-label="Отступить">🚪</button>
      <div class="raid-counter-col">
        ${repCounterHTML()}
        <div class="raid-counter-hp">
          <div class="hp-strip player"><i id="playerHpFill" style="width:${Math.max(0,r.hp/r.hpMax*100)}%"></i><span id="playerHpNum">${r.hp} / ${r.hpMax}</span></div>
        </div>
      </div>
      <button class="raid-side-btn manual" onclick="manualPush()" aria-label="Засчитать вручную">+</button>
    </div>
  </div>`);
  attachCamRefs();
  if(!Cam.running && !Cam.error) startCamera();
}
/* Бонус опыта на Exam-вратах: System форсирует прорыв игрока через уровневый порог ранга.
   Множитель подобран так, чтобы прохождение экзамена гарантированно поднимало
   уровень игрока минимум до RANK_LEVEL_TARGET текущего ранга. */
const EXAM_XP_MULT = { E:2.6, D:1, C:1, B:1, A:1 };
function xpMultiplierFor(gate){
  return gate.stage==='exam' ? (EXAM_XP_MULT[gate.rank]||1) : 1;
}
function gainXP(amount){
  S.xp += amount;
  while(S.xp>=100){ S.xp-=100; S.level++; }
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
/* Сбрасывает "сегодня"/"неделя" при смене календарного дня — иначе счётчики
   в профиле продолжали бы расти вечно после полуночи. */
function ensureDay(){
  const today = todayStr();
  if(S.todayDate !== today){
    S.pushToday = 0;
    S.pushupsToday = 0; S.squatsToday = 0;
    if(new Date().getDay()===1){ S.pushWeek = 0; S.pushupsWeek = 0; S.squatsWeek = 0; } // понедельник — новая неделя
    S.todayDate = today;
  }
}

/* Каждый распознанный камерой повтор = 1 удар по мобу (1 отжимание = 1 урон).
   XP начисляется одним куском в момент убийства моба (как и раньше), чтобы не
   ломать округлением аккуратно откалиброванный EXAM_XP_MULT по рангам. */
function registerPush(){
  const r=S.raid; if(!r) return;
  if(!r.started) return; // идёт отсчёт перед боем — повторы ещё не считаются
  const m=r.mobs[r.idx]; if(!m || m.hp<=0) return;
  m.hp = Math.max(0, m.hp-1);
  r.reps = (r.reps||0) + 1; // счётчик за весь заход — растёт независимо от replay/наград
  updateRepCounterDOM();
  if(!r.replay){
    S.totalPush++; S.pushToday++; S.pushWeek++;
    // Та же сумма, но раздельно по упражнению — см. "Прогресс повторений" в
    // профиле (rProfile()), где отжимания и приседания считаются отдельно.
    if(mobExercise(m)==='squat'){ S.squatsTotal++; S.squatsToday++; S.squatsWeek++; }
    else { S.pushupsTotal++; S.pushupsToday++; S.pushupsWeek++; }
  }
  updateRaidDOM();
  if(S.settings.vibration) hapticImpact(m.hp<=0 ? 'heavy' : 'medium');
  playHitSound(m.hp<=0);
  if(m.hp<=0){
    if(!r.replay){
      const xpGain = Math.round(m.maxHp * xpMultiplierFor(r.gate));
      gainXP(xpGain);
      r.xpGained = (r.xpGained||0) + xpGain;
      // Бестиарий/титулы считаются и в повторных заходах (это просто прогресс
      // "видел/повержен", а не награда) — но раз повторные врата не дают наград,
      // все реально новые открытия к этому моменту, скорее всего, уже случились
      // при первом прохождении. Проверяем всё равно — дёшево, и не ломает логику.
    }
    checkTitles('kill', { mob:m });
    showKillBanner();
    setTimeout(()=>{
      r.idx++;
      if(r.idx >= r.mobs.length){ winRaid(); }
      else if(S.settings.stormMode){
        // Штурмовой режим: без экрана-таймера отдыха — сразу следующий моб.
        // Лечим мгновенно на ту же сумму, что набежала бы за весь таймер
        // отдыха (heal-за-тик × длительность) — суммарный урон за заход не
        // меняется, убирается только ожидание.
        const next = r.mobs[r.idx];
        const heal = Math.max(1, Math.round(mobDps(next)*REGEN_RATE_FACTOR));
        r.hp = Math.min(r.hpMax, r.hp + heal*restSecondsFor(m));
        go('raid');
      } else {
        const dur = restSecondsFor(m);
        S.restLeft = dur; S.restTotal = dur;
        go('rest'); tickRest();
      }
    }, 1300);
  }
}
/* Отдых между подходами масштабируется от сложности только что побеждённого
   моба — чем больше отжиманий он потребовал, тем длиннее перерыв, с нижней
   границей REST_MIN_SECONDS. Линейный рост от maxHp — та же "шкала силы",
   что уже используется для урона моба (mobDps). */
const REST_MIN_SECONDS = 15;
function restSecondsFor(m){
  return Math.max(REST_MIN_SECONDS, Math.round(REST_MIN_SECONDS + m.maxHp*0.5));
}
const REST_RING = { size:150, stroke:10 };
function restRingCircumference(){ return 2*Math.PI*((REST_RING.size-REST_RING.stroke)/2); }
function restRingSVG(pct){
  const r = (REST_RING.size-REST_RING.stroke)/2;
  const c = restRingCircumference();
  const offset = c*(1-pct/100);
  return `<svg width="${REST_RING.size}" height="${REST_RING.size}" viewBox="0 0 ${REST_RING.size} ${REST_RING.size}" style="transform:rotate(-90deg)">
    <circle cx="${REST_RING.size/2}" cy="${REST_RING.size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${REST_RING.stroke}"/>
    <circle id="restRingFg" cx="${REST_RING.size/2}" cy="${REST_RING.size/2}" r="${r}" fill="none" stroke="var(--sys)" stroke-width="${REST_RING.stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .3s linear"/>
  </svg>`;
}
function rRest(){
  const r=S.raid, next=r.mobs[r.idx];
  const pct = Math.max(0, Math.min(100, S.restLeft/(S.restTotal||REST_MIN_SECONDS)*100));
  // У босса упражнение делится по HP на 2 фазы (см. mobExercise()) — вместо
  // одного числа показываем честный расклад "N отжиманий + M приседаний",
  // а не завышаем ожидание одним упражнением на весь maxHp.
  let nextTaskText;
  if(next.isBoss){
    const half = Math.ceil(next.maxHp/2), rest2 = next.maxHp-half;
    nextTaskText = `<b class="gold">${half} отжиманий</b> + <b class="gold">${rest2} приседаний</b>`;
  } else {
    nextTaskText = `<b class="gold">${next.maxHp} ${exerciseLabel(mobExercise(next)).verb}</b>`;
  }
  h(`<div class="screen raid-fullbleed rest-fullbleed">
    <div class="cam-wrap" id="camWrap">
      ${!Cam.error ? `<video id="raidVideo" autoplay playsinline muted></video><canvas id="raidCanvas"></canvas>` : ''}
    </div>
    <div class="raid-top-panel">
      <div class="raid-banner"><b>⚡ ПЕРЕЗАРЯДКА МАНЫ</b><br>Моб повержен. На очереди <b class="cy">${next.isBoss?'👑 '+next.name:next.name+' '+next.n}</b>: ${nextTaskText}.</div>
    </div>
    ${repCounterHTML()}
    <div class="rest-ring-wrap">
      <div style="position:relative;width:${REST_RING.size}px;height:${REST_RING.size}px">
        ${restRingSVG(pct)}
        <div class="rest-timer" id="restT" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;margin:0">${S.restLeft}</div>
      </div>
      <div class="rest-ring-sub">секунд до следующей атаки</div>
    </div>
    <div class="rest-bottom-panel">
      <div class="hpbar player"><i id="playerHpFill" style="width:${Math.max(0,r.hp/r.hpMax*100)}%"></i></div>
      <div class="hp-num player" id="playerHpNum">Твоё HP ${r.hp} / ${r.hpMax}</div>
    </div>
    <div class="rest-attack-bar">
      <button class="btn" onclick="go('raid')">Атаковать сейчас</button>
    </div>
  </div>`);
  // Камера не выключается на отдыхе — стрим уже жив (см. go()), просто
  // заново привязываем новый <video>/<canvas> (root перерисован целиком).
  // Детектор позы всё равно бездействует вне экрана raid (camLoop), так что
  // повторы во время отдыха не считаются — только живой предпросмотр.
  if(!Cam.error){ attachCamRefs(); if(!Cam.running) startCamera(); }
}
function tickRest(){
  clearInterval(S._t);
  const c = restRingCircumference();
  S._t = setInterval(()=>{
    S.restLeft--;
    const el=document.getElementById('restT');
    if(el) el.textContent=S.restLeft;
    const fg=document.getElementById('restRingFg');
    if(fg){ const pct=Math.max(0, Math.min(100, S.restLeft/(S.restTotal||REST_MIN_SECONDS)*100)); fg.style.strokeDashoffset = c*(1-pct/100); }
    if(S.restLeft<=0 || S.screen!=='rest'){ clearInterval(S._t); if(S.screen==='rest') go('raid'); }
  },1000);
}
function winRaid(){
  stopCombatTick();
  const g=S.raid.gate;
  const track = S.raid.track;
  const wasReplay = S.raid.replay;
  // Первые в жизни закрытые врата — считаем по ОБОИМ направлениям сразу, а не
  // только по тому, в котором сейчас играем (иначе ачивка "Первый шаг" могла
  // бы выпасть повторно, если начать сперва Выносливость, а потом Силу).
  const isFirstGateEver = S.doneGates.length===0 && S.doneGatesEndurance.length===0;
  const done = doneGatesForTrack(track);
  if(!done.includes(g.id)) done.push(g.id);
  checkTitles('win', { gate:g }); // после push в done — видит только что закрытые врата
  if(isFirstGateEver) unlockAchievement('first_gate');
  if(g.stage==='trial') unlockAchievement('first_trial');
  S.justRanked = null;
  if(g.stage==='exam'){
    const idx = RANK_ORDER.indexOf(g.rank);
    if(idx>=0 && idx<RANK_ORDER.length-1){
      S.rank = RANK_ORDER[idx+1]; S.justRanked = S.rank;
      unlockAchievement('first_rankup');
    }
  }
  // Стрик реально увеличивается максимум один раз в календарный день, и только
  // за настоящую (не повторную) победу — раньше "+1 к стрику" на экране победы
  // был просто текстом, никак не связанным с состоянием.
  ensureDay();
  S.justStreakInc = false;
  if(!wasReplay){
    const today = todayStr();
    if(S.lastWinDate !== today){
      S.streak = (S.lastWinDate === yesterdayStr()) ? S.streak+1 : 1;
      S.lastWinDate = today;
      S.justStreakInc = true;
    }
  }
  go('victory');
  // Отправляем текущий дневной счёт на сервер для таблицы лидеров — именно
  // здесь, а не на каждый повтор: закрытые врата это естественная точка,
  // где прогресс уже точно "настоящий" (не откатится, как при отступлении
  // или смерти — см. retreatRaid()/playerDied(), там счёт не шлём).
  sendScore();
}
// Титулы, разблокированные за текущий заход (S.raid.newTitles, накоплены
// checkTitles()/unlockTitle() и при смерти мобов, и на самой победе) —
// показываются здесь же, на экране победы, каждый своей карточкой, с
// нарастающей задержкой (animation-delay), чтобы они "всплывали" по очереди,
// а не все разом. Специально визуально скромнее и короче баннера ранг-апа
// выше — разная "громкость" анимации подсказывает разную важность события.
function titleUnlockHTML(){
  const ids = (S.raid && S.raid.newTitles) || [];
  if(!ids.length) return '';
  return ids.map((id,i)=>{
    const t = TITLES_LIST.find(x=>x.id===id);

    const item = t || a;

    return `<div class="title-unlock" style="animation-delay:${i*0.45}s">
      <div class="tu-flash"></div>
      <div class="tu-badge">${isAchievement?'🏆':'🏵'}</div>
      <div class="tu-body"><div class="tu-tag">${isAchievement?'Новое достижение':'Новый титул'}</div><div class="tu-name">${escapeHtml(item.name)}</div></div>
    </div>`;
  }).join('');
}
function rVictory(){
  const g=S.raid.gate;
  const total = S.raid.mobs.reduce((a,m)=>a+m.maxHp,0);
  const lastMob = S.raid.mobs[S.raid.mobs.length-1];
  h(`<div class="screen reveal">

    <div class="loot">

function rTitlesBestiaryTab(){

    const group = BESTIARY_GROUPS[groupKey];
